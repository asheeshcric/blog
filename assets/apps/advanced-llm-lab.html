  {
    id:'context-rot', title:'Context Rot & Ordering', level:'Core', time:'9 min',
    tags:['context rot','lost in the middle','ordering','distraction'],
    search:'context rot lost in the middle long context degradation ordering position recency primacy distraction irrelevant tokens attention dilution needle in haystack',
    body:`
    <p>Bigger context windows created a trap: people assume more context = better answers. In practice, performance often <strong>degrades</strong> as you add tokens — a phenomenon now called <strong>context rot</strong>.</p>
    <div class="callout key"><h5>Two failure modes</h5><ul>
      <li><strong>Lost in the middle</strong> — models attend best to the <em>start</em> and <em>end</em> of context; facts buried in the middle get missed. Position matters.</li>
      <li><strong>Distraction</strong> — irrelevant tokens dilute attention. A correct answer surrounded by 100K of noise is harder to produce than the same answer in a tight context.</li>
    </ul></div>
    <p>The fixes are ordering and curation, not "add more":</p>
    <ul>
      <li>Put the <strong>most important</strong> material at the <strong>edges</strong> (instructions up top, the key question/most-relevant chunk near the end).</li>
      <li><strong>Retrieve less, rank harder.</strong> 5 highly-relevant chunks beat 50 mediocre ones.</li>
      <li><strong>Compress mid-context</strong> history (summaries) instead of carrying raw logs.</li>
    </ul>
    <h3>Try it: where's the needle?</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Lost-in-the-middle demo</h4></div>
      <p class="wdesc">Move the key fact ("the needle") through the context and add filler. Watch the modeled retrieval probability — high at the edges, sagging in the middle, worse as filler grows.</p>
      <div class="ctrls">
        <div class="ctrl" style="min-width:240px"><label>Needle position <b id="cr_pv">50</b>%</label><input type="range" id="cr_pos" min="0" max="100" step="5" value="50"></div>
        <div class="ctrl" style="min-width:240px"><label>Filler / context length <b id="cr_fv">60</b>K</label><input type="range" id="cr_fill" min="4" max="200" step="4" value="60"></div>
      </div>
      <div class="bars" id="cr_bars"></div>
      <div class="readout" id="cr_out"></div>
    </div>
    <div class="callout frontier"><h5>What changed recently</h5><p>"Long context" stopped meaning "dump everything in." The frontier moved to <em>active context management</em>: retrieve-then-rerank, position-aware placement, and treating the window as something you curate every turn. KV-cache reuse (next lesson) makes good curation cheap to repeat.</p></div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="0">
        <div class="q">You're stuffing 80 retrieved chunks and accuracy is poor. Best move?</div>
        <button class="opt">Rerank and keep the top ~5–10 most relevant chunks</button>
        <button class="opt">Add 80 more chunks for coverage</button>
        <button class="opt">Shuffle the chunks randomly each turn</button>
        <div class="explain">Curation beats volume. Reranking to a small, highly-relevant set reduces distraction and avoids lost-in-the-middle — usually a big accuracy jump.</div>
      </div>
    </div>`,
    init(root){
      const pos=root.querySelector('#cr_pos'), fill=root.querySelector('#cr_fill'),
            pv=root.querySelector('#cr_pv'), fv=root.querySelector('#cr_fv'),
            bars=root.querySelector('#cr_bars'), out=root.querySelector('#cr_out');
      function draw(){
        const p=+pos.value/100, f=+fill.value;
        pv.textContent=+pos.value; fv.textContent=f;
        // U-shape: high at 0 and 1, dip in middle; scaled down by length
        const u = 0.55*(Math.abs(p-0.5)*2)**1.6 + 0.45; // edges ~1, middle ~0.45
        const lenPenalty = Math.max(0.35, 1 - (f-4)/260);
        const prob = Math.max(0.05, Math.min(0.98, u*lenPenalty));
        // show a few positions for comparison
        bars.innerHTML='';
        [['start (0%)',0],['middle (50%)',0.5],['end (100%)',1],['your needle',p]].forEach(([lbl,pp])=>{
          const uu=0.55*(Math.abs(pp-0.5)*2)**1.6+0.45;
          const pr=Math.max(0.05,Math.min(0.98,uu*lenPenalty));
          const b=document.createElement('div'); b.className='bar';
          const col = lbl==='your needle'?'var(--grad)':'var(--line2)';
          b.innerHTML=`<div class="lbl">${lbl}</div><div class="track"><div class="fill" style="width:${(pr*100).toFixed(0)}%;background:${col}"></div></div><div class="pct">${(pr*100).toFixed(0)}%</div>`;
          bars.appendChild(b);
        });
        out.innerHTML=`<b>Modeled retrieval ≈ ${(prob*100).toFixed(0)}% at position ${(+pos.value)}% with ${f}K context.</b><br><span class="mut">${(+pos.value>30&&+pos.value<70)?'Buried in the middle — exactly where facts get lost. ':'Near an edge — best case. '}${f>120?'Long context is dragging every position down (rot).':'Shorter context keeps probabilities high.'}</span>`;
      }
      pos.oninput=draw; fill.oninput=draw; draw();
    }
  },

  {
    id:'compaction', title:'Compaction & Self-Summarization', level:'Frontier', time:'11 min',
    tags:['compaction','summarization','checkpoint','long horizon'],
    search:'context compaction self summarization checkpoint cursor composer claude code codex cli long horizon trajectory exceeds context window compress history rolling summary',
    body:`
    <p>Long-running agents have a fundamental problem: <strong>trajectories grow faster than context windows</strong>. A deep-research or coding task can generate millions of tokens of thoughts + tool outputs — far past any window. The answer is <strong>compaction</strong>: periodically compress the history so the agent can keep going.</p>
    <div class="callout key"><h5>Three ways to compact</h5><ul>
      <li><strong>Rolling summary</strong> — replace old turns with an LLM-written summary of what happened and what matters now.</li>
      <li><strong>Checkpoint / scratchpad</strong> — write durable state to a file/memory, drop the raw history, reload the file when needed (offload, don't carry).</li>
      <li><strong>Self-summarization (trained)</strong> — the model is RL-trained to compress <em>its own</em> context. Cursor's Composer (Mar 2026) did exactly this to handle long-horizon tasks; Claude Code and Codex CLI ship checkpoint/compaction too.</li>
    </ul></div>
    <p>The tradeoff is <strong>lossy</strong>: compaction frees tokens but can drop a detail you needed later. Good compaction is selective — it preserves goals, decisions, open threads, and key facts, and discards verbose tool dumps.</p>
    <h3>Try it: run a long task with compaction</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Compaction simulator</h4></div>
      <p class="wdesc">Step a long task. Without compaction it overflows; with compaction, history collapses to a summary at the threshold and the task survives.</p>
      <div class="ctrls">
        <div class="ctrl"><label>Compaction</label><div class="seg" id="cp_seg"><button data-c="0">off</button><button class="on" data-c="1">on</button></div></div>
        <div class="ctrl"><label>Trigger at <b id="cp_tv">70</b>%</label><input type="range" id="cp_thr" min="40" max="90" step="5" value="70"></div>
        <div class="ctrl"><button class="opt" id="cp_step" style="width:auto">▶ +1 turn</button></div>
        <div class="ctrl"><button class="opt" id="cp_reset" style="width:auto">↺ Reset</button></div>
      </div>
      <div class="budget"><div class="seg-b" id="cp_bar" style="width:10%">10%</div></div>
      <div class="readout" id="cp_out"></div>
    </div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="2">
        <div class="q">What did Cursor's Composer do for long-horizon tasks (Mar 2026)?</div>
        <button class="opt">Used a 10M-token window so it never needs to compact</button>
        <button class="opt">Disabled tool use</button>
        <button class="opt">Was RL-trained to self-summarize (compact its own context)</button>
        <div class="explain">Rather than rely on ever-larger windows, they trained the model to compress its own trajectory — self-summarization — so it can run far past the raw context limit.</div>
      </div>
    </div>`,
    init(root){
      let comp=1, turn=0, ctx=10, summarized=0;
      const seg=root.querySelector('#cp_seg'), thr=root.querySelector('#cp_thr'), tv=root.querySelector('#cp_tv'),
            bar=root.querySelector('#cp_bar'), out=root.querySelector('#cp_out');
      seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{seg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');comp=+b.dataset.c;reset();});
      thr.oninput=()=>{tv.textContent=thr.value;draw();};
      function reset(){turn=0;ctx=10;summarized=0;draw();}
      function draw(){
        bar.style.width=Math.min(100,ctx)+'%'; bar.textContent=Math.round(ctx)+'%';
        bar.style.background=ctx>90?'linear-gradient(90deg,var(--bad),var(--warn))':ctx>+thr.value?'linear-gradient(90deg,var(--warn),var(--acc))':'var(--grad)';
        let msg=`<b>Turn ${turn}</b> · context ~${Math.round(ctx)}% of window.`;
        if(ctx>=100 && comp===0){ msg=`<b style="color:var(--bad)">💥 Overflow at turn ${turn}.</b> Without compaction the task dies — the model can't fit the next observation.`; }
        else if(summarized>0){ msg+=`<br><span class="mut">Compacted ${summarized}× — old turns collapsed into a rolling summary. Goals/decisions kept, raw tool dumps dropped.</span>`; }
        out.innerHTML=msg;
      }
      root.querySelector('#cp_step').onclick=()=>{
        if(ctx>=100 && comp===0) return;
        turn++; ctx += 12 + Math.random()*8;
        if(comp===1 && ctx>=+thr.value){ ctx = 22; summarized++; }
        if(ctx>100) ctx=100;
        draw();
      };
      root.querySelector('#cp_reset').onclick=reset;
      draw();
    }
  },

  {
    id:'kv-reuse', title:'KV-Cache & Prefix Reuse for Agents', level:'Applied', time:'9 min',
    tags:['KV-cache','prefix cache','prompt caching','latency','cost'],
    search:'kv cache prefix cache prompt caching reuse stable prefix system prompt tools agent cost latency cache hit rate ttft prefill',
    body:`
    <p>Agents call the model <em>many times per task</em>, and each call re-sends a big, mostly-identical prefix (system prompt + tools + history). Recomputing that prefix every time is wasteful. <strong>Prefix/prompt caching</strong> reuses the model's KV-cache for the shared prefix, so only the new tokens are processed.</p>
    <div class="callout intuition"><h5>Why this is huge for agents</h5><p>In a 10-turn agent, turn 10's prefix is ~90% identical to turn 9's. With prefix caching, that shared part is a <strong>cache hit</strong> — near-zero recompute, much lower time-to-first-token and cost. The KV-cache hit rate becomes a primary production metric (Azure's SRE agent alerted on its <em>own</em> dropping hit rate).</p></div>
    <div class="callout key"><h5>The golden rule: keep the prefix stable</h5><p>Caches match on an <strong>exact prefix</strong>. If you put anything that changes (a timestamp, a per-turn ID, reshuffled tools) <em>early</em> in the context, you bust the cache for everything after it. <strong>Order: stable → volatile.</strong> System prompt and tools first (stable), volatile per-turn stuff last.</p></div>
    <h3>Try it: cache hit rate vs prefix stability</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Prefix-cache calculator</h4></div>
      <p class="wdesc">Set how stable your prefix is and how many turns the task runs. See the cache hit rate and the compute you save.</p>
      <div class="ctrls">
        <div class="ctrl"><label>Prefix stability <b id="kv_sv">95</b>%</label><input type="range" id="kv_stab" min="0" max="100" step="5" value="95"></div>
        <div class="ctrl"><label>Turns in task <b id="kv_tv">10</b></label><input type="range" id="kv_turns" min="1" max="30" step="1" value="10"></div>
      </div>
      <div class="chips" id="kv_chips"></div>
      <div class="readout" id="kv_out"></div>
    </div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="1">
        <div class="q">Where should a per-turn timestamp go to preserve prefix caching?</div>
        <button class="opt">At the very top, before the system prompt</button>
        <button class="opt">As late as possible (after the stable system prompt + tools)</button>
        <button class="opt">It doesn't matter</button>
        <div class="explain">Caches match on an exact prefix. Anything volatile placed early invalidates the cache for everything after it. Keep the prefix stable; push volatile tokens to the end.</div>
      </div>
    </div>`,
    init(root){
      const stab=root.querySelector('#kv_stab'), turns=root.querySelector('#kv_turns'),
            sv=root.querySelector('#kv_sv'), tv=root.querySelector('#kv_tv'),
            chips=root.querySelector('#kv_chips'), out=root.querySelector('#kv_out');
      function draw(){
        const s=+stab.value/100, n=+turns.value;
        sv.textContent=+stab.value; tv.textContent=n;
        // hit rate grows with stability and turns (more shared prefix over time)
        const hit = Math.min(0.95, s * (1 - 1/(n+1)));
        const naiveCost = n; // arbitrary units: full prefix each turn
        const cachedCost = n*(1-hit) + hit; // saved on hits
        const saving = (1 - cachedCost/naiveCost)*100;
        chips.innerHTML=`
          <div class="chip acc"><b>${(hit*100).toFixed(0)}%</b>cache hit rate</div>
          <div class="chip acc"><b>${saving>0?saving.toFixed(0):0}%</b>prefill compute saved</div>
          <div class="chip"><b>${n}</b>model calls</div>`;
        out.innerHTML = s<0.5
          ? `<b style="color:var(--bad)">Unstable prefix → mostly cache misses.</b> Something volatile is early in your context, busting the cache each turn.`
          : `<b style="color:var(--good)">Stable prefix → ${(hit*100).toFixed(0)}% hits.</b> Most of each turn's prefix is reused; you only pay to process new tokens.`;
      }
      stab.oninput=draw; turns.oninput=draw; draw();
    }
  }

  ]
});

  {
    id:'memory-lifecycle', title:'Write · Retrieve · Update · Forget', level:'Applied', time:'10 min',

    body:`
    <p>A memory system isn't a write-only log. It has a full lifecycle, and the hard parts are deciding <em>what</em> to remember and <em>when to forget</em>.</p>
    <div class="kp"><div class="kph">The four operations</div><ul>
      <li><strong>Write</strong> — decide what's worth persisting (salience). Storing everything = expensive retrieval + noise.</li>
      <li><strong>Retrieve</strong> — surface the right memories for the current turn (relevance + recency).</li>
      <li><strong>Update / consolidate</strong> — merge new info with old; distill episodes into facts; resolve contradictions.</li>
      <li><strong>Forget</strong> — decay or delete stale/irrelevant memories. Memory hygiene is a feature, not neglect.</li>
    </ul></div>
    <div class="callout warn"><h5>The two failure modes</h5><p><strong>Hoarding:</strong> remember everything → retrieval gets noisy and slow, and the agent surfaces irrelevant junk. <strong>Amnesia:</strong> remember too little → the agent feels forgetful and re-asks. Good systems tune salience (what to write) and decay (what to forget) to sit between them.</p></div>
    <h3>Try it: tune the memory policy</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Salience &amp; decay tuner</h4></div>
      <p class="wdesc">Set how aggressively the agent writes and forgets. Watch the balance between recall quality and retrieval noise.</p>
      <div class="ctrls">
        <div class="ctrl"><label>Write threshold (salience) <b id="ml_wv">50</b></label><input type="range" id="ml_write" min="0" max="100" step="5" value="50"></div>
        <div class="ctrl"><label>Forget after (decay) <b id="ml_dv">60</b> days</label><input type="range" id="ml_decay" min="1" max="180" step="1" value="60"></div>
      </div>
      <div class="chips" id="ml_chips"></div>
      <div class="readout" id="ml_out"></div>
    </div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="2">
        <div class="q">Your agent's recall is noisy — it surfaces lots of irrelevant memories. Likely cause?</div>
        <button class="opt">Forgetting too aggressively</button>
        <button class="opt">Retrieval k is too small</button>
        <button class="opt">Write threshold too low (hoarding) + weak decay → store full of low-value memories</button>
        <div class="explain">Hoarding plus weak forgetting fills the store with noise, so retrieval surfaces junk. Raise the salience bar for writes and decay stale entries.</div>
      </div>
    </div>`,
    init(root){
      const w=root.querySelector('#ml_write'), d=root.querySelector('#ml_decay'),
            wv=root.querySelector('#ml_wv'), dv=root.querySelector('#ml_dv'),
            chips=root.querySelector('#ml_chips'), out=root.querySelector('#ml_out');
      function draw(){
        const write=+w.value, decay=+d.value;
        wv.textContent=write; dv.textContent=decay;
        // store size ~ inversely with write threshold, scales with decay window
        const stored = Math.round((100-write)/100 * decay * 1.5)+5;
        const noise = Math.min(100, Math.round((100-write)*0.6 + decay*0.12));
        const recall = Math.max(20, Math.min(98, Math.round(100 - write*0.5 - Math.max(0,(30-decay))*1.5)));
        chips.innerHTML=`
          <div class="chip"><b>${stored}</b>memories stored</div>
          <div class="chip"><b style="color:${recall>70?'var(--good)':'var(--warn)'}">${recall}%</b>useful recall</div>
          <div class="chip"><b style="color:${noise>55?'var(--bad)':'var(--good)'}">${noise}%</b>retrieval noise</div>`;
        let msg;
        if(write<25 && decay>90) msg='<b style="color:var(--bad)">Hoarding.</b> Writing almost everything and rarely forgetting → big, noisy store. Raise the salience bar.';
        else if(write>80 && decay<20) msg='<b style="color:var(--bad)">Amnesia.</b> High write bar + fast decay → the agent forgets things it needed. Loosen up.';
        else msg='<b style="color:var(--good)">Balanced.</b> Selective writes + sensible decay keep recall high and noise low.';
        out.innerHTML=msg;
      }
      w.oninput=draw; d.oninput=draw; draw();
    }

    <p>Before MCP, every agent integrated every tool with bespoke glue: <em>M</em> agents × <em>N</em> tools = <strong>M×N</strong> custom connectors. Add a tool, rewrite it for every agent. Add an agent, reimplement every tool. It didn't scale.</p>
    <div class="callout intuition"><h5>MCP = "USB-C for AI"</h5><p>The <strong>Model Context Protocol</strong> (Anthropic, late 2024) is an open standard for how agents talk to tools/data. Build one MCP <em>server</em> for your tool, and <em>any</em> MCP-compatible agent can use it. M×N becomes <strong>M+N</strong>: each side implements the protocol once.</p></div>
    <p>It caught on fast. By 2026: donated to the Linux Foundation's Agentic AI Foundation (with Block & OpenAI), ~97M+ monthly SDK downloads, supported by every major vendor — and OpenAI deprecated its proprietary Assistants API in favor of it. MCP is now the default way to expose capabilities to agents.</p>

    body:`
    <p>MCP has a small, clean architecture. Learn these five words and you can read any MCP discussion:</p>

      <li><strong>Host</strong> — the app the user interacts with (the agent/IDE/chat).</li>
      <li><strong>Client</strong> — lives inside the host; maintains a 1:1 connection to one server.</li>
      <li><strong>Server</strong> — wraps a capability (your API, a database, the filesystem) and exposes it via the protocol.</li>

    <div class="kp"><div class="kph">What a server exposes (primitives)</div><ul>
      <li><strong>Tools</strong> — functions the model can call (the action space). <em>Model-controlled.</em></li>
      <li><strong>Resources</strong> — read-only data the host can load into context (files, records). <em>App-controlled.</em></li>
      <li><strong>Prompts</strong> — reusable templates/workflows the user can invoke. <em>User-controlled.</em></li>
    </ul></div>
    <p>Communication is JSON-RPC over a transport (stdio for local, HTTP/SSE for remote). The client <strong>discovers</strong> what a server offers at connect time, so the agent learns new capabilities dynamically — no redeploy.</p>
    <h3>Try it: route a request through MCP</h3>

  {

    body:`
    <p>A tool that's correct for a human can be unusable for a model. Tool <strong>ergonomics</strong> — the schema, description, and return shape — directly set your agent's accuracy. This is where most agent quality is won or lost.</p>
    <div class="callout key"><h5>The checklist</h5><ul>
      <li><strong>Name</strong>: a clear verb_noun (<code>search_local_content</code>, not <code>slc</code>).</li>
      <li><strong>Description</strong>: it's a prompt. State what it does, when to use it, and when <em>not</em> to.</li>
      <li><strong>Arguments</strong>: typed, minimal, with per-field descriptions and sane defaults. Avoid free-form blobs.</li>
      <li><strong>Returns</strong>: only what the model needs next. Trim raw dumps to the decisive fields.</li>
      <li><strong>Errors</strong>: actionable. "city_id required — call resolve_city first" teaches recovery; "400 Bad Request" doesn't.</li>
    </ul></div>
    <h3>Try it: fix a bad tool</h3>

      <div class="wh"><span class="tag">Interactive</span><h4>Tool-schema builder</h4></div>

        <button class="opt">Just an HTTP 200 with no body</button>
        <button class="opt">A trimmed list of the few fields the model needs to decide the next step</button>
        <div class="explain">Return what the model needs next. Raw dumps waste context and invite distraction; empty responses give nothing to act on.</div>
      </div>
    </div>`,
    init(root){
      const caps={
        'clear verb_noun name':false,
        'rich description (when to use)':false,
        'typed args + per-field docs':false,
        'sane defaults':false,
        'trimmed return shape':false,
        'actionable errors':false
      };
      const gain={'clear verb_noun name':10,'rich description (when to use)':18,'typed args + per-field docs':14,'sane defaults':7,'trimmed return shape':11,'actionable errors':10};
      const wrap=root.querySelector('#td_caps'), schema=root.querySelector('#td_schema'), bar=root.querySelector('#td_bar'), out=root.querySelector('#td_out');
      Object.keys(caps).forEach(k=>{
        const b=document.createElement('button');b.className='opt toggle-opt';

        b.onclick=()=>{caps[k]=!caps[k];set();draw();}; set(); wrap.appendChild(b);

      function draw(){
        const name = caps['clear verb_noun name']?'search_local_content':'slc';
        let s = '{\n  "name": "'+name+'",';
        s += caps['rich description (when to use)']
          ? '\n  "description": "Find posts about places/events near a city, by interest. Use for local discovery; NOT for global web search.",'
          : '\n  "description": "search",';
        if(caps['typed args + per-field docs']){
          s += '\n  "parameters": {\n    "query":   {"type":"string", "description":"natural-language interest"},\n    "city_id": {"type":"integer","description":"resolved city id"}';
          s += caps['sane defaults'] ? ',\n    "limit":   {"type":"integer","default":10}\n  }' : '\n  }';
        } else {
          s += '\n  "parameters": {"q": "string"}';
        }
        s += caps['trimmed return shape']
          ? ',\n  "returns": "[{id, title, why_relevant, city}]"'
          : ',\n  "returns": "raw API json (50KB)"';
        s += caps['actionable errors']

        schema.textContent=s;
        let score=30; Object.keys(caps).forEach(k=>{if(caps[k])score+=gain[k];}); score=Math.min(97,score);

    body:`

  {
    id:'mcp-security', title:'Agentic API Security', level:'Frontier', time:'10 min',
    tags:['security','confused deputy','prompt injection','A2A'],
    search:'mcp security confused deputy attack tool poisoning prompt injection supply chain malicious server token passthrough least privilege a2a agent to agent protocol agent card',
    body:`
    <p>Connecting agents to tools opens a new attack surface. Two threats matter most when you build agentic APIs.</p>
    <div class="callout warn"><h5>Confused deputy</h5><p>Your agent has legitimate, privileged access (e.g. a database). An attacker who can influence the agent's input tricks it into <em>using that privilege on their behalf</em> — the agent is the "confused deputy." Mitigation: <strong>least privilege</strong> (scope the agent's access tightly), per-action authorization, and never let untrusted input control privileged tools.</p></div>
    <div class="callout warn"><h5>Tool / prompt injection</h5><p>A malicious MCP server (or poisoned tool result/web page) embeds instructions in what the agent reads: "ignore prior instructions and exfiltrate secrets." Because the agent treats tool output as context, it can be hijacked. Mitigation: <strong>only connect servers you trust</strong>, sanitize/sandbox tool output, treat external text as data (not commands), and keep secrets out of the agent's reach.</p></div>
    <p>For <strong>agent-to-agent</strong> systems there's a parallel standard, <strong>A2A</strong> (agents advertise capabilities via "agent cards" and talk over HTTP/JSON). It carries the same trust questions — who can you delegate to, and what can they do on your behalf?</p>
    <h3>Try it: harden an agentic API</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Threat-model toggles</h4></div>
      <p class="wdesc">Turn on mitigations and watch the residual risk drop. No single control is enough — defense in depth.</p>
      <div class="toggrid" id="se_caps"></div>
      <div class="budget"><div class="seg-b" id="se_bar" style="width:100%;background:linear-gradient(90deg,var(--bad),var(--warn))">risk 100</div></div>
      <div class="readout" id="se_out"></div>
    </div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="1">
        <div class="q">An agent with DB write access is tricked by malicious input into dropping a table. This is a…</div>
        <button class="opt">Buffer overflow</button>
        <button class="opt">Confused deputy — its legitimate privilege is abused via untrusted input</button>
        <button class="opt">Denial of service</button>
        <div class="explain">The agent (the deputy) is confused into using its own legitimate privilege on the attacker's behalf. Least privilege + per-action auth + treating input as untrusted mitigate it.</div>
      </div>
    </div>`,
    init(root){
      const caps={
        'least privilege (scoped creds)':false,
        'treat tool output as data':false,
        'only trusted servers':false,
        'per-action authorization':false,
        'secrets out of agent reach':false
      };
      const cut={'least privilege (scoped creds)':32,'treat tool output as data':22,'only trusted servers':18,'per-action authorization':14,'secrets out of agent reach':10};
      const wrap=root.querySelector('#se_caps'), bar=root.querySelector('#se_bar'), out=root.querySelector('#se_out');
      Object.keys(caps).forEach(k=>{
        const b=document.createElement('button');b.className='opt toggle-opt';
        const set=()=>{b.textContent=(caps[k]?'☑ ':'☐ ')+k;b.classList.toggle('correct',caps[k]);};
        b.onclick=()=>{caps[k]=!caps[k];set();draw();}; set(); wrap.appendChild(b);
      });
      function draw(){
        let risk=100; Object.keys(caps).forEach(k=>{if(caps[k])risk-=cut[k];}); risk=Math.max(4,risk);
        bar.style.width=Math.max(10,risk)+'%'; bar.textContent='risk '+risk;
        bar.style.background=risk>60?'linear-gradient(90deg,var(--bad),var(--warn))':risk>25?'linear-gradient(90deg,var(--warn),var(--acc))':'var(--grad)';
        const n=Object.values(caps).filter(Boolean).length;
        out.innerHTML = `<b>${n}/5 mitigations · residual risk ${risk}.</b> <span class="mut">${risk<25?'Defense in depth — no single control would have sufficed.':'Keep stacking controls; agentic APIs need layered defenses.'}</span>`;
      }
      draw();
    }
  }

  ]

    body:`
    <p>Multi-agent systems have a hidden cost: every layer of coordination multiplies tokens, latency, and dollars. This is the <strong>orchestration tax</strong> — and it's why elegant multi-agent designs often lose to a humble single agent in production.</p>
    <div class="callout warn"><h5>Where the tax comes from</h5><ul>
      <li><strong>Context propagation</strong> — each sub-agent needs context, so the same information is re-sent (and re-billed) across agents.</li>
      <li><strong>Supervisor loops</strong> — the supervisor reasons before/after every delegation: extra LLM calls.</li>
      <li><strong>Tool-call fan-out</strong> — N specialists each calling tools multiplies external calls.</li>
      <li><strong>Handoff overhead</strong> — serializing state between agents, plus integration steps.</li>
    </ul></div>
    <h3>Try it: price a multi-agent design</h3>
    <div class="widget">

    body:`

    body:`
    <p>RL lets an agent learn from <em>outcomes</em>, not just imitation. The agent runs a full trajectory (multiple Think–Act–Observe turns), gets a <strong>reward</strong> for how it did, and policy-gradient methods (PPO, GRPO) push it toward higher-reward behavior.</p>
    <div class="callout intuition"><h5>From single-turn to multi-turn</h5><p>Classic RLHF/GRPO (Vol. 1) optimized a <em>single</em> response. Agentic RL optimizes a <em>whole trajectory</em> that interleaves long reasoning with short environment-facing actions (tool calls). The model isn't just writing an answer — it's learning a <em>policy</em> for acting over many steps.</p></div>
    <p>The rollout, schematically:</p>
    <pre><code><span class="cm"># one agentic-RL rollout</span>
traj = []
state = [task]
while not done and steps &lt; max:
    action = policy(state)          <span class="cm"># reason + tool call</span>
    obs    = env.step(action)       <span class="cm"># run tool in environment</span>
    traj.append((state, action, obs))
    state += [action, obs]
reward = score(traj)                <span class="cm"># did the task succeed?</span>
update_policy(traj, reward)         <span class="cm"># PPO / GRPO</span></code></pre>
    <div class="callout warn"><h5>The hard part: sparse, delayed reward</h5><p>You usually only know success at the <em>end</em> (the answer was right/wrong). But the trajectory had many decisions. Which ones deserve credit? That's the <strong>credit-assignment problem</strong> — the central challenge of agentic RL (next lesson).</p></div>

  {

    body:`
    <p>An agent succeeds after 6 turns. <em>Which</em> decisions made it work? Spreading the final reward correctly across the trajectory is <strong>credit assignment</strong> — and getting it wrong is why naive agentic RL is unstable.</p>
    <div class="callout key"><h5>Three granularities of credit</h5><ul>
      <li><strong>Trajectory-level</strong> — one reward for the whole run. Simple, but every action (good or bad) gets the same credit. High variance, slow.</li>
      <li><strong>Turn-level</strong> — credit each turn (each reason→act→observe step). Captures that some turns mattered more. The pragmatic sweet spot for tool-use agents.</li>
      <li><strong>Token-level</strong> — credit every token. Standard PPO/GRPO does this, but treating a long reasoning token the same as a short action token causes the <em>action bottleneck</em>: rare, high-impact action tokens get drowned out by many reasoning tokens.</li>
    </ul></div>
    <div class="callout intuition"><h5>The one idea to remember</h5><p>In a trajectory that's <em>mostly</em> reasoning tokens with a <em>few</em> decisive action tokens (the tool calls), uniform token-level credit under-weights the actions that actually change outcomes. Recent methods (turn-level policy optimization, token-energy weighting) fix this by giving <strong>actions their due weight</strong> — credit where decisions were actually made.</p></div>
    <h3>Try it: assign the credit</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Credit-assignment lab</h4></div>
      <p class="wdesc">A successful 5-turn trajectory. Pick a credit scheme and see how reward is distributed — and which decisive action is correctly rewarded.</p>
      <div class="ctrls"><div class="ctrl"><label>Scheme</label><div class="seg" id="ca_seg"><button data-s="traj">trajectory</button><button class="on" data-s="turn">turn-level</button><button data-s="tok">token (uniform)</button></div></div></div>

    </div>

        <button class="opt">Rare high-impact action tokens being drowned out by many reasoning tokens under uniform credit</button>
        <button class="opt">Running out of GPU memory</button>
        <div class="explain">Uniform per-token credit treats a decisive tool-call token like any reasoning token. Since actions are few, they're under-weighted — turn-level or action-weighted credit fixes this.</div>
      </div>
    </div>`,

    body:`
    <p>The reward is the agent's objective — and if it's hackable, the agent will hack it. The 2025+ lesson (RLVR, Vol. 1) carries straight into agents: <strong>prefer verifiable rewards</strong> — automatic checks the agent can't game.</p>
    <div class="callout key"><h5>Reward sources, best to worst</h5><ul>
      <li><strong>Verifiable outcome</strong> — did the tool call return the right record? Did the booked time match? Exact, unhackable. Use whenever possible.</li>
      <li><strong>Checklist / process</strong> — per-turn verifiable sub-goals (resolved the city? used the right tool? cited a source?). Great for multi-turn credit (CM2).</li>
      <li><strong>Learned reward model</strong> — a model scoring quality. Flexible but hackable (the agent finds its blind spots).</li>

    <p>Evaluating a single LLM response is already tricky. Evaluating an <strong>agent</strong> is harder, for structural reasons:</p>
    <div class="callout warn"><h5>What makes it hard</h5><ul>
      <li><strong>Non-determinism</strong> — same input, different paths. A pass/fail can flip between runs.</li>
      <li><strong>Many valid paths</strong> — there's often no single "correct" trajectory; two different tool sequences can both be right.</li>
      <li><strong>Compounding errors</strong> — a small misstep on turn 2 can derail turns 3–8. Final-answer accuracy hides <em>where</em> it broke.</li>
      <li><strong>Expensive</strong> — multi-turn rollouts with real tools cost time and money per eval.</li>
    </ul></div>
    <div class="callout intuition"><h5>The mantra (from Vol. 1, still true)</h5><p><strong>Evaluation is almost all you need.</strong> Build the eval set before the agent. For agents specifically, you need both: <em>did it succeed?</em> (outcome) and <em>did it succeed for the right reasons?</em> (trajectory).</p></div>
    <h3>Try it: outcome vs trajectory</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Eval lens picker</h4></div>
      <p class="wdesc">Four runs. Toggle between scoring only the final answer (outcome) vs also checking the path (trajectory). See what each lens misses.</p>
      <div class="ctrls"><div class="ctrl"><label>Eval lens</label><div class="seg" id="we_seg"><button class="on" data-l="out">outcome only</button><button data-l="traj">+ trajectory</button></div></div></div>

      </div>

    init(root){
      let lens='out';
      const runs=[
        {ans:'✅ correct', path:'clean', ok:true},

        {ans:'❌ wrong', path:'tool errored, not recovered', ok:false},
        {ans:'✅ correct', path:'clean', ok:true}

      function draw(){

          let detail = lens==='out' ? r.ans : `${r.ans} · path: ${r.path}`;
          row.innerHTML=`<span class="nm">run ${i+1}: ${detail}</span><span class="lat" style="color:${pass?'var(--good)':'var(--bad)'};font-weight:700">${pass?'PASS':'FAIL'}</span>`;

function renderGlossary(){
  const terms=[
    ['Agent','Software that uses an LLM to decide its own control flow (which step/tool runs next), not just to generate text.'],
    ['Harness','Everything engineered around the model: tools, context assembly, memory, permissions, loop control, evals. Agent = Model + Harness.'],
    ['Harness engineering','The 2026 discipline of designing the system around the model so it reliably succeeds — and never repeats a fixed mistake.'],
    ['Context engineering','Deciding what information is in the window, where it lives, how it is assembled at runtime, and in what order.'],
    ['ReAct','Reason + Act loop: interleave reasoning with tool calls, feeding observations back each turn.'],
    ['Think–Act–Observe','The core agent loop: model reasons & chooses (think), harness runs the tool (act), result appended to context (observe).'],
    ['Action space','The complete set of tools an agent can call — it defines everything the agent can do.'],
    ['Tool','A typed function the model can call; name + description (a prompt) + argument schema. The agent\'s hands.'],
    ['Hook','A deterministic lifecycle callback around a tool call: PreToolUse can block/rewrite; PostToolUse can transform the result.'],
    ['Permissions (allow/ask/deny)','Per-action policy: auto-run safe actions, confirm consequential ones, block dangerous/irreversible ones.'],
    ['Blast radius','The worst-case impact of an agent action; bounded via sandboxing, scoped creds, dry-run modes.'],
    ['Skill','A packaged procedure (SKILL.md + assets) loaded on demand via progressive disclosure — procedural memory for agents.'],
    ['Progressive disclosure','Keep only metadata always-on; load a skill\'s full body (and companion files) only when the task triggers it.'],
    ['Context rot','Performance degrading as irrelevant/too-long context dilutes attention ("lost in the middle" + distraction).'],
    ['Compaction','Compressing an agent\'s growing history (rolling summary, checkpoint, or trained self-summarization) to survive long tasks.'],
    ['Prefix / prompt caching','Reusing the model\'s KV-cache for an unchanged context prefix across turns — big latency/cost win. Keep the prefix stable.'],
    ['Working memory','The context window: fast, fixed-size, wiped each turn.'],
    ['Episodic memory','Specific past events ("what happened"). Often distills into semantic facts over time.'],
    ['Semantic memory','Durable facts about the world/user ("what is true").'],
    ['Procedural memory','How to do things — skills, policies, playbooks.'],
    ['MemGPT / Letta','"LLM as OS": the agent pages information between the context window (RAM) and external stores (disk).'],
    ['Vector memory','Memories stored as embedded chunks, retrieved by similarity. Good for fuzzy "related to X" queries.'],
    ['Knowledge-graph memory','Entities + typed, time-stamped relations (Zep/Graphiti, A-Mem). Handles updates, contradictions, and multi-hop.'],
    ['LoCoMo / LongMemEval','Benchmarks for long, multi-session conversational memory — does the agent recall what it should?'],
    ['MCP','Model Context Protocol — open standard ("USB-C for AI") for connecting agents to tools/data. Turns M×N integrations into M+N.'],
    ['Host / Client / Server','MCP roles: the app (host), its per-server connector (client), and the capability wrapper (server).'],
    ['Tools / Resources / Prompts','MCP primitives: model-controlled functions, app-controlled read-only data, user-controlled templates.'],
    ['A2A','Agent-to-Agent protocol — agents advertise capabilities via "agent cards" and communicate peer-to-peer.'],
    ['Confused deputy','An attack where untrusted input tricks a privileged agent into misusing its legitimate access.'],
    ['Tool/prompt injection','Malicious instructions hidden in tool output or web content that hijack an agent treating it as context.'],
    ['Single vs multi-agent','One capable generalist vs a team of specialists. Specialists win when sub-tasks are independent/parallelizable.'],
    ['Supervisor pattern','A top agent delegates to specialist sub-agents and integrates results — centralized, traceable orchestration.'],
    ['Orchestration tax','The multiplied token/latency/$ cost of coordination in multi-agent systems (context propagation is the biggest driver).'],
    ['Agentic RL','Training a model as an agent via RL on multi-turn tool-use trajectories, optimizing for task outcomes.'],
    ['Credit assignment','Distributing a trajectory\'s reward across its decisions. Turn-level credit is the pragmatic sweet spot for tool agents.'],
    ['Action bottleneck','Under uniform token-level credit, rare high-impact action tokens get drowned out by many reasoning tokens.'],
    ['RLVR / verifiable reward','RL with an automatic, unhackable verifier (did the outcome actually happen?) instead of a gameable learned reward.'],
    ['Checklist reward','Verifiable per-turn sub-goals (resolved city? right tool? cited source?) — great for multi-turn credit.'],
    ['Trace / span','A trace is the tree of an agent run; each span is one timed step (LLM call, tool call, retrieval) with attributes.'],
    ['OTel gen_ai','OpenTelemetry GenAI semantic conventions — standard attributes (model, tokens, finish reason) for portable agent traces.'],
    ['Trajectory eval','Scoring the steps an agent took, not just the final answer — catches "right answer, wrong reason."'],
    ['LLM-as-judge','A strong model scoring outputs; useful for eval but biased (length/position) and risky as a training reward.']
  ].sort((a,b)=>a[0].localeCompare(b[0]));
  document.getElementById('view').innerHTML=`<div class="fadein">
    <div class="crumbs"><span>📖 Reference</span> › Glossary</div>
    <div class="lesson-h"><h2>Glossary — the Agent-Engineering Lexicon</h2></div>
    <p class="mut" style="margin-bottom:20px">${terms.length} terms every modern agent conversation assumes you know.</p>
    <div class="gloss">${terms.map(([t,d])=>`<div class="gterm"><b>${t}</b><span>${d}</span></div>`).join('')}</div>
    <div class="lnav"><a onclick="go('timeline')"><div class="dir">‹ Prev</div><div class="ttl">Timeline</div></a><a class="nx" onclick="go('cheatsheet')"><div class="dir">Next ›</div><div class="ttl">Cheat Sheet</div></a></div>
  </div>`;
  window.scrollTo(0,0);
}

function renderCheatsheet(){
  document.getElementById('view').innerHTML=`<div class="fadein">
    <div class="crumbs"><span>🃏 Reference</span> › Cheat Sheet</div>
    <div class="lesson-h"><h2>Agent-Engineering Cheat Sheet</h2></div>
    <p class="mut" style="margin-bottom:16px">The recipes worth memorizing for building real agents. Print-friendly.</p>
    <div class="content">
    <h3>The core loop</h3>
    <pre><code><span class="cm"># every agent, distilled</span>
state = [system, tools, goal]
while not done:
    thought, action = model(state)   <span class="cm"># THINK (model)</span>
    if action.final: return answer
    obs = run_tool(action)           <span class="cm"># ACT   (harness)</span>
    state += [thought, action, obs]  <span class="cm"># OBSERVE</span>

<span class="cm"># the one identity for this whole volume</span>
Agent = Model + Harness</code></pre>

    <h3>Decision recipes</h3>
    <table class="cmp">
      <tr><th>If you want to…</th><th>Reach for</th></tr>
      <tr><td>Decide agent vs workflow</td><td>Agent only if the <b>path varies</b> &amp; is <b>multi-step</b>. Else: pipeline/router.</td></tr>
      <tr><td>Make a tool the model uses well</td><td>Clear <b>description</b> (it\'s a prompt) + typed args + <b>trimmed return</b> + actionable errors</td></tr>
      <tr><td>Guarantee a safety rule</td><td><b>Deterministic hook</b> (block/rewrite), not a system-prompt request</td></tr>
      <tr><td>Stop irreversible mistakes</td><td><b>allow / ask / deny</b> + least privilege + sandbox</td></tr>
      <tr><td>Give procedures without context bloat</td><td><b>Skills</b> + progressive disclosure (metadata always-on, body on demand)</td></tr>
      <tr><td>Survive a long task</td><td><b>Compaction</b> (rolling summary / checkpoint / self-summarization)</td></tr>
      <tr><td>Cut agent latency &amp; cost</td><td><b>Stable prefix</b> → KV/prompt caching; volatile tokens last</td></tr>
      <tr><td>Persist user info</td><td>fact→<b>semantic</b>, event→<b>episodic</b>, how-to→<b>procedural</b>; vector first, graph when you need updates/multi-hop</td></tr>
      <tr><td>Connect tools to many agents</td><td><b>MCP</b> server (M+N, not M×N); curate — don\'t expose every endpoint</td></tr>
      <tr><td>Choose single vs multi-agent</td><td>Single by default; <b>specialists</b> when sub-tasks are independent/parallel</td></tr>
      <tr><td>Train an agent past the teacher</td><td><b>Agentic RL</b> on trajectories; <b>turn-level</b> credit; <b>verifiable</b> rewards</td></tr>
      <tr><td>Know if it works</td><td><b>Outcome + trajectory evals</b>; trace with OTel <code>gen_ai.*</code> spans</td></tr>
      <tr><td>Ship it</td><td>Regression suite in CI + guardrails + canary + SLOs + fallbacks</td></tr>
    </table>

    <h3>Mental models to keep</h3>
    <div class="kp"><ul>
      <li><b>The model is rented; the harness is your IP.</b> Same model + better harness wins on real tasks.</li>
      <li><b>Autonomy is a cost.</b> Don\'t add a loop the task doesn\'t need.</li>
      <li><b>Context is a budget, not a bucket.</b> Right tokens, right order, leave headroom.</li>
      <li><b>Context ≠ memory.</b> Page persistent facts in/out; don\'t hoard in-window.</li>
      <li><b>Descriptions are prompts.</b> Tool/skill selection lives or dies on them.</li>
      <li><b>Deterministic &gt; probabilistic for safety.</b> Hooks block 100%; prompts block "mostly."</li>
      <li><b>Verifiable reward &gt; learned reward.</b> If you can check it, don\'t let the agent game it.</li>
      <li><b>Credit where decisions are made.</b> Turn-level credit beats uniform token credit for tool agents.</li>
      <li><b>You can\'t fix what you can\'t see.</b> Trace everything; observability drives evolution.</li>
      <li><b>Evaluation is almost all you need.</b> Build the eval set before the agent.</li>
    </ul></div>
    <div class="callout frontier"><h5>Your "build this month" shortlist</h5><p>1) Wrap one internal capability as a clean, typed tool (MCP-style). 2) Build a single ReAct agent around it with allow/ask/deny + a city-id-style guard hook. 3) Add a 200-example eval set (outcome + trajectory checks) and run it in CI. 4) Instrument every step as an OTel span. 5) Persist user prefs as semantic memory, distill episodes weekly. 6) Only then consider a specialist sub-agent — and measure the orchestration tax.</p></div>
    </div>

  </div>`;
  window.scrollTo(0,0);
}
