<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced LLM Engineering Lab — Vol. 2: The Agentic Frontier</title>
<style>
:root{
  --bg:#0a0e17; --bg2:#0e1320; --panel:#121a2b; --panel2:#172238;
  --line:#22304d; --line2:#2e3f63;
  --txt:#dfe8f7; --mut:#8da2c4; --mut2:#6b7fa3;
  --acc:#5b8cff; --acc2:#8a5bff; --acc3:#21d4a8; --warn:#ffb454; --bad:#ff6b81; --good:#3fd07f;
  --inset:#0c1322;        /* recessed elements: range tracks, chips, readouts */
  --canvas-bg:#070b13;    /* canvas-wrap background */
  --strong:#ffffff;       /* bold text on dark */
  --onacc:#ffffff;        /* text on accent/gradient fills */
  --grad:linear-gradient(120deg,#5b8cff,#8a5bff 55%,#21d4a8);
  --shadow:0 8px 30px rgba(0,0,0,.45);
  --bgrad1:rgba(138,91,255,.10); --bgrad2:rgba(91,140,255,.10);
  --r:14px;
}
/* ---------- LIGHT THEME ---------- */
:root[data-theme="light"]{
  --bg:#f4f6fb; --bg2:#eef1f8; --panel:#ffffff; --panel2:#eef2fb;
  --line:#d9e0ee; --line2:#c2cce0;
  --txt:#1a2236; --mut:#5a6b8c; --mut2:#8493b0;
  --acc:#3b6fe0; --acc2:#7b46e6; --acc3:#0bae87; --warn:#d98a17; --bad:#e0455c; --good:#1ba85f;
  --inset:#f1f4fb; --canvas-bg:#f7f9fd; --strong:#0c1322; --onacc:#ffffff;
  --grad:linear-gradient(120deg,#3b6fe0,#7b46e6 55%,#0bae87);
  --shadow:0 8px 28px rgba(40,60,110,.14);
  --bgrad1:rgba(123,70,230,.10); --bgrad2:rgba(59,111,224,.12);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(1200px 700px at 80% -10%,var(--bgrad1),transparent 60%),
             radial-gradient(900px 600px at -10% 10%,var(--bgrad2),transparent 55%),
             var(--bg);
  color:var(--txt);
  font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--acc);text-decoration:none}
a:hover{text-decoration:underline}
code,kbd{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace}
::selection{background:rgba(91,140,255,.35)}

/* ---------- Layout ---------- */
#app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
#side{
  position:sticky;top:0;height:100vh;overflow-y:auto;
  background:linear-gradient(180deg,var(--bg2),var(--bg));
  border-right:1px solid var(--line);padding:18px 14px 40px;
}
#main{min-width:0;padding:0 0 80px}
.wrap{max-width:980px;margin:0 auto;padding:0 32px}

/* ---------- Sidebar ---------- */
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 14px}
.brand .logo{
  width:38px;height:38px;border-radius:11px;background:var(--grad);
  display:grid;place-items:center;font-size:20px;box-shadow:0 6px 18px rgba(91,140,255,.35);flex:none
}
.brand h1{font-size:15px;margin:0;letter-spacing:.2px;font-weight:700}
.brand p{margin:1px 0 0;font-size:11px;color:var(--mut)}

.progwrap{padding:6px 8px 14px}
.progbar{height:7px;border-radius:6px;background:var(--inset);overflow:hidden;border:1px solid var(--line)}
.progfill{height:100%;width:0;background:var(--grad);transition:width .5s cubic-bezier(.4,0,.2,1)}
.progtxt{font-size:11px;color:var(--mut);margin-top:6px;display:flex;justify-content:space-between}

.search{position:relative;margin:4px 8px 14px}
.search input{
  width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px;
  color:var(--txt);padding:9px 11px 9px 32px;font-size:13px;outline:none
}
.search input:focus{border-color:var(--acc)}
.search svg{position:absolute;left:10px;top:9px;opacity:.5}

.navsec{margin:2px 0}
.navsec>.sech{
  display:flex;align-items:center;gap:9px;width:100%;text-align:left;cursor:pointer;
  background:none;border:none;color:var(--txt);padding:8px 8px;border-radius:9px;font-size:13px;font-weight:600
}
.navsec>.sech:hover{background:var(--panel)}
.navsec .ic{font-size:15px;width:20px;text-align:center;flex:none}
.navsec .cnt{margin-left:auto;font-size:10px;color:var(--mut);background:var(--inset);border:1px solid var(--line);border-radius:20px;padding:1px 7px}
.lessons{overflow:hidden;max-height:0;transition:max-height .3s ease}
.navsec.open .lessons{max-height:800px}
.lessonlink{
  display:flex;align-items:center;gap:8px;padding:6px 8px 6px 37px;font-size:12.5px;color:var(--mut);
  cursor:pointer;border-radius:8px;position:relative
}
.lessonlink:hover{background:var(--panel);color:var(--txt)}
.lessonlink.active{background:var(--panel2);color:var(--strong);font-weight:600}
.lessonlink.active::before{content:"";position:absolute;left:24px;top:50%;transform:translateY(-50%);width:3px;height:16px;border-radius:3px;background:var(--grad)}
.dot{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--line2);flex:none}
.lessonlink.done .dot{background:var(--good);border-color:var(--good)}
.chev{margin-left:auto;transition:transform .25s;opacity:.5}
.navsec.open .chev{transform:rotate(90deg)}

.sidefoot{padding:14px 10px 0;margin-top:12px;border-top:1px solid var(--line);font-size:11px;color:var(--mut2)}
.sidefoot button{background:none;border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:5px 9px;font-size:11px;cursor:pointer;margin-top:8px}
.sidefoot button:hover{border-color:var(--bad);color:var(--bad)}

/* ---------- Hero / Home ---------- */
.hero{padding:42px 0 14px}
.hero .eyebrow{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--acc3);font-weight:700}
.hero h2{font-size:40px;line-height:1.1;margin:10px 0 8px;font-weight:800;letter-spacing:-.5px}
.hero h2 .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero p.lead{font-size:17px;color:var(--mut);max-width:680px;margin:0 0 22px}
.stat-row{display:flex;gap:14px;flex-wrap:wrap;margin:6px 0 26px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 16px;min-width:120px}
.stat b{font-size:22px;display:block;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat span{font-size:11.5px;color:var(--mut)}

.tracks{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin:8px 0 36px}
.trackcard{
  background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--r);
  padding:18px;cursor:pointer;transition:.2s;position:relative;overflow:hidden
}
.trackcard:hover{border-color:var(--line2);transform:translateY(-3px);box-shadow:var(--shadow)}
.trackcard .ti{font-size:26px;margin-bottom:8px}
.trackcard h3{margin:0 0 5px;font-size:16px}
.trackcard p{margin:0;font-size:12.5px;color:var(--mut);line-height:1.5}
.trackcard .meta{margin-top:12px;font-size:11px;color:var(--mut2);display:flex;align-items:center;gap:8px}
.trackcard .tprog{height:4px;background:var(--inset);border-radius:4px;flex:1;overflow:hidden}
.trackcard .tprog i{display:block;height:100%;background:var(--grad)}

/* ---------- Lesson content ---------- */
.crumbs{font-size:12px;color:var(--mut);padding:26px 0 4px}
.crumbs span{color:var(--acc3)}
.lesson-h{display:flex;align-items:flex-start;gap:14px;margin:6px 0 6px}
.lesson-h h2{font-size:30px;margin:0;font-weight:800;letter-spacing:-.4px;line-height:1.15}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 22px}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--line);color:var(--mut);background:var(--panel)}
.badge.lv{color:var(--acc3);border-color:rgba(33,212,168,.4)}
.badge.tm{color:var(--warn);border-color:rgba(255,180,84,.35)}

.content{font-size:15.5px}
.content h3{font-size:19px;margin:30px 0 10px;font-weight:700;display:flex;align-items:center;gap:8px}
.content h3::before{content:"";width:4px;height:18px;border-radius:3px;background:var(--grad)}
.content h4{font-size:15px;margin:20px 0 8px;color:var(--txt)}
.content p{margin:11px 0;color:var(--txt)}
.content ul,.content ol{margin:11px 0;padding-left:22px;color:var(--txt)}
.content li{margin:6px 0}
.content strong{color:var(--strong)}
.content em{color:var(--acc3);font-style:normal;font-weight:600}
.content .mut{color:var(--mut)}

.callout{border-radius:12px;padding:14px 16px;margin:18px 0;border:1px solid var(--line);background:var(--panel);position:relative;padding-left:46px}
.callout::before{position:absolute;left:15px;top:13px;font-size:17px}
.callout.key{border-color:rgba(91,140,255,.35);background:rgba(91,140,255,.07)}
.callout.key::before{content:"🔑"}
.callout.intuition{border-color:rgba(33,212,168,.35);background:rgba(33,212,168,.07)}
.callout.intuition::before{content:"💡"}
.callout.warn{border-color:rgba(255,180,84,.35);background:rgba(255,180,84,.07)}
.callout.warn::before{content:"⚠️"}
.callout.frontier{border-color:rgba(138,91,255,.4);background:rgba(138,91,255,.08)}
.callout.frontier::before{content:"🚀"}
.callout h5{margin:0 0 4px;font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--mut)}
.callout p{margin:4px 0;font-size:14px}

pre{background:#0d1322;border:1px solid var(--line);border-radius:12px;padding:15px 16px;overflow-x:auto;margin:16px 0;position:relative}
pre code{font-size:13px;line-height:1.65;color:#cfe0ff}
pre .cm{color:#5e7299}pre .kw{color:#c792ea}pre .st{color:#a5e8a0}pre .fn{color:#82aaff}pre .nm{color:#f78c6c}
.copy{position:absolute;top:8px;right:8px;background:var(--panel);border:1px solid var(--line);color:var(--mut);border-radius:7px;font-size:11px;padding:3px 9px;cursor:pointer}
.copy:hover{color:var(--txt);border-color:var(--line2)}
.codecap{font-size:11px;color:var(--mut2);margin:-10px 0 16px;padding-left:4px}

table.cmp{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
table.cmp th,table.cmp td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top}
table.cmp th{background:var(--panel2);color:var(--strong);font-weight:600}
table.cmp tr:nth-child(even) td{background:rgba(255,255,255,.015)}
table.cmp td b{color:var(--acc3)}

.kp{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px 18px;margin:18px 0}
.kp .kph{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--acc);font-weight:700;padding:10px 0 2px}
.kp ul{margin:6px 0 12px}

/* ---------- Widgets ---------- */
.widget{background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--line2);border-radius:16px;padding:18px;margin:22px 0;box-shadow:var(--shadow)}
.widget .wh{display:flex;align-items:center;gap:9px;margin-bottom:4px}
.widget .wh .tag{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--onacc);background:var(--grad);padding:3px 9px;border-radius:20px;font-weight:700}
.widget .wh h4{margin:0;font-size:15px}
.widget .wdesc{font-size:12.5px;color:var(--mut);margin:0 0 14px}
.ctrls{display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin:6px 0 14px}
.ctrl{display:flex;flex-direction:column;gap:4px;min-width:130px}
.ctrl label{font-size:11px;color:var(--mut);display:flex;justify-content:space-between}
.ctrl label b{color:var(--acc3)}
input[type=range]{-webkit-appearance:none;appearance:none;height:5px;border-radius:5px;background:var(--inset);border:1px solid var(--line);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 0 0 3px rgba(91,140,255,.2)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border:none;border-radius:50%;background:var(--acc);cursor:pointer}
.seg{display:inline-flex;background:var(--inset);border:1px solid var(--line);border-radius:9px;padding:2px}
.seg button{background:none;border:none;color:var(--mut);font-size:12px;padding:5px 11px;border-radius:7px;cursor:pointer}
.seg button.on{background:var(--panel2);color:var(--strong)}
.btn{background:var(--grad);border:none;color:var(--onacc);font-weight:600;font-size:13px;padding:8px 15px;border-radius:9px;cursor:pointer}
.btn:hover{filter:brightness(1.1)}
.btn.ghost{background:none;border:1px solid var(--line2);color:var(--txt)}
.canvas-wrap{background:var(--canvas-bg);border:1px solid var(--line);border-radius:12px;padding:12px;overflow-x:auto}
canvas{display:block;max-width:100%}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--mut);margin-top:10px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.readout{font-size:12.5px;color:var(--mut);margin-top:12px;background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:10px 13px}
.readout b{color:var(--acc3)}

/* token + bars widgets */
.tokrow{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.tok{padding:6px 10px;border-radius:8px;background:var(--inset);border:1px solid var(--line);font-size:13px;cursor:pointer;font-family:"SF Mono",monospace;transition:.15s}
.tok:hover{border-color:var(--acc)}
.tok.sel{background:var(--acc);color:var(--onacc);border-color:var(--acc)}
.bars{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.bar{display:flex;align-items:center;gap:9px;font-size:12px}
.bar .lbl{width:90px;text-align:right;color:var(--mut);font-family:"SF Mono",monospace;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .track{flex:1;background:var(--inset);border-radius:6px;height:16px;overflow:hidden;border:1px solid var(--line)}
.bar .fill{height:100%;background:var(--grad);transition:width .35s}
.bar .pct{width:52px;color:var(--mut);font-family:"SF Mono",monospace;flex:none}
.bar.dim{opacity:.32}

/* ---------- Quiz ---------- */
.quiz{background:var(--panel);border:1px solid var(--line2);border-radius:16px;padding:20px;margin:26px 0}
.quiz .qh{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--acc2);font-weight:700;margin-bottom:14px}
.qitem{margin-bottom:18px}
.qitem .q{font-weight:600;margin-bottom:9px}
.opt{display:block;width:100%;text-align:left;background:var(--inset);border:1px solid var(--line);color:var(--txt);padding:10px 13px;border-radius:9px;margin:6px 0;cursor:pointer;font-size:13.5px;transition:.15s}
.opt:hover{border-color:var(--line2)}
.opt.correct{border-color:var(--good);background:rgba(63,208,127,.12)}
.opt.wrong{border-color:var(--bad);background:rgba(255,107,129,.12)}
.opt.dis{cursor:default;opacity:.7}
.explain{font-size:12.5px;color:var(--mut);margin-top:8px;padding:9px 12px;border-left:3px solid var(--acc3);background:rgba(33,212,168,.05);border-radius:0 8px 8px 0;display:none}
.explain.show{display:block}

/* ---------- Footer nav ---------- */
.lnav{display:flex;justify-content:space-between;gap:14px;margin:42px 0 0;border-top:1px solid var(--line);padding-top:22px}
.lnav a{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 16px;cursor:pointer;transition:.2s}
.lnav a:hover{border-color:var(--line2);text-decoration:none;background:var(--panel2)}
.lnav .dir{font-size:11px;color:var(--mut)}
.lnav .ttl{font-size:14px;font-weight:600;color:var(--txt);margin-top:2px}
.lnav a.nx{text-align:right}
.markdone{display:flex;align-items:center;gap:10px;margin:30px 0 0;padding:14px 16px;background:var(--panel);border:1px solid var(--line);border-radius:12px}
.markdone label{font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px}
.markdone input{width:18px;height:18px;accent-color:var(--good)}

/* timeline / glossary / cheatsheet */
.tl{position:relative;margin:20px 0;padding-left:26px}
.tl::before{content:"";position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:var(--line2)}
.tlitem{position:relative;margin-bottom:20px}
.tlitem::before{content:"";position:absolute;left:-23px;top:5px;width:12px;height:12px;border-radius:50%;background:var(--grad);box-shadow:0 0 0 3px var(--bg)}
.tlitem .yr{font-size:12px;color:var(--acc3);font-weight:700}
.tlitem h4{margin:2px 0 4px;font-size:15px}
.tlitem p{margin:0;font-size:13px;color:var(--mut)}
.gloss{columns:2;column-gap:24px}
@media(max-width:780px){.gloss{columns:1}}
.gterm{break-inside:avoid;margin-bottom:14px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 14px}
.gterm b{color:var(--acc);display:block;font-size:13.5px;margin-bottom:3px}
.gterm span{font-size:12.5px;color:var(--mut)}

.pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);color:var(--mut);margin:0 4px 4px 0}

/* mobile */
#menubtn{display:none}
@media(max-width:880px){
  #app{grid-template-columns:1fr}
  #side{position:fixed;z-index:50;width:300px;transform:translateX(-105%);transition:transform .25s;box-shadow:var(--shadow)}
  #side.show{transform:none}
  #menubtn{display:grid;position:fixed;top:14px;left:14px;z-index:60;width:42px;height:42px;place-items:center;background:var(--panel);border:1px solid var(--line2);border-radius:11px;color:var(--txt);font-size:18px;cursor:pointer}
  .wrap{padding:0 18px}
  .hero h2{font-size:32px}
  #backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;display:none}
  #backdrop.show{display:block}
}
.fadein{animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hidden{display:none!important}

/* code blocks stay dark in both themes (syntax palette is tuned for dark) */
:root[data-theme="light"] pre{background:#0e1626;border-color:#1f2c44;box-shadow:0 4px 14px rgba(40,60,110,.12)}
:root[data-theme="light"] pre code{color:#cfe0ff}
:root[data-theme="light"] pre.diagram code,:root[data-theme="light"] pre code .cm{}
:root[data-theme="light"] .copy{background:#172238;border-color:#2e3f63;color:#8da2c4}
/* callout tints a touch stronger in light for contrast */
:root[data-theme="light"] .callout.key{background:rgba(59,111,224,.08)}
:root[data-theme="light"] .callout.intuition{background:rgba(11,174,135,.10)}
:root[data-theme="light"] .callout.warn{background:rgba(217,138,23,.12)}
:root[data-theme="light"] .callout.frontier{background:rgba(123,70,230,.10)}
:root[data-theme="light"] .hero h2 .g,:root[data-theme="light"] .stat b{filter:saturate(1.1)}
:root[data-theme="light"] input[type=range]{background:#e3e9f5}
:root[data-theme="light"] ::selection{background:rgba(59,111,224,.22)}

/* ---------- theme toggle ---------- */
.themebtn{display:flex;align-items:center;gap:8px;width:100%;justify-content:center;
  background:var(--panel);border:1px solid var(--line);color:var(--mut);border-radius:10px;
  padding:8px 10px;font-size:12px;cursor:pointer;margin:2px 8px 12px;width:calc(100% - 16px);transition:.15s}
.themebtn:hover{border-color:var(--line2);color:var(--txt)}
.themebtn .tic{font-size:14px}


/* ---------- Vol 2 additions ---------- */
.vollink{display:block;margin:2px 8px 12px;padding:8px 10px;border:1px dashed var(--line2);border-radius:10px;font-size:11.5px;color:var(--mut);background:var(--panel);text-decoration:none;line-height:1.4}
.vollink:hover{border-color:var(--acc);color:var(--txt);text-decoration:none}
.vollink b{color:var(--acc)}
/* generic step/flow widget bits reused across tracks */
.flow{display:flex;flex-wrap:wrap;gap:8px;align-items:stretch;margin:12px 0}
.node{flex:1;min-width:120px;background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12.5px;transition:.2s;position:relative}
.node.on{border-color:var(--acc);background:rgba(91,140,255,.10);box-shadow:0 0 0 1px var(--acc)}
.node.act{border-color:var(--acc3);background:rgba(33,212,168,.10)}
.node h6{margin:0 0 3px;font-size:12px;color:var(--strong);font-weight:700}
.node small{color:var(--mut);font-size:11px;display:block}
.arrow{align-self:center;color:var(--mut);font-size:18px;flex:none}
/* token/budget bars */
.budget{height:26px;border-radius:7px;overflow:hidden;display:flex;border:1px solid var(--line);background:var(--inset);margin:10px 0}
.budget .seg-b{height:100%;display:flex;align-items:center;justify-content:center;font-size:10.5px;color:var(--onacc);font-weight:600;overflow:hidden;white-space:nowrap;transition:width .35s}
.legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11.5px;color:var(--mut);margin:4px 0 8px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
/* trace tree */
.trace{font-family:"SF Mono",ui-monospace,monospace;font-size:12px;margin:10px 0}

.chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.chip{background:var(--inset);border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:12px}

.chip.acc b{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

.toggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;margin:8px 0}

<body>
<button id="menubtn" onclick="toggleSide()">☰</button>
<div id="backdrop" onclick="toggleSide()"></div>
<div id="app">
  <aside id="side">
    <div class="brand" onclick="go('home')" style="cursor:pointer">
      <div class="logo">🧠</div>
      <div><h1>Advanced LLM Engineering Lab</h1><p>Vol. 2 — The Agentic Frontier</p></div>
    </div>
    <div class="progwrap">
      <div class="progbar"><div class="progfill" id="progfill"></div></div>
      <div class="progtxt"><span id="progtxt">0 / 0 lessons</span><span id="progpct">0%</span></div>
    </div>
    <button class="themebtn" id="themebtn" onclick="toggleTheme()"><span class="tic">☀️</span> Switch to Light</button>
    <a class="vollink" href="llm-catchup-lab.html" title="Open Volume 1">
      <b>← Vol. 1:</b> LLM Catch-Up Lab<br>Transformers → the 2026 frontier
    </a>
    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" placeholder="Search lessons & concepts…" oninput="doSearch(this.value)" autocomplete="off">
    </div>
    <nav id="nav"></nav>
    <div class="sidefoot">
      Progress is saved in your browser (localStorage). No data leaves this machine.
      <br><button onclick="resetProgress()">Reset progress</button>
    </div>
  </aside>
  <main id="main"><div class="wrap" id="view"></div></main>
</div>
<script>


/* ============================================================
   THEME (light / dark) — palette + toggle
   ============================================================ */
const THEME_KEY='llmlab.theme.v1';
// canvas color palette, recomputed per theme
let CC = {};
function computeCanvasColors(){
  const light = document.documentElement.getAttribute('data-theme')==='light';
  CC = light ? {
    grid:'#d2dbec', grid2:'#e4eaf6', axis:'#c2cce0',
    label:'#5a6b8c', labelDim:'#8493b0',
    inset:'#eef2fb', dim:'#c2cce0', marker:'#1a2236',
    track:'#e6ebf6'
  } : {
    grid:'#22304d', grid2:'#16223a', axis:'#22304d',
    label:'#637fa3', labelDim:'#8da2c4',
    inset:'#0c1322', dim:'#33425e', marker:'#ffffff',
    track:'#0c1322'
  };
}
function getTheme(){ try{return localStorage.getItem(THEME_KEY)||'dark'}catch(e){return 'dark'} }
function applyTheme(t,rerender){
  document.documentElement.setAttribute('data-theme', t);
  try{localStorage.setItem(THEME_KEY,t)}catch(e){}
  computeCanvasColors();
  updateThemeBtn();
  if(rerender && current) go(current);   // re-render so canvases redraw with new palette
}
function toggleTheme(){ applyTheme(getTheme()==='light'?'dark':'light', true); }
function updateThemeBtn(){
  const b=document.getElementById('themebtn'); if(!b)return;
  const light=getTheme()==='light';
  b.innerHTML = light
    ? '<span class="tic">🌙</span> Switch to Dark'
    : '<span class="tic">☀️</span> Switch to Light';
}

/* ============================================================
   LLM Catch-Up Lab — engine
   ============================================================ */
const CURRICULUM = [];   // filled by track files below
const LESSON_INDEX = {}; // id -> {lesson, track, ti, li}
const ORDER = [];        // flat lesson ids in order

function registerTrack(t){ CURRICULUM.push(t); }
function buildIndex(){
  ORDER.length=0;
  CURRICULUM.forEach((t,ti)=>{
    t.lessons.forEach((l,li)=>{
      LESSON_INDEX[l.id]={lesson:l,track:t,ti,li};
      ORDER.push(l.id);
    });
  });
}

/* ---------- progress (localStorage) ---------- */
const PKEY='llmlab.v2pub.progress.v1';
let DONE = load();
function load(){ try{return JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){return {}} }
function save(){ try{localStorage.setItem(PKEY,JSON.stringify(DONE))}catch(e){} }
function isDone(id){ return !!DONE[id] }
function setDone(id,v){ if(v)DONE[id]=1; else delete DONE[id]; save(); renderSidebar(); updateProg(); }
function resetProgress(){ if(confirm('Reset all lesson progress?')){DONE={};save();renderSidebar();updateProg();go(current||'home');} }

function totalLessons(){ return ORDER.length }
function doneCount(){ return ORDER.filter(isDone).length }
function updateProg(){
  const d=doneCount(),t=totalLessons(),p=t?Math.round(d/t*100):0;
  document.getElementById('progfill').style.width=p+'%';
  document.getElementById('progtxt').textContent=d+' / '+t+' lessons';
  document.getElementById('progpct').textContent=p+'%';
}

/* ---------- sidebar ---------- */
let openTracks={};
function renderSidebar(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  CURRICULUM.forEach((t,ti)=>{
    const sec=document.createElement('div'); sec.className='navsec'+(openTracks[ti]?' open':'');
    const done=t.lessons.filter(l=>isDone(l.id)).length;
    const h=document.createElement('button'); h.className='sech';
    h.innerHTML=`<span class="ic">${t.icon}</span><span>${t.title}</span><span class="cnt">${done}/${t.lessons.length}</span><span class="chev">›</span>`;
    h.onclick=()=>{openTracks[ti]=!openTracks[ti];renderSidebar();};
    sec.appendChild(h);
    const ll=document.createElement('div'); ll.className='lessons';
    t.lessons.forEach(l=>{
      const a=document.createElement('div');
      a.className='lessonlink'+(l.id===current?' active':'')+(isDone(l.id)?' done':'');
      a.innerHTML=`<span class="dot"></span><span>${l.title}</span>`;
      a.onclick=()=>{go(l.id); if(window.innerWidth<=880)toggleSide(true);};
      ll.appendChild(a);
    });
    sec.appendChild(ll); nav.appendChild(sec);
  });
}

/* ---------- router ---------- */
let current=null;
function go(id){
  current=id;
  if(id==='home'){ renderHome(); }
  else if(id==='timeline'){ renderTimeline(); }
  else if(id==='glossary'){ renderGlossary(); }
  else if(id==='cheatsheet'){ renderCheatsheet(); }
  else { renderLesson(id); }
  // open the containing track
  const idx=LESSON_INDEX[id];
  if(idx){ openTracks[idx.ti]=true; }
  renderSidebar(); updateProg();
  document.getElementById('main').scrollTop=0; window.scrollTo(0,0);
  if(history.replaceState) history.replaceState(null,'','#'+id);
}

/* ---------- home ---------- */
function renderHome(){
  const v=document.getElementById('view');
  const total=totalLessons(), done=doneCount();
  let tracks='';
  CURRICULUM.forEach((t,ti)=>{
    const d=t.lessons.filter(l=>isDone(l.id)).length, p=Math.round(d/t.lessons.length*100);
    tracks+=`<div class="trackcard" onclick="go('${t.lessons[0].id}')">
      <div class="ti">${t.icon}</div><h3>${t.title}</h3><p>${t.blurb}</p>
      <div class="meta"><span>${t.lessons.length} lessons</span><div class="tprog"><i style="width:${p}%"></i></div><span>${p}%</span></div>
    </div>`;
  });
  v.innerHTML=`<div class="fadein">
  <div class="hero">
    <div class="eyebrow">Volume 2 · Agent &amp; Systems Engineering</div>
    <h2>Build <span class="g">real agents</span><br>— harness, memory, tools, orchestration.</h2>
    <p class="lead">Vol. 1 rebuilt your mental model of modern LLM <em>research</em>. This volume is about <em>engineering</em>:
    the agent loop, <strong>harness engineering</strong>, context &amp; memory systems, building <strong>agentic APIs (MCP)</strong>,
    generalist-vs-specialist orchestration, training agents with RL, and shipping them with real evals.</p>
    <div class="stat-row">
      <div class="stat"><b>${total}</b><span>interactive lessons</span></div>
      <div class="stat"><b>${CURRICULUM.length}</b><span>engineering tracks</span></div>
      <div class="stat"><b>${done}</b><span>completed by you</span></div>
      <div class="stat"><b>100%</b><span>offline · local</span></div>
    </div>
    <a class="vollink" style="max-width:520px;margin:0 0 8px" href="llm-catchup-lab.html">
      <b>New here?</b> Start with <b>Vol. 1 — LLM Catch-Up Lab</b> (transformers → the 2026 frontier), then come back for the agentic stack.
    </a>
  </div>
  <h3 style="font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin:10px 0 14px">Pick a track — or just start at the top</h3>
  <div class="tracks">${tracks}</div>
  <div class="callout intuition"><h5>How to use this</h5>
  <p>Each lesson is self-contained: a tight conceptual explanation, a hands-on widget to build intuition, a "what changed recently" note, and a quick self-check. Mark lessons done to track progress (saved locally). Use search (top-left) to jump to any concept. There's also a <a onclick="go('timeline')">Timeline</a>, <a onclick="go('glossary')">Glossary</a>, and a printable <a onclick="go('cheatsheet')">Cheat Sheet</a>.</p></div>
  <div class="callout key"><h5>The mental model for this whole volume</h5>
  <p><strong>Agent = Model + Harness.</strong> The model is the brain you mostly rent; the <em>harness</em> is everything you build around it — tools, context assembly, memory, permissions, orchestration, evals. 2024 was prompt engineering; 2025 was context engineering; <strong>2026 is harness engineering</strong>. This volume is about the harness.</p></div>
  <p class="mut" style="font-size:12.5px;margin-top:26px">Built as a single static HTML file — no server, no network. Open it anywhere.</p>
  </div>`;
}
/* ---------- lesson ---------- */
function renderLesson(id){
  const idx=LESSON_INDEX[id]; if(!idx){renderHome();return;}
  const {lesson,track,ti,li}=idx;
  const v=document.getElementById('view');
  const prevId=ORDER[ORDER.indexOf(id)-1], nextId=ORDER[ORDER.indexOf(id)+1];
  const lv=lesson.level||'Core', tm=lesson.time||'8 min';
  v.innerHTML=`<div class="fadein">
    <div class="crumbs"><span>${track.icon} ${track.title}</span> &nbsp;›&nbsp; Lesson ${li+1} of ${track.lessons.length}</div>
    <div class="lesson-h"><h2>${lesson.title}</h2></div>
    <div class="badges">
      <span class="badge lv">${lv}</span>
      <span class="badge tm">⏱ ${tm}</span>
      ${(lesson.tags||[]).map(t=>`<span class="badge">${t}</span>`).join('')}
    </div>
    <div class="content">${lesson.body}</div>
    <div class="markdone"><label><input type="checkbox" id="donechk" ${isDone(id)?'checked':''} onchange="setDone('${id}',this.checked)"> Mark this lesson complete</label></div>
    <div class="lnav">
      ${prevId?`<a onclick="go('${prevId}')"><div class="dir">‹ Previous</div><div class="ttl">${LESSON_INDEX[prevId].lesson.title}</div></a>`:`<a onclick="go('home')"><div class="dir">‹ Back</div><div class="ttl">Home</div></a>`}
      ${nextId?`<a class="nx" onclick="go('${nextId}')"><div class="dir">Next ›</div><div class="ttl">${LESSON_INDEX[nextId].lesson.title}</div></a>`:`<a class="nx" onclick="go('cheatsheet')"><div class="dir">Finish ›</div><div class="ttl">Cheat Sheet</div></a>`}
    </div>
  </div>`;
  // wire generic widgets + lesson-specific init
  wireQuizzes(v); wireCopy(v);
  if(typeof lesson.init==='function'){ try{lesson.init(v);}catch(e){console.error('init',id,e);} }
}

/* ---------- generic interactions ---------- */
function wireCopy(root){
  root.querySelectorAll('pre').forEach(pre=>{
    if(pre.querySelector('.copy'))return;
    const b=document.createElement('button'); b.className='copy'; b.textContent='copy';
    b.onclick=()=>{const t=pre.querySelector('code').innerText;navigator.clipboard&&navigator.clipboard.writeText(t);b.textContent='copied';setTimeout(()=>b.textContent='copy',1200);};
    pre.appendChild(b);
  });
}
function wireQuizzes(root){
  root.querySelectorAll('.qitem').forEach(item=>{
    const correct=+item.dataset.correct;
    const opts=[...item.querySelectorAll('.opt')];
    opts.forEach((o,i)=>{
      o.onclick=()=>{
        if(item.dataset.answered)return; item.dataset.answered=1;
        opts.forEach(x=>x.classList.add('dis'));
        if(i===correct){o.classList.add('correct');}
        else{o.classList.add('wrong');opts[correct].classList.add('correct');}
        const ex=item.querySelector('.explain'); if(ex)ex.classList.add('show');
      };
    });
  });
}

/* ---------- search ---------- */
function doSearch(q){
  q=q.trim().toLowerCase();
  const nav=document.getElementById('nav');
  if(!q){renderSidebar();return;}
  let html='';
  CURRICULUM.forEach(t=>{
    t.lessons.forEach(l=>{
      const hay=(l.title+' '+(l.tags||[]).join(' ')+' '+(l.search||'')).toLowerCase();
      if(hay.includes(q)){
        html+=`<div class="lessonlink ${isDone(l.id)?'done':''}" onclick="go('${l.id}')"><span class="dot"></span><span>${l.title}</span></div>`;
      }
    });
  });
  nav.innerHTML=html||'<p style="color:var(--mut);font-size:12px;padding:10px">No matches.</p>';
}

/* ---------- mobile ---------- */
function toggleSide(force){
  const s=document.getElementById('side'),b=document.getElementById('backdrop');
  if(force){s.classList.remove('show');b.classList.remove('show');return;}
  s.classList.toggle('show');b.classList.toggle('show');
}

/* ---------- small canvas helpers ---------- */
function clearCanvas(ctx,w,h){ctx.clearRect(0,0,w,h);}
function line(ctx,x1,y1,x2,y2,c,w){ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
function softmax(arr){const m=Math.max(...arr);const e=arr.map(x=>Math.exp(x-m));const s=e.reduce((a,b)=>a+b,0);return e.map(x=>x/s);}

/* ============================================================
   TRACK 1 — Foundations: the Transformer
   ============================================================ */


/* ============================================================
   TRACK 1 — The Agent Loop, Properly
   ============================================================ */
registerTrack({
  icon:'🔁', title:'The Agent Loop, Properly',
  blurb:'What an agent actually is: Model + Harness. The Think–Act–Observe loop, tools as the action space, and the anatomy of a single turn.',
  lessons:[

  {
    id:'agent-def', title:'Agent = Model + Harness', level:'Warm-up', time:'7 min',
    tags:['definition','harness','autonomy'],
    search:'what is an agent model plus harness definition autonomy llm decides control flow loop vs workflow harness engineering',
    body:`
    <p>An <strong>agent</strong> is software that uses an LLM to <em>decide its own control flow</em>. In ordinary code, <code>if</code>/<code>else</code> and loops are fixed by the programmer. In an agent, the <strong>model chooses the next step</strong> — which tool to call, whether to keep going, when it's done.</p>
    <div class="callout intuition"><h5>The one equation for this whole volume</h5><p><strong>Agent = Model + Harness.</strong> The <em>model</em> is the brain (you mostly rent it). The <em>harness</em> is everything you build around it: the tool set, how context is assembled, memory, permissions, the loop, and the evals. Two teams using the same model get wildly different agents because the <strong>harness</strong> differs.</p></div>
    <p>It helps to place things on a spectrum of autonomy:</p>
    <table class="cmp">
      <tr><th>Type</th><th>Who picks the next step?</th><th>Example</th></tr>
      <tr><td><b>Pipeline / chain</b></td><td>You (fixed DAG)</td><td>RAG: retrieve → stuff → answer</td></tr>
      <tr><td><b>Router / workflow</b></td><td>Model picks <em>among fixed branches</em></td><td>"classify intent, route to handler"</td></tr>
      <tr><td><b>Agent (ReAct)</b></td><td>Model picks tools in an open loop</td><td>"research X" → search, read, refine, answer</td></tr>
      <tr><td><b>Multi-agent</b></td><td>A supervisor model delegates to sub-agents</td><td>planner + workers + critic</td></tr>
    </table>
    <div class="callout warn"><h5>Don't reach for an agent first</h5><p>Autonomy is a cost, not a feature. If a fixed pipeline solves the task reliably, ship that. Add a loop only when the <em>path</em> genuinely varies per input. Most "agent" failures are workflows that didn't need a loop.</p></div>
    <h3>Try it: workflow or agent?</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Autonomy classifier</h4></div>
      <p class="wdesc">Toggle properties of a task. The widget tells you where on the autonomy spectrum it lands — and whether you actually need an agent.</p>
      <div class="toggrid" id="ad_caps"></div>
      <div class="readout" id="ad_out"></div>
    </div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="1">
        <div class="q">What most distinguishes an "agent" from a normal program calling an LLM?</div>
        <button class="opt">It uses a bigger model</button>
        <button class="opt">The LLM decides the control flow (which step runs next)</button>
        <button class="opt">It always uses multiple agents</button>
        <div class="explain">The defining property is that the model — not hardcoded branching — chooses the next action. Size and multiplicity are orthogonal.</div>
      </div>
    </div>`,
    init(root){
      const props={
        'path varies per input':false,
        'needs external tools/data':false,
        'multi-step / unknown length':false,
        'sub-tasks are independent':false,
        'high error cost (irreversible)':false
      };
      const wrap=root.querySelector('#ad_caps');
      Object.keys(props).forEach(k=>{
        const b=document.createElement('button');b.className='opt toggle-opt';
        b.textContent='☐ '+k;
        b.onclick=()=>{props[k]=!props[k];b.textContent=(props[k]?'☑ ':'☐ ')+k;b.classList.toggle('correct',props[k]);draw();};
        wrap.appendChild(b);
      });
      function draw(){
        const varies=props['path varies per input'], tools=props['needs external tools/data'],
              multi=props['multi-step / unknown length'], indep=props['sub-tasks are independent'],
              risk=props['high error cost (irreversible)'];
        let verdict, why;
        if(!varies && !multi){ verdict='📦 Fixed pipeline / chain'; why='The path doesn\'t vary — hardcode the DAG. An agent would only add latency, cost, and non-determinism.'; }
        else if(varies && !multi){ verdict='🔀 Router / workflow'; why='The model picks among a few known branches, but each branch is fixed. Use a classifier/router, not an open loop.'; }
        else if(multi && indep){ verdict='🪢 Multi-agent (parallel)'; why='Independent sub-tasks of unknown length → a supervisor can fan out to specialist sub-agents (Track 6).'; }
        else if(multi){ verdict='🔁 Single ReAct agent'; why='Variable, multi-step path → an open Think–Act–Observe loop with tools is the right shape.'; }
        else { verdict='🤔 Probably a workflow'; why='Reconsider — without a variable, multi-step path you likely don\'t need autonomy.'; }
        if(risk) why+=' ⚠️ High error cost means you also need guardrails + human-in-the-loop on irreversible actions (Track 2).';
        root.querySelector('#ad_out').innerHTML=`<b>${verdict}</b><br><span class="mut">${why}</span>`;
      }
      draw();
    }
  },

  {
    id:'tao-loop', title:'The Think–Act–Observe Loop', level:'Core', time:'10 min',
    tags:['ReAct','loop','reason','act','observe'],
    search:'think act observe react loop reasoning tool call observation stop condition agent control loop turn iteration',
    body:`
    <p>Strip away the frameworks and almost every agent is the same loop, popularized by <strong>ReAct</strong> (Reason + Act):</p>
    <pre><code><span class="cm"># the entire agent, in pseudocode</span>
state = [system_prompt, user_goal]
while not done:
    thought, action = model(state)      <span class="cm"># THINK: reason + choose a tool</span>
    if action.is_final: return action.answer
    observation = run_tool(action)      <span class="cm"># ACT: execute in the world</span>
    state += [thought, action, observation]   <span class="cm"># OBSERVE: feed result back</span></code></pre>
    <div class="callout key"><h5>Three jobs, every iteration</h5><ul>
      <li><strong>Think</strong> — the model reasons over the current state and emits either a tool call or a final answer.</li>
      <li><strong>Act</strong> — the harness executes the chosen tool (the model never touches the world directly).</li>
      <li><strong>Observe</strong> — the tool's result is appended to the context, and the loop repeats.</li>
    </ul></div>
    <p>The subtle part is <strong>where intelligence lives</strong>. The model only ever sees text (its context). The harness owns everything else: parsing the tool call, executing it safely, formatting the observation, deciding when to stop, and trimming context so it doesn't overflow.</p>
    <h3>Try it: step through a turn</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Agent loop stepper</h4></div>
      <p class="wdesc">Step a "research the best ramen near me" task through the loop. Watch the context grow as observations feed back, and see who (model vs harness) owns each step.</p>
      <div class="flow" id="lp_flow"></div>
      <div class="ctrls">
        <div class="ctrl"><button class="opt" id="lp_step" style="width:auto">▶ Step</button></div>
        <div class="ctrl"><button class="opt" id="lp_reset" style="width:auto">↺ Reset</button></div>
      </div>
      <div class="readout" id="lp_out"></div>
    </div>
    <div class="callout frontier"><h5>What changed recently</h5><p>Modern models are <em>trained</em> to run this loop natively (tool-use is in post-training, Track 7). You rarely hand-write ReAct prompts anymore — you declare typed tools and the model emits structured tool calls. The loop moved from "prompt trick" to "first-class capability."</p></div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="2">
        <div class="q">In the loop, which step does the <em>harness</em> (not the model) own?</div>
        <button class="opt">Deciding which tool to call</button>
        <button class="opt">Writing the final answer</button>
        <button class="opt">Actually executing the tool and formatting the observation</button>
        <div class="explain">The model decides and writes; the harness executes tools safely, formats results, manages context, and enforces the stop condition.</div>
      </div>
    </div>`,
    init(root){
      const steps=[
        {ph:'THINK',who:'model',txt:'Goal needs current local data → I should search.',ctx:'+ thought'},
        {ph:'ACT',who:'harness',txt:'run_tool: search("ramen near me, open now")',ctx:'+ tool_call'},
        {ph:'OBSERVE',who:'harness',txt:'→ 8 results (names, ratings, hours)',ctx:'+ observation (8 rows)'},
        {ph:'THINK',who:'model',txt:'Top 3 look strong but I need recent reviews.',ctx:'+ thought'},
        {ph:'ACT',who:'harness',txt:'run_tool: get_reviews(top_3_ids)',ctx:'+ tool_call'},
        {ph:'OBSERVE',who:'harness',txt:'→ review snippets + sentiment',ctx:'+ observation'},
        {ph:'THINK',who:'model',txt:'Enough evidence. Compose ranked answer.',ctx:'+ thought'},
        {ph:'FINAL',who:'model',txt:'Returns: ranked list of 3 with why.',ctx:'done ✓'}
      ];
      let i=0, tokens=320;
      const flow=root.querySelector('#lp_flow'), out=root.querySelector('#lp_out');
      function render(){
        flow.innerHTML='';
        const labels=['THINK','ACT','OBSERVE'];
        labels.forEach((L,k)=>{
          const n=document.createElement('div');
          const cur = i>0 && steps[i-1].ph===L;
          n.className='node'+(cur?' act':'');
          n.innerHTML=`<h6>${L}</h6><small>${L==='THINK'?'model reasons & chooses':L==='ACT'?'harness runs the tool':'result appended to context'}</small>`;
          flow.appendChild(n);
          if(k<2){const a=document.createElement('div');a.className='arrow';a.textContent='→';flow.appendChild(a);}
        });
        if(i===0){ out.innerHTML='<span class="mut">Press <b>Step</b> to advance the loop. Context starts at ~'+tokens+' tokens (system + goal).</span>'; return; }
        const s=steps[i-1];
        const badge = s.who==='model' ? '<span class="pill" style="border-color:var(--acc);color:var(--acc)">model</span>' : '<span class="pill" style="border-color:var(--acc3);color:var(--acc3)">harness</span>';
        out.innerHTML=`<b>${s.ph}</b> ${badge}<br>${s.txt}<br><span class="mut">context: <code>${s.ctx}</code> &nbsp;·&nbsp; ~${tokens} tokens &nbsp;·&nbsp; step ${i}/${steps.length}</span>`;
      }
      root.querySelector('#lp_step').onclick=()=>{ if(i<steps.length){ i++; tokens+=[60,40,180,55,40,150,70,30][i-1]||40; render(); } };
      root.querySelector('#lp_reset').onclick=()=>{ i=0; tokens=320; render(); };
      render();
    }
  },

  {
    id:'tools-action-space', title:'Tools Are the Action Space', level:'Core', time:'9 min',
    tags:['tools','schema','action space','function calling'],
    search:'tools action space function calling typed tool schema json arguments description capability what agent can do',
    body:`
    <p>An agent can only do what its <strong>tools</strong> let it do. The tool set <em>is</em> the agent's action space — the complete vocabulary of things it can affect in the world. Choosing tools is the single highest-leverage design decision.</p>
    <p>Each tool is a typed function the model can read: a <strong>name</strong>, a <strong>description</strong> (this is a <em>prompt</em> — the model decides whether to call it from this text), and a <strong>schema</strong> of arguments.</p>
    <pre><code>{
  "name": "search_local_content",
  "description": "Find posts about places/events near a location, by interest.",
  "parameters": {
    "query":    {"type":"string", "description":"natural-language interest"},
    "city_id":  {"type":"integer","description":"resolved city id"},
    "limit":    {"type":"integer","default":10}
  }
}</code></pre>
    <div class="callout key"><h5>Design tools for a model, not a human</h5><ul>
      <li><strong>Fewer, higher-level tools</strong> beat many micro-tools. <code>book_trip()</code> &gt; <code>open_browser()</code>+<code>click()</code>+…</li>
      <li><strong>Descriptions are prompts.</strong> Ambiguous descriptions → wrong tool picked. Spend words here.</li>
      <li><strong>Return what the model needs next</strong>, not raw dumps. A 50KB JSON blob wastes context; return the 5 fields that matter.</li>
      <li><strong>Make errors actionable.</strong> "city_id required — call resolve_city first" teaches the model to recover.</li>
    </ul></div>
    <h3>Try it: shape an action space</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Action-space granularity</h4></div>
      <p class="wdesc">Slide from many low-level tools to few high-level ones. Watch how it changes the number of loop iterations (and tokens) the agent needs.</p>
      <div class="ctrls">
        <div class="ctrl" style="min-width:260px"><label>Granularity: <b id="ts_lvl">balanced</b></label><input type="range" id="ts_g" min="0" max="2" step="1" value="1"></div>
      </div>
      <div class="flow" id="ts_flow"></div>
      <div class="readout" id="ts_out"></div>
    </div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="0">
        <div class="q">Your agent keeps calling the wrong tool. Best first fix?</div>
        <button class="opt">Rewrite the tool descriptions to be clearer and more distinct</button>
        <button class="opt">Switch to a bigger model</button>
        <button class="opt">Add more tools</button>
        <div class="explain">Descriptions are the prompt the model uses to choose. Clarifying/disambiguating them is cheaper and usually more effective than swapping models or adding surface area.</div>
      </div>
    </div>`,
    init(root){
      const sl=root.querySelector('#ts_g'), lvl=root.querySelector('#ts_lvl'),
            flow=root.querySelector('#ts_flow'), out=root.querySelector('#ts_out');
      const cfg=[
        {name:'micro (browser-level)', tools:['open_url','read_dom','click','type','scroll','extract'], iters:14, note:'Maximum flexibility, but the agent burns turns orchestrating primitives — slow, token-heavy, error-prone.'},
        {name:'balanced', tools:['search_local_content','get_reviews','resolve_city'], iters:4, note:'Sweet spot for most agents: a handful of task-shaped tools. Few iterations, clear failures.'},
        {name:'macro (one-shot)', tools:['discover_and_rank(query)'], iters:1, note:'One mega-tool: fast and cheap, but the agent can\'t adapt mid-task. You\'ve hidden the logic in code (which is fine if the path never varies — then why an agent?).'}
      ];
      function draw(){
        const c=cfg[+sl.value]; lvl.textContent=c.name.split(' ')[0];
        flow.innerHTML='';
        c.tools.forEach(t=>{const n=document.createElement('div');n.className='node on';n.innerHTML=`<h6>${t}</h6>`;flow.appendChild(n);});
        out.innerHTML=`<b>${c.tools.length} tools → ~${c.iters} loop iteration${c.iters>1?'s':''}</b><br><span class="mut">${c.note}</span>`;
      }
      sl.oninput=draw; draw();
    }
  }

  ]
});

  {

    tags:['harness','context engineering','prompt engineering','Hashimoto'],
    search:'harness engineering definition what is a harness model plus harness scaffolding system prompt tools context permissions 2026 mitchell hashimoto addy osmani',
    body:`
    <p>Coined in early 2026 (Mitchell Hashimoto, popularized by Addy Osmani), <strong>harness engineering</strong> is the practice of designing the system <em>around</em> the model. The progression is real and worth internalizing:</p>
    <table class="cmp">
      <tr><th>Era</th><th>Discipline</th><th>Question it answers</th></tr>
      <tr><td>2024</td><td>Prompt engineering</td><td><em>How</em> do I phrase the instruction?</td></tr>
      <tr><td>2025</td><td>Context engineering</td><td><em>What</em> information is in the window, in what order?</td></tr>
      <tr><td><b>2026</b></td><td><b>Harness engineering</b></td><td><em>What system</em> surrounds the model — tools, memory, permissions, loop, evals?</td></tr>
    </table>
    <div class="callout intuition"><h5>Addy Osmani's working definition</h5><p>"Anytime you find an agent makes a mistake, you take the time to engineer a solution such that the agent <strong>never makes that mistake again</strong>." The harness is the accumulated set of those solutions — guardrails, better tools, sharper context, recovery logic.</p></div>
    <p>Concretely, the harness includes:</p>
    <div class="kp"><div class="kph">Components of a harness</div><ul>
      <li><strong>System prompt</strong> — role, policy, output contract.</li>
      <li><strong>Tools</strong> — the action space (Track 1).</li>
      <li><strong>Context assembly</strong> — what's retrieved/injected each turn (Track 3).</li>
      <li><strong>Memory</strong> — what persists across turns/sessions (Track 4).</li>
      <li><strong>Permissions &amp; sandboxing</strong> — what the agent may touch, and where it runs.</li>
      <li><strong>Hooks</strong> — lifecycle gates that block/rewrite/transform actions.</li>
      <li><strong>Loop control</strong> — stop conditions, retries, sub-agent spawning.</li>
      <li><strong>Evals &amp; observability</strong> — how you know it works (Track 8).</li>
    </ul></div>
    <div class="callout frontier"><h5>What changed recently</h5><p>The model is increasingly a <em>commodity</em> you swap; the harness is your durable IP. The same frontier model in a great harness beats a better model in a poor one on real tasks. There's even research on <strong>agents that evolve their own harness</strong> from observed failures (observability-driven harness evolution).</p></div>
    <h3>Try it: same model, two harnesses</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Harness quality slider</h4></div>
      <p class="wdesc">Hold the model fixed. Add harness components one at a time and watch the task success rate climb — the core thesis of harness engineering.</p>
      <div class="toggrid" id="hw_caps"></div>
      <div class="budget"><div class="seg-b" id="hw_bar" style="width:35%;background:var(--grad)">35%</div></div>

    </div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="1">
        <div class="q">Why is "the harness is your durable IP" a useful framing?</div>
        <button class="opt">Because models never improve</button>
        <button class="opt">Because the model is swappable, but your tools/context/guardrails/evals are what make the agent reliable on your task</button>
        <button class="opt">Because prompts don't matter anymore</button>
        <div class="explain">Frontier models are increasingly interchangeable. The accumulated engineering around the model — the harness — is what's hard to replicate and what carries your task-specific reliability.</div>
      </div>
    </div>`,
    init(root){
      const caps={

      const wrap=root.querySelector('#hw_caps'), bar=root.querySelector('#hw_bar'), out=root.querySelector('#hw_out');
      Object.keys(caps).forEach(k=>{

  {
    id:'permissions', title:'Permissions, Sandboxing & Blast Radius', level:'Applied', time:'10 min',
    tags:['permissions','sandbox','blast radius','allow/deny/ask'],
    search:'permissions sandboxing allow deny ask human in the loop blast radius irreversible actions least privilege agent safety guardrails confirmation',
    body:`
    <p>Agents act in the real world. The harness must decide, for every action: <strong>allow</strong>, <strong>deny</strong>, or <strong>ask a human</strong>. Get this wrong and a single hallucinated tool call deletes a table or emails 10,000 people.</p>
    <div class="callout key"><h5>The permission triad</h5><ul>
      <li><strong>Allow</strong> — safe, reversible, read-mostly actions (search, read a file). Run freely.</li>
      <li><strong>Ask</strong> — consequential but legitimate (write a file, send one message, spend money). Pause for confirmation.</li>
      <li><strong>Deny</strong> — out of scope or dangerous (<code>rm -rf</code>, prod writes, mass notifications). Block outright.</li>
    </ul></div>
    <p>Two principles do most of the work:</p>
    <ul>
      <li><strong>Least privilege</strong> — give the agent the minimum tools/scopes for the task. A research agent doesn't need write access.</li>
      <li><strong>Bound the blast radius</strong> — run in a sandbox (container, scoped credentials, dry-run modes), so even a worst-case action is contained and reversible.</li>
    </ul>
    <h3>Try it: a permission policy</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Allow / Ask / Deny simulator</h4></div>
      <p class="wdesc">A stream of tool calls hits your policy. Set the risk thresholds and watch each call get allowed, gated for confirmation, or blocked.</p>
      <div class="ctrls">
        <div class="ctrl"><label>Auto-allow up to risk <b id="pm_av">2</b></label><input type="range" id="pm_allow" min="0" max="5" step="1" value="2"></div>
        <div class="ctrl"><label>Block at/above risk <b id="pm_dv">4</b></label><input type="range" id="pm_deny" min="1" max="6" step="1" value="4"></div>
      </div>
      <div class="trace" id="pm_list"></div>
      <div class="readout" id="pm_out"></div>
    </div>
    <div class="callout frontier"><h5>What changed recently</h5><p>Permission UX is now a first-class agent design problem. Claude Code-style harnesses ship allow/ask/deny lists, per-tool scopes, and "trusted directory" sandboxes. A good safety layer hard-codes this: irreversible / high-blast-radius / outbound actions always require confirmation, regardless of instructions.</p></div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="2">
        <div class="q">Which action should default to "ask a human" rather than auto-allow?</div>
        <button class="opt">Searching a read-only index</button>
        <button class="opt">Reading a file the agent already has access to</button>
        <button class="opt">Sending a message to a real person's inbox</button>
        <div class="explain">Outbound communication lands in a real person's pocket and is hard to undo — confirm before blast radius, even when instructions seem clear.</div>
      </div>
    </div>`,
    init(root){
      const calls=[
        {t:'search_local_content(...)',r:1},
        {t:'read_file("notes.md")',r:1},
        {t:'resolve_city("Lisbon, PT")',r:2},
        {t:'write_file("ranking.json")',r:3},
        {t:'send_message(user, "...")',r:4},
        {t:'INSERT INTO hive_table ...',r:5},
        {t:'rm -rf /data/*',r:6}
      ];
      const allow=root.querySelector('#pm_allow'), deny=root.querySelector('#pm_deny'),
            av=root.querySelector('#pm_av'), dv=root.querySelector('#pm_dv'),
            list=root.querySelector('#pm_list'), out=root.querySelector('#pm_out');
      function draw(){
        let a=+allow.value, d=+deny.value; if(d<=a){d=a+1;deny.value=d;}
        av.textContent=a; dv.textContent=d;
        list.innerHTML='';
        let na=0,nq=0,nd=0;
        calls.forEach(c=>{
          let verdict,col;
          if(c.r<=a){verdict='✅ allow';col='var(--good)';na++;}
          else if(c.r>=d){verdict='⛔ deny';col='var(--bad)';nd++;}
          else{verdict='✋ ask';col='var(--warn)';nq++;}
          const row=document.createElement('div'); row.className='row'+(c.r>=d?' bad':'');
          row.innerHTML=`<span class="nm">${c.t}</span><span class="pill" style="margin:0">risk ${c.r}</span><span class="lat" style="color:${col};font-weight:700">${verdict}</span>`;
          list.appendChild(row);
        });
        out.innerHTML=`<b>${na} allowed · ${nq} need confirmation · ${nd} blocked.</b><br><span class="mut">Tighten "auto-allow" for high-stakes agents; widen "deny" to hard-block irreversible actions. The gap between them is your human-in-the-loop zone.</span>`;
      }
      allow.oninput=draw; deny.oninput=draw; draw();
    }
  },

  {
    id:'hooks', title:'Hooks: Gate, Rewrite, Transform', level:'Applied', time:'11 min',
    tags:['hooks','PreToolUse','PostToolUse','lifecycle'],
    search:'hooks pretooluse posttooluse lifecycle gate block rewrite transform tool call interception guardrail deterministic policy redact',
    body:`
    <p>Hooks are the harness's <strong>deterministic</strong> control points — shell/code callbacks that fire around tool calls. They're how you enforce policy that you don't want to trust the model to follow.</p>
    <div class="callout key"><h5>Two events, three decisions</h5>
    <p><strong>PreToolUse</strong> (before the tool runs) can:</p>
    <ul>
      <li><strong>block</strong> — reject the call (e.g. <code>rm -rf</code> detected).</li>
      <li><strong>rewrite</strong> — modify the args (e.g. inject <code>--dry-run</code> into a push).</li>
      <li>allow — let it through unchanged.</li>
    </ul>
    <p><strong>PostToolUse</strong> (after) can <strong>transform</strong> the result (e.g. redact secrets from output before the model sees it).</p>
    </div>
    <p>Why deterministic hooks instead of "just tell the model"? Because the model is probabilistic. A hook that greps for <code>rm -rf</code> blocks it <em>100%</em> of the time; a system-prompt rule blocks it <em>most</em> of the time. For anything that matters, you want the former.</p>
    <h3>Try it: wire a hook</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Hook bench</h4></div>
      <p class="wdesc">Pick a hook and send a tool call through it. See whether it's blocked, rewritten, or transformed — and what the model ends up seeing.</p>
      <div class="ctrls">
        <div class="ctrl" style="min-width:240px"><label>Active hook</label>
          <div class="seg" id="hk_seg"><button class="on" data-h="block">block rm -rf</button><button data-h="rewrite">dry-run push</button><button data-h="redact">redact secrets</button></div>
        </div>
        <div class="ctrl" style="min-width:240px"><label>Incoming tool call</label>
          <div class="seg" id="hk_call"><button class="on" data-c="0">safe</button><button data-c="1">rm -rf</button><button data-c="2">git push</button><button data-c="3">leaks key</button></div>
        </div>
      </div>
      <pre><code id="hk_in"></code></pre>
      <div class="readout" id="hk_out"></div>
    </div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="0">
        <div class="q">You must guarantee secrets never reach the model from command output. Best mechanism?</div>
        <button class="opt">A PostToolUse hook that redacts the result deterministically</button>
        <button class="opt">A system-prompt line asking the model to ignore secrets</button>
        <button class="opt">A bigger model</button>
        <div class="explain">A deterministic PostToolUse transform redacts 100% of the time. Prompt-level requests are probabilistic and will eventually leak.</div>
      </div>
    </div>`,
    init(root){
      let hook='block', call=0;
      const cases=[
        {label:'safe', cmd:'ls -la ./data', },
        {label:'rm', cmd:'rm -rf /data/output'},
        {label:'push', cmd:'git push origin main'},
        {label:'leak', cmd:'echo "API_KEY=sk-live-9f3a8b2c1d4e5f6a7b8c"'}
      ];
      const inEl=root.querySelector('#hk_in'), out=root.querySelector('#hk_out');
      root.querySelectorAll('#hk_seg button').forEach(b=>b.onclick=()=>{root.querySelectorAll('#hk_seg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');hook=b.dataset.h;draw();});
      root.querySelectorAll('#hk_call button').forEach(b=>b.onclick=()=>{root.querySelectorAll('#hk_call button').forEach(x=>x.classList.remove('on'));b.classList.add('on');call=+b.dataset.c;draw();});
      function draw(){
        const c=cases[call]; inEl.textContent='tool_call: bash("'+c.cmd+'")';
        let decision, sees, col;
        if(hook==='block'){
          if(/rm -rf/.test(c.cmd)){decision='⛔ BLOCKED — "rm -rf" matched';sees='(tool never ran) error: "Recursive delete is not allowed"';col='var(--bad)';}
          else{decision='✅ allowed (no match)';sees='normal tool output';col='var(--good)';}
        } else if(hook==='rewrite'){
          if(/git push/.test(c.cmd)){decision='✏️ REWRITTEN → git push --dry-run origin main';sees='dry-run output (no real push)';col='var(--warn)';}
          else{decision='✅ allowed (no rewrite rule matched)';sees='normal tool output';col='var(--good)';}
        } else {
          if(/API_KEY|sk-live/.test(c.cmd)){decision='🔒 TRANSFORMED (PostToolUse)';sees='echo "API_KEY=[REDACTED]"';col='var(--acc)';}
          else{decision='✅ passed through unchanged';sees='normal tool output';col='var(--good)';}
        }
        out.innerHTML=`<b style="color:${col}">${decision}</b><br><span class="mut">model sees:</span> <code>${sees}</code>`;
      }
      draw();
    }
  },

  {
    id:'skills', title:'Skills & Progressive Disclosure', level:'Core', time:'11 min',
    tags:['skills','progressive disclosure','context','SKILL.md'],
    search:'agent skills progressive disclosure skill.md procedural knowledge load on demand context efficiency anthropic equipping agents real world toolsets',
    body:`
    <p>You can't stuff every procedure your agent might need into the system prompt — it would blow the context budget and bury the model in irrelevant detail. <strong>Skills</strong> solve this with <strong>progressive disclosure</strong>: load knowledge <em>only when it's relevant</em>.</p>
    <div class="callout intuition"><h5>The library analogy (Anthropic's framing)</h5><p>A skill is like a well-organized manual: a <strong>table of contents</strong> (name + description) is always visible, but the model only opens a <strong>chapter</strong> (the full SKILL.md) when the task calls for it — and a detailed <strong>appendix</strong> (companion files) only when it goes deeper. Context is spent on what's needed, when it's needed.</p></div>
    <p>The three levels of disclosure:</p>
    <table class="cmp">
      <tr><th>Level</th><th>Always in context?</th><th>Cost</th></tr>
      <tr><td><b>1. Metadata</b> (name + description)</td><td>Yes — for all skills</td><td>~1 line each</td></tr>
      <tr><td><b>2. SKILL.md body</b></td><td>Only when matched/triggered</td><td>~1–2 KB</td></tr>
      <tr><td><b>3. Companion files</b> (scripts, refs)</td><td>Only when the body points to them</td><td>loaded on demand</td></tr>
    </table>
    <h3>Try it: progressive disclosure budget</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Skill-loading simulator</h4></div>
      <p class="wdesc">You have 40 skills. Toggle "naive" (load everything) vs "progressive" (load on match) and watch the context cost — this is why progressive disclosure scales.</p>
      <div class="ctrls">
        <div class="ctrl"><label>Strategy</label><div class="seg" id="sk_seg"><button data-s="naive">load all</button><button class="on" data-s="prog">progressive</button></div></div>
        <div class="ctrl"><label>Skills installed <b id="sk_nv">40</b></label><input type="range" id="sk_n" min="5" max="120" step="5" value="40"></div>
      </div>
      <div class="budget"><div class="seg-b" id="sk_bar" style="width:8%">—</div></div>
      <div class="readout" id="sk_out"></div>
    </div>
    <div class="callout frontier"><h5>What changed recently</h5><p>Skills (Anthropic, late 2025) turned "prompt libraries" into a portable, composable format: a folder with a <code>SKILL.md</code> + assets, triggered by a description the model reads. They're now the standard way to give agents procedural knowledge without bloating context — and they travel across harnesses.</p></div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="1">
        <div class="q">What is "progressive disclosure" optimizing for?</div>
        <button class="opt">Model accuracy on math</button>

  {

    body:`
    <p>The most advanced harnesses <strong>improve themselves</strong>. The loop: the agent runs, you (or it) observe failures, and a fix is written back into the harness so the mistake never recurs — Osmani's definition, automated.</p>

      <li><strong>Observe</strong> — capture full trajectories (every thought, tool call, result) — see Track 8.</li>
      <li><strong>Diagnose</strong> — cluster failures; find the recurring mistake.</li>
      <li><strong>Encode the fix</strong> — as a new tool, a sharper description, a hook, or a memory note.</li>
      <li><strong>Verify</strong> — re-run the eval set; confirm the fix helps and nothing regressed.</li>
    </ol></div>
    <p>Recent research (observability-driven harness evolution) shows the bottleneck isn't the agent's capability — it's <strong>observability</strong>. Give an evolution agent structured traces over a clear action space, and it can reliably converge on a better harness. Microsoft's Azure SRE Agent literally asked itself to debug its own dropping KV-cache hit rate.</p>

        <button class="opt">Observability — structured traces over a clear action space</button>

registerTrack({

  {
    id:'context-budget', title:'Context Is a Budget', level:'Core', time:'10 min',
    tags:['context window','budget','tokens','attention'],
    search:'context engineering window budget tokens what information assembled runtime order system prompt tools memory retrieval scratchpad',
    body:`
    <p><strong>Context engineering</strong> (the 2025 discipline) is deciding <em>what information an agent needs, where it lives, how it's assembled at runtime, and in what order it lands in the window.</em> It's distinct from prompt engineering: prompt = how you phrase; context = what's present and how it's structured.</p>
    <div class="callout intuition"><h5>Treat the window as a budget</h5><p>A 200K window is not "free space to fill." Every token you add competes for the model's attention and costs latency + money. The job isn't to <em>fill</em> the window — it's to put the <strong>right</strong> tokens in, in the <strong>right order</strong>, and leave room for the model to think and for observations to accumulate.</p></div>
    <p>A turn's context is assembled from competing claimants:</p>
    <div class="kp"><div class="kph">What fights for the window</div><ul>
      <li><strong>System prompt</strong> — role, policy, output contract (fixed cost).</li>
      <li><strong>Tool definitions</strong> — schemas the model reads (grows with #tools).</li>
      <li><strong>Retrieved context</strong> — RAG chunks, docs (often the biggest, most variable).</li>
      <li><strong>Memory</strong> — recalled facts from prior sessions (Track 4).</li>
      <li><strong>Conversation / scratchpad</strong> — the running Think–Act–Observe history.</li>
      <li><strong>Headroom</strong> — space left for the model's output + future observations.</li>
    </ul></div>
    <h3>Try it: pack the window</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Context budget visualizer</h4></div>
      <p class="wdesc">Allocate a 200K window across claimants. Over-stuff retrieval and watch headroom vanish — leaving no room for the agent to actually work.</p>
      <div class="ctrls">
        <div class="ctrl"><label>System + tools <b id="cb_s">12</b>K</label><input type="range" id="cb_sys" min="2" max="40" step="2" value="12"></div>

        <div class="ctrl"><label>Memory <b id="cb_m">8</b>K</label><input type="range" id="cb_mem" min="0" max="40" step="2" value="8"></div>
        <div class="ctrl"><label>Scratchpad <b id="cb_c">30</b>K</label><input type="range" id="cb_conv" min="0" max="160" step="5" value="30"></div>

      <div class="legend">
        <span><i style="background:#5b8cff"></i>system+tools</span>
        <span><i style="background:#8a5bff"></i>retrieval</span>

    </div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="1">
        <div class="q">Why is "fill the whole context window" a bad goal?</div>

    init(root){
      const ids=[['cb_sys','cb_s'],['cb_ret','cb_r'],['cb_mem','cb_m'],['cb_conv','cb_c']];
