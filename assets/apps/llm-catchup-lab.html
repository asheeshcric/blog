registerTrack({
  icon:'🧩', title:'Reasoning & Test-Time Compute',
  blurb:'The defining shift of 2025: o1/R1-style reasoning, RL with verifiable rewards (GRPO), and spending compute at inference.',
  lessons:[

  {
    id:'cot', title:'Chain-of-Thought & System-2 Thinking', level:'Core', time:'8 min',
    tags:['CoT','reasoning','scratchpad'],
    search:'chain of thought reasoning step by step scratchpad system 1 system 2 deliberate thinking o1',
    body:`
    <p>The simplest reasoning intervention is also one of the most powerful: let the model <strong>think in tokens before answering</strong>. Chain-of-thought (CoT) prompting — "let's think step by step" — lets the model use intermediate tokens as a <em>scratchpad</em>, dramatically improving math, logic, and multi-step tasks.</p>
    <div class="callout intuition"><h5>Why it works (mechanistically)</h5><p>A transformer does a <strong>fixed amount of compute per token</strong>. Hard problems need more serial computation than one forward pass provides. CoT converts the answer into many tokens, giving the model more <em>effective depth</em> — each generated step conditions the next. It's externalized working memory.</p></div>
    <div class="callout frontier"><h5>The leap: reasoning baked in (o1 / R1 / "large reasoning models")</h5><p>Prompting for CoT is fragile. The 2024–25 breakthrough (OpenAI o1, then DeepSeek-R1, Qwen-QwQ, Gemini Thinking) was to <strong>train</strong> models — via RL — to generate long, self-correcting reasoning traces by default: backtracking, verifying, trying alternatives. These "long CoT" traces can run thousands of tokens, and the model learns <em>when</em> to think longer. This is a different capability than prompted CoT.</p></div>
    <h3>Try it: compute-per-token is fixed; CoT buys depth</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Serial-depth meter</h4></div>
      <p class="wdesc">A toy "problem" needs <em>k</em> sequential reasoning steps. With direct answering the model gets one shot; CoT lets it lay down intermediate steps. Increase problem difficulty and see accuracy diverge.</p>
      <div class="ctrls">
        <div class="ctrl"><label>problem difficulty (steps needed) <b id="cdv">5</b></label><input type="range" id="cd" min="1" max="12" value="5"></div>
        <div class="ctrl"><label>thinking budget (CoT tokens) <b id="ctv">40</b></label><input type="range" id="ct" min="0" max="200" step="5" value="40"></div>
      </div>
      <div class="bars" id="cotbars"></div>
      <div class="readout" id="cotnote"></div>
    </div>`,
    init(root){
      const cd=root.querySelector('#cd'),ct=root.querySelector('#ct');
      function draw(){
        const k=+cd.value,budget=+ct.value;
        root.querySelector('#cdv').textContent=k;root.querySelector('#ctv').textContent=budget;
        // direct: accuracy decays fast with steps; CoT: helped if budget covers steps
        const direct=Math.max(2,95*Math.exp(-0.55*k));
        const stepsCovered=Math.min(1,budget/(k*12));
        const cot=Math.max(direct, 96*stepsCovered*Math.exp(-0.05*k));
        const bars=root.querySelector('#cotbars');bars.innerHTML='';
        [['Direct answer',direct],['With chain-of-thought',cot]].forEach(([l,v])=>{
          const b=document.createElement('div');b.className='bar';
          b.innerHTML=`<div class="lbl" style="width:150px">${l}</div><div class="track"><div class="fill" style="width:${v}%"></div></div><div class="pct">${v.toFixed(0)}%</div>`;
          bars.appendChild(b);
        });
        root.querySelector('#cotnote').textContent = budget < k*12 ?
          '⚠️ Thinking budget too small for this difficulty — the CoT gets cut off before reaching the answer. More steps needed than tokens allotted.' :
          'CoT budget covers the required serial steps → big accuracy gain. Note direct answering collapses as difficulty rises: one forward pass can\'t do many serial steps.';
      }
      [cd,ct].forEach(s=>s.oninput=draw);draw();
    }
  },

  {
    id:'rlvr', title:'RLVR & GRPO: How R1 Was Made', level:'Frontier', time:'14 min',
    tags:['GRPO','RLVR','DeepSeek-R1','verifiable rewards'],
    search:'RLVR reinforcement learning verifiable rewards GRPO group relative policy optimization deepseek R1 R1-zero reward model free advantage critic math code',
    body:`
    <p>The reasoning revolution runs on <strong>RL with Verifiable Rewards (RLVR)</strong>: instead of a learned (hackable) reward model, use an <strong>automatic verifier</strong> — does the math answer match? does the code pass tests? is the format right? — as the reward. Clean, unhackable signal. The workhorse algorithm is <strong>GRPO (Group Relative Policy Optimization)</strong>, introduced by DeepSeek.</p>
    <div class="callout key"><h5>GRPO in one idea: be a critic-free PPO</h5><p>PPO needs a separate <strong>value network</strong> (a critic) to estimate baselines — expensive and finicky. GRPO instead samples a <strong>group of G answers</strong> per prompt, scores them all with the verifier, and uses the <strong>group mean as the baseline</strong>. Each answer's advantage = how much better than its siblings. No critic, half the memory, very stable.</p></div>
    <pre><code><span class="cm"># GRPO advantage: normalize rewards within the sampled group</span>
rewards = [verify(q, y_i) <span class="kw">for</span> y_i <span class="kw">in</span> sample(policy, q, G)]   <span class="cm"># e.g. G=8..64</span>
A_i = (rewards[i] − mean(rewards)) / (std(rewards) + eps)   <span class="cm"># group-relative</span>
<span class="cm"># then a clipped PPO-style policy-gradient update using A_i, + KL to reference</span></code></pre>
    <h3>The DeepSeek-R1 recipe (worth knowing cold)</h3>
    <div class="tl">
      <div class="tlitem"><div class="yr">R1-Zero</div><h4>Pure RL, no SFT</h4><p>Apply GRPO with verifiable rewards <em>directly</em> to a base model. Reasoning <strong>emerges</strong> — the model spontaneously learns to think longer, self-verify, and backtrack ("aha moments"). Proof that RL alone can induce reasoning. Downside: messy, mixed-language output.</p></div>
      <div class="tlitem"><div class="yr">Step 1</div><h4>Cold-start SFT</h4><p>A small set of curated long-CoT examples to fix readability/format before RL.</p></div>
      <div class="tlitem"><div class="yr">Step 2</div><h4>Reasoning RL (GRPO)</h4><p>Large-scale RLVR on math/code/logic with verifiers + a language-consistency reward.</p></div>
      <div class="tlitem"><div class="yr">Step 3</div><h4>Reject-sample → SFT</h4><p>Generate many solutions, keep the correct/clean ones, SFT on them (+ general data) to broaden skills.</p></div>
      <div class="tlitem"><div class="yr">Step 4</div><h4>Final RLHF</h4><p>A preference/safety RL pass for helpfulness & harmlessness across all tasks.</p></div>
    </div>
    <div class="callout frontier"><h5>Why this matters for your day-to-day</h5><p>RLVR is the most <strong>reproducible, affordable</strong> capability gain available right now. If your task has <em>any</em> automatic check (unit tests, exact-match, schema validation, a judge), you can GRPO a small open model toward it without building a reward model. Open implementations (TRL's GRPOTrainer, verl, OpenRLHF, Open-R1) make this a weekend project, not a research program.</p></div>
    <h3>Try it: GRPO group dynamics</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Group-relative advantage</h4></div>
      <p class="wdesc">Sample a group of G answers; each gets a verifier reward (green=correct). GRPO pushes <em>up</em> answers above the group mean and <em>down</em> those below. See how group size and difficulty (pass rate) affect the learning signal.</p>
      <div class="ctrls">
        <div class="ctrl"><label>group size G <b id="gsv">8</b></label><input type="range" id="gs" min="2" max="24" value="8"></div>
        <div class="ctrl"><label>problem pass-rate <b id="gpv">40</b>%</label><input type="range" id="gp" min="0" max="100" value="40"></div>
        <button class="btn" id="gresample">↻ resample group</button>
      </div>
      <div class="bars" id="grbars"></div>
      <div class="readout" id="grnote"></div>
    </div>`,
    init(root){
      const gs=root.querySelector('#gs'),gp=root.querySelector('#gp');
      function draw(){
        const G=+gs.value,p=+gp.value/100;
        root.querySelector('#gsv').textContent=G;root.querySelector('#gpv').textContent=Math.round(p*100);
        const r=[];for(let i=0;i<G;i++)r.push(Math.random()<p?1:0);
        const mean=r.reduce((a,b)=>a+b,0)/G; const sd=Math.sqrt(r.reduce((a,b)=>a+(b-mean)**2,0)/G)||1e-6;
        const bars=root.querySelector('#grbars');bars.innerHTML='';
        r.forEach((rr,i)=>{
          const A=(rr-mean)/(sd+1e-6);
          const dir=A>0.01?'▲ reinforce':A<-0.01?'▼ suppress':'• neutral';
          const col=rr?'#3fd07f':'#ff6b81';
          const b=document.createElement('div');b.className='bar';
          b.innerHTML=`<div class="lbl" style="width:80px;color:${col}">ans ${i+1}</div>
            <div class="track" style="background:var(--inset)"><div class="fill" style="width:${rr?100:8}%;background:${rr?'linear-gradient(90deg,#21d4a8,#3fd07f)':CC.dim}"></div></div>
            <div class="pct" style="width:120px;color:${A>0?'#3fd07f':A<0?'#ff6b81':CC.labelDim}">A=${A.toFixed(2)} ${dir}</div>`;
          bars.appendChild(b);
        });
        const note = mean===0?'All answers wrong → group mean 0, every advantage 0 → <b>no gradient signal</b>. Problem too hard for current policy (a real failure mode — needs curriculum/easier problems).':
          mean===1?'All correct → mean 1, advantages 0 → <b>no signal</b>. Problem too easy. GRPO learns most from problems the model gets right <i>sometimes</i>.':
          'Mixed outcomes → strongest learning signal. Correct answers get positive advantage (reinforced), wrong ones negative. This is why <b>pass-rate near 50% is ideal</b> for GRPO.';
        root.querySelector('#grnote').innerHTML=note;
      }
      [gs,gp].forEach(s=>s.oninput=draw);root.querySelector('#gresample').onclick=draw;draw();
    }
  },

  {
    id:'ttc', title:'Test-Time Compute Scaling', level:'Frontier', time:'12 min',
    tags:['best-of-N','self-consistency','verifier','budget'],
    search:'test time compute scaling inference best of N majority voting self consistency verifier process reward model search beam tree of thought s1 budget forcing',
    body:`
    <p>The second axis of the reasoning era: instead of (or alongside) a bigger model, <strong>spend more compute at inference</strong>. A small model that thinks longer or samples more can beat a much bigger model that answers in one pass. This reframes the scaling story — training compute isn't the only lever.</p>
    <h3>The main strategies</h3>
    <table class="cmp">
      <tr><th>Strategy</th><th>How</th><th>Needs</th></tr>
      <tr><td><b>Long CoT</b></td><td>Generate a longer reasoning trace (sequential scaling)</td><td>A reasoning-trained model</td></tr>
      <tr><td><b>Self-consistency</b></td><td>Sample N traces, <em>majority-vote</em> the final answer</td><td>Just sampling; answers must be comparable</td></tr>
      <tr><td><b>Best-of-N</b></td><td>Sample N, pick the best by a <em>verifier / reward model</em></td><td>A scorer (verifier or PRM)</td></tr>
      <tr><td><b>Process reward (PRM) + search</b></td><td>Score each step; beam/tree-search over reasoning</td><td>A process reward model</td></tr>
      <tr><td><b>Budget forcing (s1)</b></td><td>Force the model to keep thinking ("Wait…") or stop, to hit a token budget</td><td>Minimal — a clever decoding trick</td></tr>
    </table>
    <div class="callout key"><h5>The key empirical law</h5><p>Accuracy rises <strong>log-linearly with the number of samples / thinking tokens</strong> — up to a point. With a <em>verifier</em>, best-of-N keeps improving; with majority voting, it plateaus once the dominant answer stabilizes. The art is <strong>compute allocation</strong>: easy queries get one shot, hard ones get the big budget (adaptive/"router" inference).</p></div>
    <h3>Try it: best-of-N vs majority vote vs a single big model</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Inference-scaling lab</h4></div>
      <p class="wdesc">A small model has per-sample accuracy <em>p</em>. Watch how majority voting and verifier-based best-of-N climb with N — and compare against a bigger single-shot model. More samples = more cost; find where small+search beats big+once.</p>
      <div class="ctrls">
        <div class="ctrl"><label>small model per-sample acc <b id="ttp">45</b>%</label><input type="range" id="ttp_s" min="10" max="80" value="45"></div>
        <div class="ctrl"><label>samples N <b id="ttn">16</b></label><input type="range" id="ttn_s" min="1" max="128" value="16"></div>
        <div class="ctrl"><label>verifier quality <b id="ttvq">85</b>%</label><input type="range" id="ttv_s" min="50" max="100" value="85"></div>
        <div class="ctrl"><label>big model (1-shot) <b id="ttb">72</b>%</label><input type="range" id="ttb_s" min="50" max="95" value="72"></div>
      </div>
      <div class="canvas-wrap"><canvas id="ttcc" width="640" height="240"></canvas></div>
      <div class="legend"><span><i style="background:#21d4a8"></i>best-of-N (verifier)</span><span><i style="background:#5b8cff"></i>majority vote</span><span><i style="background:#ffb454"></i>big model, 1 sample</span></div>
      <div class="readout" id="ttnote"></div>
    </div>`,
    init(root){
      const P=root.querySelector('#ttp_s'),N=root.querySelector('#ttn_s'),V=root.querySelector('#ttv_s'),B=root.querySelector('#ttb_s');
      const c=root.querySelector('#ttcc'),ctx=c.getContext('2d');
      function maj(p,n){ // prob majority of n correct (approx, binomial, assume wrong answers split)
        // crude: prob >half correct
        let acc=0;
        for(let k=Math.floor(n/2)+1;k<=n;k++){acc+=binom(n,k)*Math.pow(p,k)*Math.pow(1-p,n-k);}
        // plus partial credit when exactly tie broken — ignore
        return acc;
      }
      function binom(n,k){let r=1;for(let i=0;i<k;i++)r=r*(n-i)/(i+1);return r;}
      function bestof(p,n,vq){ // at least one correct AND verifier picks it
        const anyCorrect=1-Math.pow(1-p,n);
        return anyCorrect*vq + (1-anyCorrect)*0; // if none correct, fail
      }
      function draw(){
        const p=+P.value/100,n=+N.value,vq=+V.value/100,big=+B.value/100;
        root.querySelector('#ttp').textContent=Math.round(p*100);root.querySelector('#ttn').textContent=n;
        root.querySelector('#ttvq').textContent=Math.round(vq*100);root.querySelector('#ttb').textContent=Math.round(big*100);
        clearCanvas(ctx,640,240);
        line(ctx,46,200,624,200,CC.grid,1);line(ctx,46,14,46,200,CC.grid,1);
        const maxN=128; const X=k=>46+Math.log2(k)/Math.log2(maxN)*578, Y=v=>200-v*180;
        // grid acc labels
        ctx.fillStyle=CC.label;ctx.font='10px sans-serif';ctx.textAlign='right';
        [0,.25,.5,.75,1].forEach(v=>{ctx.fillText((v*100)+'%',42,Y(v)+3);line(ctx,46,Y(v),624,Y(v),CC.grid,1);});
        function curve(fn,col){ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();let f=true;for(let k=1;k<=maxN;k*=1.3){const kk=Math.round(k);const v=fn(kk);f?ctx.moveTo(X(kk),Y(v)):ctx.lineTo(X(kk),Y(v));f=false;}ctx.lineTo(X(maxN),Y(fn(maxN)));ctx.stroke();}
        curve(k=>bestof(p,k,vq),'#21d4a8');
        curve(k=>maj(p,k),'#5b8cff');
        // big model flat
        ctx.strokeStyle='#ffb454';ctx.lineWidth=2;ctx.setLineDash([5,4]);line(ctx,46,Y(big),624,Y(big),'#ffb454',2);ctx.setLineDash([]);
        // current N markers
        ctx.fillStyle='#21d4a8';ctx.beginPath();ctx.arc(X(n),Y(bestof(p,n,vq)),5,0,7);ctx.fill();
        ctx.fillStyle='#5b8cff';ctx.beginPath();ctx.arc(X(n),Y(maj(p,n)),5,0,7);ctx.fill();
        ctx.fillStyle=CC.label;ctx.textAlign='center';ctx.fillText('samples N (log scale)  →',335,226);
        const bo=bestof(p,n,vq),mv=maj(p,n);
        let note=`At N=${n}: best-of-N ≈ <b>${(bo*100).toFixed(0)}%</b>, majority ≈ <b>${(mv*100).toFixed(0)}%</b>, big model = ${(big*100).toFixed(0)}%. `;
        if(bo>big)note+='✅ Small+search now <b>beats</b> the big single-shot model — but you\'re paying ~'+n+'× inference compute. The deployment question is whether that trade is worth it.';
        else note+='The big model still wins single-shot; increase N or per-sample accuracy. Search isn\'t free lunch when the verifier is weak or the base p is too low.';
        root.querySelector('#ttnote').innerHTML=note;
      }
      [P,N,V,B].forEach(s=>s.oninput=draw);draw();
    }
  }

  ]
});

    search:'parameter efficient fine tuning LoRA low rank adaptation QLoRA quantized adapters rank alpha trainable parameters',
    body:`
    <p>Full fine-tuning of a 70B model means updating 70B parameters — huge memory, huge cost. <strong>LoRA (Low-Rank Adaptation)</strong> freezes the base weights and learns a tiny low-rank update <code>ΔW = B·A</code> alongside each weight matrix. You train <strong>&lt;1% of the parameters</strong> and get most of the quality.</p>
    <div class="callout intuition"><h5>The rank intuition</h5><p>The <em>update</em> a model needs to adapt to a task lives in a low-dimensional subspace. Instead of a full <code>d×d</code> matrix, factor it as <code>d×r</code> times <code>r×d</code> with rank <code>r</code> ≈ 8–64. At r=16, d=4096, that's 131K params instead of 16.7M — a <strong>~128× reduction</strong> per matrix.</p></div>
    <pre><code><span class="cm"># LoRA: W is frozen; only A,B train. Merge at inference for zero overhead.</span>
h = x @ W            <span class="cm"># frozen base (no grad)</span>
h += (x @ A) @ B * (alpha / r)   <span class="cm"># low-rank adapter, scaled</span>
<span class="cm"># A: (d, r) init ~N(0,σ);  B: (r, d) init 0  → ΔW starts at 0</span></code></pre>
    <div class="callout key"><h5>QLoRA — fine-tune a 65B model on one 48GB GPU</h5><p>QLoRA loads the frozen base in <strong>4-bit</strong> (NF4 quantization) and trains LoRA adapters in 16-bit on top. The base never updates, so its precision loss doesn't compound; the adapters carry the learning. Result: ~16× less memory for the base, near-full-FT quality. This is the single most useful efficiency trick for practitioners.</p></div>
    <h3>Try it: LoRA budget calculator</h3>

        <li>Full fine-tuning needs FSDP/DeepSpeed across multiple GPUs; LoRA is the budget option when you have one GPU, not a cluster.</li>
        <li>Serve multiple adapters over one base with multi-LoRA serving (e.g. vLLM/LoRAX) — relevant if you're shipping many task-specialized variants.</li>
      </ul>
    </div>`,
    init(root){
      const sizes=[['1.5B',1.5e9],['8B',8e9],['32B',32e9],['70B',70e9],['405B',405e9]];
      const lpb=root.querySelector('#lp_b'),lpr=root.querySelector('#lp_r');

      function draw(){

  {
    id:'quant', title:'Quantization: FP16 → INT4 and below', level:'Applied', time:'9 min',

    search:'quantization int8 int4 fp8 gptq awq weight only activation quantization perplexity memory bandwidth bitsandbytes',
    body:`
    <p>Quantization stores weights (and sometimes activations) in fewer bits. It's the highest-leverage <em>inference</em> optimization: a 70B model in FP16 needs ~140GB; in <strong>INT4</strong> it's ~35GB — fits on a single GPU, and runs faster because inference is usually <strong>memory-bandwidth bound</strong>, not compute bound.</p>
    <table class="cmp">
      <tr><th>Precision</th><th>Bits</th><th>70B size</th><th>Typical use</th></tr>
      <tr><td>FP32</td><td>32</td><td>280 GB</td><td>Rarely — legacy</td></tr>
      <tr><td>FP16 / BF16</td><td>16</td><td>140 GB</td><td>Training & high-fidelity serving</td></tr>
      <tr><td><b>FP8</b></td><td>8</td><td>70 GB</td><td>Frontier training (DeepSeek-V3) & serving</td></tr>
      <tr><td>INT8</td><td>8</td><td>70 GB</td><td>Near-lossless serving</td></tr>
      <tr><td><b>INT4</b> (GPTQ/AWQ/NF4)</td><td>4</td><td>35 GB</td><td>Memory-constrained serving, QLoRA</td></tr>
    </table>
    <div class="callout key"><h5>Why it barely hurts quality</h5><p>Neural nets are remarkably robust to weight noise. The tricks that make 4-bit work: <strong>per-group scales</strong> (quantize blocks of 64–128 weights with their own scale), <strong>keeping outliers/salient channels in higher precision</strong> (AWQ, LLM.int8()), and <strong>calibration</strong> (GPTQ uses a small dataset to minimize layer-wise error). FP8 is now used even in <em>training</em> for frontier models.</p></div>
    <h3>Try it: the precision/quality/memory tradeoff</h3>

        <li>FP8 training is the frontier efficiency move — large open models now train in FP8 at scale. Watch for it in new training recipes.</li>
        <li>Always benchmark the <em>quantized</em> checkpoint you'll actually serve, not the FP16 one — small accuracy deltas matter at the decision boundary.</li>
      </ul>

  {
    id:'kvcache', title:'The KV-Cache, MQA, GQA & MLA', level:'Core', time:'11 min',
    tags:['KV cache','GQA','MQA','MLA','memory'],
    search:'KV cache key value cache multi query attention grouped query attention multi head latent attention MLA deepseek memory bottleneck inference decoding',
    body:`
    <p>During generation, the model re-uses the keys & values of all previous tokens at every step. Caching them (the <strong>KV-cache</strong>) avoids recomputation — but the cache <em>grows with sequence length × layers × heads</em> and quickly becomes the dominant memory cost and the real long-context bottleneck.</p>
    <div class="callout intuition"><h5>The progression — all about shrinking the KV-cache</h5>
    <ul>
      <li><strong>MHA</strong> (original): every head has its own K,V. Best quality, biggest cache.</li>
      <li><strong>MQA</strong> (Multi-Query): <em>all</em> query heads share <em>one</em> K,V head. Tiny cache, slight quality hit.</li>
      <li><strong>GQA</strong> (Grouped-Query): groups of query heads share K,V. The sweet spot — used by most modern open models (Qwen, Mistral, and others).</li>
      <li><strong>MLA</strong> (Multi-head Latent Attention, DeepSeek): compress K,V into a small <em>latent</em> vector, decompress on the fly. Even smaller cache than GQA <em>and</em> strong quality — a key reason DeepSeek serves cheaply.</li>
    </ul></div>
    <h3>Try it: KV-cache memory under each scheme</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>KV-cache sizer</h4></div>
      <p class="wdesc">Long context is expensive because the cache scales linearly with tokens. Compare how MHA → GQA → MLA shrink it at a given context length.</p>
      <div class="ctrls">
        <div class="ctrl"><label>context length <b id="kvn">32K</b></label><input type="range" id="kv_n" min="0" max="5" step="1" value="3"></div>
        <div class="ctrl"><label>scheme</label><div class="seg"><button data-s="mha" class="on">MHA</button><button data-s="mqa">MQA</button><button data-s="gqa">GQA-8</button><button data-s="mla">MLA</button></div></div>
        <div class="ctrl"><label>batch size <b id="kvb">8</b></label><input type="range" id="kv_b" min="1" max="64" value="8"></div>
      </div>
      <div class="bars" id="kvbars"></div>

  {
    id:'flash-spec', title:'FlashAttention & Speculative Decoding', level:'Applied', time:'10 min',
    tags:['FlashAttention','speculative decoding','EAGLE','throughput'],
    search:'flash attention IO aware kernel memory speculative decoding draft model EAGLE medusa multi token prediction acceptance rate inference acceleration',
    body:`
    <p>Two systems tricks every practitioner should understand because they're <em>free</em> speedups (no quality loss).</p>
    <h3>FlashAttention — same math, smarter memory</h3>
    <p>Naive attention materializes the full <code>n×n</code> score matrix in slow HBM. <strong>FlashAttention</strong> is an <em>IO-aware</em> kernel: it tiles the computation, keeps blocks in fast on-chip SRAM, and never writes the big matrix to HBM (using the online-softmax trick). Identical outputs, but far less memory traffic — and since attention is memory-bound, that's a big wall-clock win and enables longer contexts. It's the default kernel everywhere now (FlashAttention-2/3).</p>
    <h3>Speculative decoding — generate, then verify</h3>
    <p>Autoregressive decoding is sequential and memory-bound: one token per expensive forward pass. <strong>Speculative decoding</strong> uses a small fast <em>draft</em> model to propose K tokens, then the big model <em>verifies them all in one parallel pass</em>. Accepted tokens are free; rejected ones fall back. Output is <strong>provably identical</strong> to the big model alone — pure latency win.</p>
    <pre><code><span class="cm"># speculative decoding loop (lossless)</span>
draft = small_model.generate(ctx, k=4)        <span class="cm"># cheap guesses</span>
logits = big_model(ctx + draft)               <span class="cm"># ONE parallel verify pass</span>
accept = longest prefix where big agrees with draft
emit(accept); <span class="kw">if</span> rejected: emit(big_model's correction)</code></pre>
    <div class="callout frontier"><h5>The modern variants</h5><p><strong>Medusa</strong> adds extra prediction heads (no separate draft model). <strong>EAGLE / EAGLE-3</strong> drafts in feature space and is the current SOTA, giving ~2–4× speedups; <strong>Multi-Token Prediction (MTP)</strong> trains the model to predict several tokens at once (DeepSeek-V3 uses it both to train better and to enable self-speculation). Speedup depends on the <em>acceptance rate</em> — how often the draft guesses right.</p></div>
    <h3>Try it: speculative-decoding speedup</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Speedup simulator</h4></div>
      <p class="wdesc">More draft tokens help only if they're accepted. Tune draft length and acceptance rate; the speedup peaks then declines as wasted draft compute dominates.</p>
      <div class="ctrls">
        <div class="ctrl"><label>draft length K <b id="spk">4</b></label><input type="range" id="sp_k" min="1" max="12" value="4"></div>
        <div class="ctrl"><label>per-token accept rate <b id="spa">80</b>%</label><input type="range" id="sp_a" min="30" max="98" value="80"></div>
        <div class="ctrl"><label>draft cost (% of target) <b id="spc">15</b>%</label><input type="range" id="sp_c" min="2" max="50" value="15"></div>
      </div>
      <div class="canvas-wrap"><canvas id="spc2" width="640" height="200"></canvas></div>
      <div class="readout" id="spnote"></div>
    </div>
    <div class="kp"><div class="kph">🔧 Implement it in practice</div>
      <ul>
        <li>FlashAttention kernels are built into serving stacks — you get them automatically with vLLM/TGI. Relevant when you train custom attention.</li>
        <li>Speculative decoding (EAGLE-style) is a config knob in vLLM/TGI — turn it on for latency-sensitive APIs (like a discovery endpoint) when you have a good draft model.</li>
      </ul>
    </div>`,
    init(root){
      const k=root.querySelector('#sp_k'),a=root.querySelector('#sp_a'),c=root.querySelector('#sp_c');
      const cv=root.querySelector('#spc2'),ctx=cv.getContext('2d');
      function expectedAccepted(K,p){let e=0;for(let i=1;i<=K;i++)e+=Math.pow(p,i);return e;} // expected accepted tokens
      function speedup(K,p,cost){
        const acc=expectedAccepted(K,p)+ (1) ; // +1 for the guaranteed verify token
        const work=1 + K*cost; // one target pass + K draft passes (cost fraction each)
        return acc/work;
      }
      function draw(){
        const K=+k.value,p=+a.value/100,cost=+c.value/100;
        root.querySelector('#spk').textContent=K;root.querySelector('#spa').textContent=Math.round(p*100);root.querySelector('#spc').textContent=Math.round(cost*100);
        clearCanvas(ctx,640,200);
        line(ctx,46,170,624,170,CC.grid,1);line(ctx,46,12,46,170,CC.grid,1);
        const X=kk=>46+(kk-1)/11*578,Y=s=>170-(s-0.8)/3*150;
        ctx.strokeStyle='#5b8cff';ctx.lineWidth=2;ctx.beginPath();
        for(let kk=1;kk<=12;kk++){const s=speedup(kk,p,cost);kk===1?ctx.moveTo(X(kk),Y(s)):ctx.lineTo(X(kk),Y(s));}ctx.stroke();
        line(ctx,46,Y(1),624,Y(1),CC.dim,1);ctx.fillStyle=CC.label;ctx.font='10px sans-serif';ctx.textAlign='left';ctx.fillText('1× (no speedup)',50,Y(1)-4);
        const s=speedup(K,p,cost);
        ctx.fillStyle='#ffb454';ctx.beginPath();ctx.arc(X(K),Y(s),6,0,7);ctx.fill();
        ctx.fillStyle=CC.label;ctx.textAlign='center';ctx.fillText('draft length K  →',335,192);
        // best K
        let best=1,bs=0;for(let kk=1;kk<=12;kk++){const v=speedup(kk,p,cost);if(v>bs){bs=v;best=kk;}}
        root.querySelector('#spnote').innerHTML=`At K=${K}, accept ${Math.round(p*100)}%: <b>${s.toFixed(2)}× speedup</b>. Optimal K here ≈ <b>${best}</b> (${bs.toFixed(2)}×). `+
          (p<0.6?'Low acceptance → the draft is often wrong, wasting compute. A better-aligned draft model matters more than longer K.':'High acceptance → longer drafts pay off. This is why EAGLE\'s feature-space drafting (high accept rate) wins.');
      }
      [k,a,c].forEach(s=>s.oninput=draw);draw();
    }
  }

  ]
});

    body:`
    <p>MoE decouples a model's <strong>total</strong> parameters from the parameters used <strong>per token</strong>. Instead of one big MLP, each layer has many "expert" MLPs and a lightweight <strong>router</strong> that sends each token to only the top-k experts (e.g. 2 of 256). You get the knowledge capacity of a huge model at the compute cost of a small one.</p>
    <div class="callout key"><h5>The numbers that matter</h5><p>DeepSeek-V3: <strong>671B total</strong> params but only <strong>37B activated</strong> per token. Mixtral 8×7B: 47B total, ~13B active. You pay to <em>store</em> all experts in memory, but each forward pass touches a fraction — so MoE is "cheap to run, expensive to hold." This is the dominant frontier architecture (DeepSeek, Qwen3, Mixtral, GPT-4-class models).</p></div>
    <h3>The hard part: load balancing</h3>
    <p>If the router sends most tokens to a few favorite experts, the rest are dead weight and you lose capacity. Training adds a <strong>load-balancing loss</strong> (or, in DeepSeek-V3, an <em>auxiliary-loss-free</em> bias-adjustment scheme) to keep expert usage even. Routing is the whole game.</p>
    <pre><code><span class="cm"># MoE layer (top-2 routing)</span>
scores = router(x)                    <span class="cm"># (n_tokens, n_experts)</span>

y = sum( gate_w * expert[i](x) <span class="kw">for</span> i <span class="kw">in</span> top )   <span class="cm"># weighted combine</span>

    id:'longctx', title:'Long Context Engineering', level:'Applied', time:'9 min',
    tags:['context window','RoPE scaling','attention sinks','needle'],
    search:'long context window 128k 1M tokens RoPE scaling YaRN position interpolation attention sinks streaming needle in haystack lost in the middle',
    body:`
    <p>Context windows exploded from 2K (GPT-3) to 128K–1M+ tokens. But a big window isn't the same as <em>using</em> it well. Two separate problems: making attention <strong>affordable</strong> at length, and making the model <strong>actually attend</strong> to the right place.</p>
    <h4>Making it affordable</h4>
    <ul>
      <li><strong>RoPE scaling</strong> (Position Interpolation, NTK-aware, YaRN) — extend a model trained short to run long, cheaply (covered in Track 1).</li>
      <li><strong>Efficient attention</strong> — FlashAttention (memory), GQA/MLA (KV-cache), sliding-window/local attention (Mistral), and sparse/linear variants.</li>
      <li><strong>Attention sinks / StreamingLLM</strong> — keep the first few tokens always in the window to stabilize infinite streaming.</li>
    </ul>
    <h4>Making it effective</h4>
    <div class="callout warn"><h5>"Lost in the middle"</h5><p>Models reliably use information at the <strong>start and end</strong> of a long context but often <strong>miss the middle</strong>. The <em>needle-in-a-haystack</em> test measures retrieval at each depth. Long-context evals (RULER, MRCR) now stress multi-fact, reasoning-over-context — not just single-needle recall. A 1M window with poor mid-context recall is a marketing number, not a capability.</p></div>
    <h3>Try it: needle-in-a-haystack</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Retrieval-by-depth heatmap</h4></div>
      <p class="wdesc">A fact ("needle") is placed at some depth in a context of some length. The (illustrative) success surface shows the classic U-shape: strong at edges, weaker in the middle, degrading as context grows beyond the trained length.</p>
      <div class="ctrls">
        <div class="ctrl"><label>context used <b id="lcn">50</b>% of window</label><input type="range" id="lc_n" min="5" max="100" value="50"></div>
        <div class="ctrl"><label>needle depth <b id="lcd">50</b>%</label><input type="range" id="lc_d" min="0" max="100" value="50"></div>
        <div class="ctrl"><label>model robustness <b id="lcr">medium</b></label><input type="range" id="lc_r" min="0" max="2" step="1" value="1"></div>
      </div>
      <div class="canvas-wrap"><canvas id="lcc" width="640" height="220"></canvas></div>
      <div class="readout" id="lcnote"></div>
    </div>`,
    init(root){
      const n=root.querySelector('#lc_n'),d=root.querySelector('#lc_d'),r=root.querySelector('#lc_r');
      const cv=root.querySelector('#lcc'),ctx=cv.getContext('2d');
      function succ(depthFrac,lenFrac,rob){
        // U-shape over depth + decay with length
        const edge=Math.min(depthFrac,1-depthFrac); // 0 at edges->bigger=middle
        const mid=1-Math.pow(edge*2,1.3)*[0.7,0.5,0.3][rob];
        const lenPen=lenFrac>0.7?(1-(lenFrac-0.7)*[1.6,1.0,0.5][rob]):1;

      }

        root.querySelector('#lcn').textContent=+n.value;root.querySelector('#lcd').textContent=+d.value;
        root.querySelector('#lcr').textContent=['low','medium','high'][rob];
        clearCanvas(ctx,640,220);
        // heatmap grid: x=context len, y=depth
        const cols=24,rows=12,w=560/cols,h=170/rows;
        for(let i=0;i<cols;i++)for(let j=0;j<rows;j++){
          const lf=(i+1)/cols, df=j/(rows-1);
          const s=succ(df,lf,rob);
          const g=Math.round(s*200), rr=Math.round((1-s)*200);
          ctx.fillStyle=`rgb(${rr},${g+40},90)`;
          ctx.fillRect(50+i*w,20+j*h,w-1,h-1);
        }
        // marker
        const mx=50+(lenFrac*cols-0.5)*w, my=20+depthFrac*(rows-1)*h;
        ctx.strokeStyle=CC.marker;ctx.lineWidth=2;ctx.beginPath();ctx.arc(mx,my,7,0,7);ctx.stroke();
        ctx.fillStyle=CC.label;ctx.font='11px sans-serif';ctx.textAlign='center';
        ctx.fillText('context length used  →',330,210);
        ctx.save();ctx.translate(14,110);ctx.rotate(-Math.PI/2);ctx.fillText('needle depth (top→bottom)',0,0);ctx.restore();
        const s=succ(depthFrac,lenFrac,rob);
        root.querySelector('#lcnote').innerHTML=`Retrieval success here ≈ <b>${(s*100).toFixed(0)}%</b>. `+
          (depthFrac>0.3&&depthFrac<0.7?'Middle-of-context — the weak zone ("lost in the middle"). ':'Near an edge — models attend here reliably. ')+
          (lenFrac>0.8?'And you\'re pushing the window limit, compounding the difficulty.':'');
      }
      [n,d,r].forEach(s=>s.oninput=draw);draw();
    }

  {
    id:'ssm', title:'Mamba, SSMs & the Attention Alternatives', level:'Frontier', time:'11 min',

    body:`
    <p>Attention is <strong>O(n²)</strong> in sequence length — the fundamental scaling pain. A long line of work seeks <strong>sub-quadratic</strong> alternatives. The most prominent is <strong>Mamba</strong> and structured <strong>State Space Models (SSMs)</strong>.</p>
    <div class="callout intuition"><h5>The core idea</h5><p>An SSM processes a sequence like a <strong>recurrent</strong> system: maintain a fixed-size hidden state, update it token-by-token. That's <strong>O(n)</strong> time and <strong>O(1)</strong> memory per step — no growing KV-cache, constant-time generation regardless of context length. Mamba's innovation: make the state-update <strong>selective</strong> (input-dependent), so the model can choose what to remember or forget — recovering much of attention's content-awareness, plus a hardware-efficient parallel scan for training.</p></div>
    <table class="cmp">
      <tr><th></th><th>Transformer (attention)</th><th>Mamba / SSM</th></tr>
      <tr><td>Training cost</td><td>O(n²)</td><td><b>O(n)</b> (parallel scan)</td></tr>
      <tr><td>Generation memory</td><td>KV-cache grows with n</td><td><b>Constant</b> (fixed state)</td></tr>
      <tr><td>Recall / copying</td><td><b>Excellent</b> (random access to all tokens)</td><td>Weaker (compresses into state)</td></tr>
      <tr><td>In-context learning</td><td><b>Strong</b></td><td>Improving, historically weaker</td></tr>
    </table>
    <div class="callout frontier"><h5>Where it actually landed (2024–26): hybrids win</h5><p>Pure SSMs struggle with exact recall (looking up a specific earlier token) — attention is just better at "random access." The pragmatic answer is <strong>hybrids</strong>: mostly Mamba/linear layers for cheap long-range mixing, with a few full-attention layers sprinkled in for precise recall (e.g. <strong>Jamba</strong>, Zamba, and Transformer-to-SSM distillation). You can even <em>distill</em> a trained Transformer into a hybrid to cut serving cost. Also in this family: <strong>RWKV</strong>, <strong>RetNet</strong>, and modern <strong>linear-attention</strong> variants.</p></div>
    <h3>Try it: quadratic vs linear cost</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Attention vs SSM scaling</h4></div>
      <p class="wdesc">The whole motivation in one chart. As sequence length grows, attention's compute explodes quadratically while SSM/linear stays linear. The crossover is why long-context research loves SSMs.</p>
      <div class="ctrls"><div class="ctrl" style="min-width:320px"><label>max sequence length <b id="ssv">16K</b></label><input type="range" id="ss_n" min="0" max="5" step="1" value="3"></div></div>
      <div class="canvas-wrap"><canvas id="ssc" width="640" height="220"></canvas></div>
      <div class="legend"><span><i style="background:#ff6b81"></i>attention O(n²)</span><span><i style="background:#21d4a8"></i>SSM/linear O(n)</span><span><i style="background:#5b8cff"></i>hybrid (mostly linear)</span></div>
      <div class="readout" id="ssnote"></div>
    </div>`,
    init(root){
      const lens=[['1K',1024],['2K',2048],['4K',4096],['16K',16384],['64K',65536],['256K',262144]];
      const sn=root.querySelector('#ss_n');const cv=root.querySelector('#ssc'),ctx=cv.getContext('2d');
      function draw(){
        const [lbl,N]=lens[+sn.value];root.querySelector('#ssv').textContent=lbl;
        clearCanvas(ctx,640,220);
        line(ctx,50,185,624,185,CC.grid,1);line(ctx,50,12,50,185,CC.grid,1);
        const X=n=>50+n/N*570;
        const quad=n=>n*n, lin=n=>n*64, hyb=n=>n*64*1.5 + (n*n)*0.08; // few attn layers
        const maxV=quad(N);
        const Y=v=>185-v/maxV*165;
        function curve(fn,col){ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<=100;i++){const n=N*i/100;i?ctx.lineTo(X(n),Y(fn(n))):ctx.moveTo(X(n),Y(fn(n)));}ctx.stroke();}
        curve(quad,'#ff6b81');curve(hyb,'#5b8cff');curve(lin,'#21d4a8');
        ctx.fillStyle=CC.label;ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText('sequence length  →',337,205);
        ctx.save();ctx.translate(16,100);ctx.rotate(-Math.PI/2);ctx.fillText('compute / memory',0,0);ctx.restore();
        const ratio=quad(N)/lin(N);
        root.querySelector('#ssnote').innerHTML=`At ${lbl} tokens, attention does ~<b>${ratio.toFixed(0)}×</b> the per-layer work of a linear/SSM layer. `+
          `That gap is why SSMs are compelling for very long sequences — but pure attention still wins on precise recall, so production leans <b>hybrid</b>.`;
      }
      sn.oninput=draw;draw();
    }
  }

  ]
});

    body:`
    <p>Diffusion is the backbone of modern image/video/audio generation. The idea is beautifully simple: <strong>learn to reverse a noising process</strong>. Train by adding Gaussian noise to data in many steps (forward), then learn a network to <em>remove</em> noise step-by-step (reverse). Generate by starting from pure noise and denoising into a sample.</p>
    <pre><code><span class="cm"># forward: progressively destroy the image</span>
x_t = sqrt(α_t)·x_0 + sqrt(1-α_t)·ε        <span class="cm"># ε ~ N(0,I)</span>
<span class="cm"># train a net to predict the noise ε (or the velocity / score)</span>
loss = || ε − ε_θ(x_t, t, text) ||²
<span class="cm"># sample: start at noise, iteratively denoise t=T..0</span></code></pre>
    <div class="callout key"><h5>What makes it practical (the stack you'll hear about)</h5>
    <ul>
      <li><strong>Latent diffusion</strong> (Stable Diffusion): diffuse in a compressed VAE latent space, not pixels — far cheaper. Decode the final latent to an image.</li>
      <li><strong>Conditioning</strong>: text guides generation via cross-attention; <strong>classifier-free guidance</strong> (CFG) trades diversity for prompt-adherence by extrapolating between conditional & unconditional predictions.</li>
      <li><strong>DiT</strong> (Diffusion Transformers): replace the U-Net with a Transformer — better scaling, now standard in frontier image/video models (Sora-class, SD3, Flux).</li>
      <li><strong>Flow matching / rectified flow</strong>: a cleaner, straighter formulation of the same idea; fewer sampling steps, the current frontier training objective.</li>
    </ul></div>
    <h3>Try it: the denoising trajectory</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Denoising stepper</h4></div>

      </div>

    </div>
    <div class="kp"><div class="kph">🔧 Implement it in practice</div>
      <ul>
        <li>Image/video generation pipelines are diffusion/flow-based; data prep & captioning typically run on a distributed processor (Spark/Ray), training on a GPU cluster. Tooling: HuggingFace <code>diffusers</code>.</li>
        <li>If you debug a gen-image service, the latency story is dominated by <em>number of sampling steps</em> × model size — step-distillation (LCM/Turbo) is the main lever.</li>
      </ul>

    init(root){

      const cv=root.querySelector('#dfc'),ctx=cv.getContext('2d');

      // a hidden "target" pattern (a smiley-ish blob)
      function target(x,y){const cx=W/2,cy=H/2;const d=Math.hypot(x-cx,y-cy);return d<70?(Math.sin(x/12)*Math.cos(y/12)>0?1:0.4):0.05;}

    body:`
    <p>Text generation has been almost universally <strong>autoregressive</strong> (AR) — one token at a time, left to right. A fast-moving research frontier asks: what if we generate text like images, via <strong>diffusion</strong> — refining <em>all</em> tokens in parallel over a few denoising steps?</p>
    <div class="callout intuition"><h5>The appeal: parallelism</h5><p>AR generation is inherently sequential — N tokens need N forward passes. A <strong>diffusion LM (dLLM)</strong> starts with a fully-masked/noised sequence and denoises it in a <em>fixed</em> number of steps (say 8–20), updating many tokens at once. Potentially <strong>much lower latency</strong> for long outputs, and bidirectional context (each token sees both sides). 2025 saw the first commercial-grade dLLMs (Gemini Diffusion, Mercury) hit speed parity with quality approaching AR.</p></div>
    <table class="cmp">
      <tr><th></th><th>Autoregressive</th><th>Diffusion LM</th></tr>
      <tr><td>Decoding</td><td>Sequential, 1 token/pass</td><td><b>Parallel</b>, many tokens/step</td></tr>
      <tr><td>Latency (long output)</td><td>O(N) passes</td><td><b>O(steps)</b>, steps ≪ N</td></tr>
      <tr><td>Context direction</td><td>Causal (left only)</td><td><b>Bidirectional</b></td></tr>
      <tr><td>Maturity / quality</td><td><b>Very mature, SOTA</b></td><td>Rapidly improving, still behind</td></tr>

    </table>
    <div class="callout frontier"><h5>Where it's headed</h5><p>Hybrids again: <strong>block diffusion</strong> (AR across blocks, diffusion within), and AR-to-diffusion <em>conversion</em> (adapt a pretrained AR model into a dLLM cheaply). Worth tracking, but AR remains the production default for now. The interesting near-term use: latency-critical or structured generation where parallel decoding shines.</p></div>

    body:`
    <p>Modern frontier models are <strong>multimodal</strong> — they see images, sometimes hear audio, watch video. The dominant recipe bolts a vision encoder onto an LLM, then trains them to speak a shared language.</p>
    <h3>The standard VLM recipe (LLaVA-style)</h3>
    <ol>
      <li><strong>Vision encoder</strong> (e.g. a CLIP/SigLIP ViT) turns an image into a grid of patch embeddings.</li>
      <li><strong>Projector</strong> (an MLP or cross-attention "resampler") maps those visual features into the LLM's token embedding space — they become "image tokens."</li>
      <li><strong>LLM</strong> consumes interleaved text + image tokens and generates text. Train in stages: align the projector first (frozen LLM), then instruction-tune end-to-end on multimodal data.</li>
    </ol>
    <div class="callout key"><h5>CLIP: the quiet workhorse</h5><p><strong>CLIP</strong> trains an image encoder and text encoder <em>contrastively</em> so matching image–text pairs have high similarity. It gave us a shared image-text embedding space that powers retrieval, zero-shot classification, diffusion conditioning, <em>and</em> most VLM vision encoders. Understanding contrastive learning ≈ understanding half of multimodal AI.</p></div>
    <div class="callout frontier"><h5>The shift: native "omni" models</h5><p>The bolt-on approach is giving way to <strong>natively multimodal</strong> training — one model trained on text+image+audio+video from the start, often generating multiple modalities too (any-to-any). GPT-4o, Gemini, and Qwen-VL-class models tokenize all modalities into one stream. Early-fusion native training beats late bolt-on for cross-modal reasoning.</p></div>
    <h3>Try it: how an image becomes tokens</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Image → tokens projector</h4></div>
      <p class="wdesc">A higher-resolution image makes more patches → more "image tokens" → more context consumed and higher cost. This is why VLMs have resolution/token tradeoffs and "tiling" strategies.</p>
      <div class="ctrls">
        <div class="ctrl"><label>image resolution <b id="vmr">336</b>px</label><input type="range" id="vm_r" min="224" max="1344" step="112" value="336"></div>
        <div class="ctrl"><label>patch size <b id="vmp">14</b>px</label><input type="range" id="vm_p" min="14" max="32" step="2" value="14"></div>
      </div>
      <div class="canvas-wrap"><canvas id="vmc" width="640" height="180"></canvas></div>
      <div class="readout" id="vmnote"></div>
    </div>
    <div class="kp"><div class="kph">🔧 Implement it in practice</div>
      <ul>
        <li>For a <b>content discovery</b> use case, CLIP/SigLIP-style embeddings let you index images & match them to interest queries — the same embedding space powers both retrieval and ranking.</li>

      function draw(){

    body:`
    <p>Distillation transfers capability from a big <strong>teacher</strong> to a small <strong>student</strong> — the workhorse for shipping cheap models that punch above their size. You already do this; here's the conceptual map of what's available.</p>
    <h3>Flavors of distillation</h3>
    <table class="cmp">
      <tr><th>Type</th><th>Student learns from</th><th>Notes</th></tr>
      <tr><td><b>Logit / soft-label</b></td><td>Teacher's full output distribution (KL loss)</td><td>Classic Hinton; "dark knowledge" in the soft probabilities. Needs teacher logits.</td></tr>
      <tr><td><b>Sequence-level (hard)</b></td><td>Teacher's generated text as SFT targets</td><td>Simplest & most common for LLMs — just SFT on teacher outputs.</td></tr>
      <tr><td><b>Reasoning-trace</b></td><td>Teacher's long CoT traces</td><td>How small reasoning models are made (R1-distilled Qwen and other open models). Hugely effective.</td></tr>
      <tr><td><b>On-policy</b></td><td>Teacher scores the <em>student's own</em> samples</td><td>Reduces train/inference mismatch; closer to RL.</td></tr>
    </table>
    <div class="callout key"><h5>The 2025 reality</h5><p>Distillation + synthetic data is how the open ecosystem keeps pace: take a frontier teacher, generate high-quality (often verified) traces, SFT a small student. <strong>R1-distilled</strong> models showed a 7B–32B student can inherit most of a giant model's reasoning from trace distillation alone — no RL needed on the student. This is the single most cost-effective capability transfer available to you.</p></div>
    <h3>Try it: the distillation tradeoff</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Teacher → student transfer</h4></div>
      <p class="wdesc">Bigger students recover more of the teacher; more/better distillation data helps; but a small student has a capability ceiling no amount of data fully closes.</p>
      <div class="ctrls">
        <div class="ctrl"><label>teacher quality <b id="dsq">90</b></label><input type="range" id="ds_q" min="60" max="99" value="90"></div>
        <div class="ctrl"><label>student size <b id="dss">8B</b></label><input type="range" id="ds_s" min="0" max="3" step="1" value="1"></div>
        <div class="ctrl"><label>distill data (k traces) <b id="dsd">50</b></label><input type="range" id="ds_d" min="1" max="500" step="1" value="50"></div>
      </div>
      <div class="bars" id="dsbars"></div>
      <div class="readout" id="dsnote"></div>
    </div>`,
    init(root){
      const q=root.querySelector('#ds_q'),s=root.querySelector('#ds_s'),d=root.querySelector('#ds_d');
      const sizes=[['1.5B',0.55],['8B',0.78],['32B',0.9],['70B',0.96]];
      function draw(){
        const tq=+q.value,[lbl,ceil]=sizes[+s.value],dd=+d.value;
        root.querySelector('#dsq').textContent=tq;root.querySelector('#dss').textContent=lbl;root.querySelector('#dsd').textContent=dd;
        const dataFactor=1-Math.exp(-dd/80); // diminishing returns
        const student=tq*ceil*(0.5+0.5*dataFactor);
        const bars=root.querySelector('#dsbars');bars.innerHTML='';
        [['Teacher',tq],['Student (distilled)',student],['Student ceiling (this size)',tq*ceil]].forEach(([l,v])=>{
          const b=document.createElement('div');b.className='bar';
          b.innerHTML=`<div class="lbl" style="width:180px">${l}</div><div class="track"><div class="fill" style="width:${v}%"></div></div><div class="pct">${v.toFixed(0)}</div>`;
          bars.appendChild(b);
        });
        const recov=(student/tq*100);
        root.querySelector('#dsnote').innerHTML=`Student recovers <b>${recov.toFixed(0)}%</b> of teacher quality. `+
          (dd<30?'More distillation data would help substantially (you\'re on the steep part of the curve).':dataFactor>0.9?'Data is saturated — you\'ve hit this student size\'s ceiling. Need a bigger student to go higher.':'Good return on data; a bit more still helps.');
      }
      [q,s,d].forEach(x=>x.oninput=draw);draw();
    }

registerTrack({
  icon:'🤖', title:'The Agentic Frontier',
  blurb:'Tool use & ReAct, agentic RAG, evaluation / LLM-as-judge, and reading the 2026 frontier-model leaderboard.',
  lessons:[

  {
    id:'react', title:'Tool Use & the ReAct Loop', level:'Core', time:'10 min',
    tags:['ReAct','tool calling','function calling','agents'],
    search:'ReAct reason act observe tool use function calling agent loop thought action observation toolformer agent orchestration',
    body:`
    <p>An <strong>agent</strong> is an LLM that decides its own control flow — it chooses which actions (tools) to take, observes results, and iterates until done. In traditional code the path is fixed (if/else); in an agent, <em>the model picks the next step</em>. The foundational pattern is <strong>ReAct</strong>: interleave <strong>Reason</strong>ing and <strong>Act</strong>ing.</p>
    <pre><code><span class="cm"># the ReAct loop</span>
<span class="kw">while not</span> done:
    thought = llm("Given goal + history, what should I do next?")
    action  = llm.choose_tool(thought)        <span class="cm"># e.g. search(query), calc(expr)</span>
    obs     = execute(action)                 <span class="cm"># real-world result</span>
    history += [thought, action, obs]         <span class="cm"># feed back in</span>
<span class="cm"># the model reasons over observations to decide the next action</span></code></pre>
    <div class="callout key"><h5>What makes tool use work now</h5><p>Models are <strong>post-trained for function calling</strong>: given a schema of available tools, they emit structured calls (JSON args) and incorporate results. The reliability jump from GPT-3.5 → modern models is mostly <em>better tool-calling and instruction-following</em>, not raw knowledge. Tools turn a frozen model into something that can search, compute, query databases, and act.</p></div>
    <div class="callout frontier"><h5>The 2025 shift: RL-trained agents</h5><p>Beyond prompting, frontier agents are now <strong>trained with RL on multi-step tool-use trajectories</strong> (verifiable end-rewards: did the task succeed?). This is "agentic RL" — the model learns <em>when</em> to call tools, how to recover from errors, and how to plan over long horizons. It's the natural extension of RLVR (Track 4) to interactive environments.</p></div>
    <h3>Try it: step through a ReAct agent</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>ReAct trace stepper</h4></div>
      <p class="wdesc">Walk an agent through a multi-tool task: <em>"What's the population of the capital of the country that won the most 2024 Olympic golds?"</em> — impossible in one shot, natural for ReAct.</p>
      <div class="ctrls"><button class="btn" id="ra_step">▶ next step</button><button class="btn ghost" id="ra_reset">↺ reset</button></div>
      <div id="ra_trace" style="margin-top:10px"></div>
      <div class="readout" id="ra_note">Click "next step" to watch the Thought → Action → Observation loop unfold.</div>
    </div>
    <div class="kp"><div class="kph">🔧 Implement it in practice</div>
      <ul>
        <li>Agent frameworks (<strong>LangGraph</strong>, <strong>AutoGen</strong>, <strong>CrewAI</strong>, or the provider's function-calling API) implement exactly this Think–Act–Observe loop with a tool registry, schema generation, and guardrails.</li>
        <li>Tools = typed functions with schemas the LLM reads. Start by wrapping your existing APIs (SQL query, content lookup) as tools — the model orchestrates them.</li>
      </ul>
    </div>`,
    init(root){
      const steps=[
        ['🧠 Thought','I need to find which country won the most golds at the 2024 Olympics. Let me search.','#8a5bff'],
        ['🔧 Action','search("2024 Olympics most gold medals by country")','#5b8cff'],
        ['👁 Observation','USA led with 40 gold medals.','#21d4a8'],
        ['🧠 Thought','The country is the USA. Its capital is Washington, D.C. Now I need its population.','#8a5bff'],
        ['🔧 Action','search("population of Washington D.C.")','#5b8cff'],
        ['👁 Observation','~679,000 (2023 estimate).','#21d4a8'],
        ['🧠 Thought','I have the full chain: USA → Washington D.C. → ~679k. I can answer.','#8a5bff'],
        ['✅ Answer','The capital is Washington, D.C., with a population of approximately 679,000.','#3fd07f']
      ];
      let i=0;const tr=root.querySelector('#ra_trace');
      function render(){
        tr.innerHTML='';
        for(let j=0;j<i;j++){const [t,b,c]=steps[j];

  {
    id:'rag', title:'RAG → Agentic RAG', level:'Applied', time:'11 min',
    tags:['RAG','retrieval','reranking','agentic RAG'],
    search:'retrieval augmented generation RAG vector database embedding chunking reranking agentic RAG multi step query rewriting hybrid search BM25 dense',
    body:`
    <p><strong>RAG</strong> grounds an LLM in external knowledge: retrieve relevant documents, stuff them into the prompt, generate an answer with citations. It fixes hallucination and staleness without retraining — and it's probably the most-deployed LLM pattern in industry.</p>
    <h3>The classic RAG pipeline</h3>
    <ol>
      <li><strong>Chunk & embed</strong> your corpus → store vectors in an index.</li>
      <li><strong>Retrieve</strong>: embed the query, find nearest chunks (often <strong>hybrid</strong>: dense vectors + sparse BM25 keyword).</li>
      <li><strong>Rerank</strong>: a cross-encoder reorders candidates for precision.</li>
      <li><strong>Generate</strong>: LLM answers using the top chunks as context, with citations.</li>
    </ol>
    <div class="callout frontier"><h5>Agentic RAG — the upgrade</h5><p>Single-shot RAG fails on complex queries. <strong>Agentic RAG</strong> makes retrieval a <em>tool the agent calls in a loop</em>: rewrite the query, retrieve, judge sufficiency, retrieve again with a refined query, decompose multi-hop questions, cross-check sources. It's ReAct applied to retrieval. The 2025 trend: hierarchical retrieval tools + the model deciding <em>what</em> and <em>how much</em> to retrieve. (Notably, strong keyword + agentic tool-use can rival vector DBs for some tasks — retrieval quality &gt; fancy infra.)</p></div>
    <h3>Try it: tune a hybrid retriever</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Hybrid-retrieval scorer</h4></div>
      <p class="wdesc">Blend dense (semantic) + sparse (keyword) + a quality/freshness prior. Watch the ranking of candidate documents reshuffle — the core knob of any retrieval-based discovery system.</p>
      <div class="ctrls">
        <div class="ctrl"><label>dense (semantic) weight <b id="rg_dv">50</b>%</label><input type="range" id="rg_d" min="0" max="100" value="50"></div>
        <div class="ctrl"><label>sparse (keyword) weight <b id="rg_sv">30</b>%</label><input type="range" id="rg_s" min="0" max="100" value="30"></div>
        <div class="ctrl"><label>quality/freshness weight <b id="rg_qv">20</b>%</label><input type="range" id="rg_q" min="0" max="100" value="20"></div>
      </div>
      <div class="bars" id="rgbars"></div>
      <div class="readout" id="rgnote"></div>
    </div>`,
    init(root){
      // candidate docs with (dense, sparse, quality) feature scores 0..1
      const docs=[
        ['Local guide: best ramen in Shibuya',0.92,0.55,0.85],
        ['Reddit thread: cheap eats Tokyo',0.78,0.88,0.45],
        ['Old blog: Tokyo noodles (2016)',0.81,0.72,0.20],
        ['News: new Shibuya food hall opens',0.70,0.40,0.95],
        ['Wiki: History of ramen',0.65,0.30,0.60],
        ['Spam: BEST FOOD CLICK HERE',0.40,0.95,0.05]
      ];
      const d=root.querySelector('#rg_d'),s=root.querySelector('#rg_s'),q=root.querySelector('#rg_q');
      function draw(){
        let wd=+d.value,ws=+s.value,wq=+q.value;const tot=(wd+ws+wq)||1;
        root.querySelector('#rg_dv').textContent=wd;root.querySelector('#rg_sv').textContent=ws;root.querySelector('#rg_qv').textContent=wq;
        wd/=tot;ws/=tot;wq/=tot;
        const scored=docs.map(([t,dd,ss,qq])=>[t,wd*dd+ws*ss+wq*qq]).sort((a,b)=>b[1]-a[1]);
        const bars=root.querySelector('#rgbars');bars.innerHTML='';
        scored.forEach(([t,sc],i)=>{
          const b=document.createElement('div');b.className='bar';
          const spam=t.includes('Spam');
          b.innerHTML=`<div class="lbl" style="width:230px;text-align:left;color:${i===0?'#21d4a8':spam?'#ff6b81':CC.labelDim}">${i+1}. ${t}</div><div class="track"><div class="fill" style="width:${sc*100}%"></div></div><div class="pct">${(sc*100).toFixed(0)}</div>`;
          bars.appendChild(b);
        });
        const top=scored[0][0];
        root.querySelector('#rgnote').innerHTML = scored[0][0].includes('Spam')?
          '⚠️ Pure keyword weighting let <b>spam</b> rank #1 (keyword-stuffed). This is why dense + quality priors matter — sparse alone is gameable.':
          `Top result: <b>${top}</b>. Notice how over-weighting keyword surfaces the spam doc, while quality weight rewards fresh/authoritative content. Real discovery systems blend all three + a learned reranker.`;
      }
      [d,s,q].forEach(x=>x.oninput=draw);draw();
    }
  },

  {
    id:'evals', title:'Evaluation & LLM-as-Judge', level:'Applied', time:'9 min',
    tags:['evals','LLM-as-judge','benchmarks','contamination'],
    search:'evaluation LLM as judge benchmark pairwise preference win rate rubric contamination overfitting arena elo offline online eval',
    body:`
    <p>"Evaluation is almost all you need." Your model is only as good as your ability to measure it. As capabilities outrun static benchmarks, evaluation itself has become a core research skill.</p>
    <h3>The eval toolbox</h3>
    <ul>
      <li><strong>Verifiable / exact-match</strong> — math answers, code unit tests, schema validity. Gold standard when available (and the basis of RLVR).</li>
      <li><strong>LLM-as-judge</strong> — a strong model scores or compares outputs against a rubric. Scales human judgment; used for pairwise win-rates and rubric grading. Watch for biases (position, length, self-preference) — mitigate with randomized order & calibrated rubrics.</li>
      <li><strong>Human preference / Arena</strong> — head-to-head votes → Elo (LM-Arena). The closest thing to ground truth for "helpfulness," but slow & noisy.</li>
      <li><strong>Task metrics</strong> — for your discovery API: recall@k, nDCG, click/engagement proxies, freshness.</li>
    </ul>
    <div class="callout warn"><h5>The two traps</h5><p><strong>Contamination</strong>: benchmark data leaked into training → inflated scores that don't generalize. Use fresh/held-out or private eval sets. <strong>Goodhart/overfitting to the eval</strong>: optimizing a proxy until it stops correlating with real quality (you saw this in Track 3). The defense is a <em>diverse</em> eval suite + out-of-distribution probes + a private set you never train on.</p></div>
    <h3>Try it: LLM-as-judge reliability</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Judge-agreement simulator</h4></div>
      <p class="wdesc">A judge model approximates human preference with some bias & noise. See how judge quality and number of eval samples affect your confidence in an A/B model comparison.</p>
      <div class="ctrls">
        <div class="ctrl"><label>true A-vs-B win rate <b id="ev_wv">55</b>%</label><input type="range" id="ev_w" min="50" max="80" value="55"></div>
        <div class="ctrl"><label>judge reliability <b id="ev_jv">85</b>%</label><input type="range" id="ev_j" min="55" max="99" value="85"></div>
        <div class="ctrl"><label>eval samples N <b id="ev_nv">200</b></label><input type="range" id="ev_n" min="20" max="2000" step="20" value="200"></div>
      </div>
      <div class="readout" id="evnote"></div>
    </div>`,
    init(root){
      const w=root.querySelector('#ev_w'),j=root.querySelector('#ev_j'),n=root.querySelector('#ev_n');
      function draw(){
        const tw=+w.value/100,jr=+j.value/100,N=+n.value;
        root.querySelector('#ev_wv').textContent=+w.value;root.querySelector('#ev_jv').textContent=+j.value;root.querySelector('#ev_nv').textContent=N;
        // observed win rate is biased toward 0.5 by judge unreliability
        const obs=0.5+(tw-0.5)*(2*jr-1);
        // standard error of a proportion
        const se=Math.sqrt(obs*(1-obs)/N);
        const ci=1.96*se;
        const lo=obs-ci, hi=obs+ci;
        const sig=lo>0.5;
        root.querySelector('#evnote').innerHTML=`Observed win rate ≈ <b>${(obs*100).toFixed(1)}%</b> (judge noise shrinks the true ${(+w.value)}% toward 50%). `+
          `95% CI: <b>[${(lo*100).toFixed(1)}%, ${(hi*100).toFixed(1)}%]</b>. `+
          (sig?'✅ Statistically significant — A really beats B at this N.':'⚠️ CI includes 50% — <b>not significant</b>. Increase N or use a more reliable judge before declaring a winner.')+
          (jr<0.7?' <br>Note: a weak judge can make a real difference look like a tie — judge quality caps your eval resolution.':'');
      }
      [w,j,n].forEach(x=>x.oninput=draw);draw();
    }
  },

    body:`
    <p>The landscape moves fast and is <strong>fractured by task</strong> — there is no single "best model" in 2026. Here's a researcher's map of what the benchmarks actually measure and where the frontier sits.</p>

    <table class="cmp">
      <tr><th>Benchmark</th><th>Measures</th><th>Why it's used</th></tr>
      <tr><td><b>GPQA Diamond</b></td><td>Graduate-level science reasoning</td><td>"Google-proof" — needs real reasoning, not recall</td></tr>
      <tr><td><b>SWE-bench Verified / Pro</b></td><td>Real GitHub issue resolution</td><td>The coding-agent standard; resolves real repos</td></tr>
      <tr><td><b>AIME / FrontierMath</b></td><td>Competition & research math</td><td>AIME near-saturating; FrontierMath is the hard frontier</td></tr>
      <tr><td><b>HLE</b> (Humanity's Last Exam)</td><td>Expert questions across domains</td><td>Designed to resist saturation</td></tr>
      <tr><td><b>LiveCodeBench</b></td><td>Contamination-free competitive coding</td><td>Continuously refreshed problems</td></tr>
      <tr><td><b>MRCR / RULER</b></td><td>Long-context multi-fact retrieval</td><td>Tests real long-context use, not just window size</td></tr>
      <tr><td><b>LM-Arena Elo</b></td><td>Human head-to-head preference</td><td>Holistic "helpfulness," crowd-voted</td></tr>
      <tr><td><s>MMLU</s></td><td>Broad knowledge MCQ</td><td><b>Saturated/retired</b> — top models all ~90%, no longer discriminates</td></tr>
    </table>
    <div class="callout key"><h5>The fractured frontier (early–mid 2026, directional)</h5>
    <ul>
      <li><strong>Coding</strong>: Claude Opus-class models lead SWE-bench & coding Arenas.</li>
      <li><strong>Math / ultra-long context</strong>: GPT-5.x-class strong on FrontierMath & long-context retrieval.</li>
      <li><strong>Reasoning (GPQA)</strong>: Gemini & Claude trade the top spot.</li>
      <li><strong>Price-performance / open</strong>: DeepSeek (V3.x/V4), Qwen, GLM, Mistral deliver near-frontier quality at a fraction of cost — the open ecosystem is ~6–12 months behind closed, and closing.</li>
    </ul>
    <em>Treat exact numbers as perishable</em> — the ranking reshuffles monthly. What's durable: the <strong>shape</strong> (task-fractured, reasoning-model era, open catching up).</div>
    <h3>Try it: pick a model by use case</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Frontier-model radar</h4></div>
      <p class="wdesc">Illustrative capability profiles (directional, not official). Toggle models to compare archetypes across axes — the point is the <em>shape</em> of tradeoffs, not precise scores.</p>
      <div class="ctrls" id="bm_toggles"></div>
      <div class="canvas-wrap"><canvas id="bmc" width="420" height="320" style="margin:0 auto"></canvas></div>
      <div class="readout" id="bmnote"></div>
    </div>`,
    init(root){
      const axes=['Coding','Math','Reasoning','Long-context','Cost-efficiency','Multimodal'];
      const models={
        'Claude Opus-class':{c:'#ff8a5b',v:[0.97,0.88,0.93,0.82,0.55,0.80]},
        'GPT-5.x-class':{c:'#3fd07f',v:[0.90,0.96,0.92,0.95,0.60,0.90]},
        'Gemini-class':{c:'#5b8cff',v:[0.88,0.90,0.95,0.90,0.70,0.95]},
        'DeepSeek/open':{c:'#8a5bff',v:[0.86,0.89,0.88,0.78,0.98,0.72]}
      };
      const on={}; Object.keys(models).forEach((k,i)=>on[k]=i<2);
      const tg=root.querySelector('#bm_toggles');
      Object.entries(models).forEach(([k,m])=>{
        const b=document.createElement('button');b.className='opt';b.style.cssText='width:auto;display:inline-flex;align-items:center;gap:7px;margin:3px';
        b.innerHTML=`<i style="display:inline-block;width:11px;height:11px;border-radius:3px;background:${m.c}"></i>${k}`;
        b.onclick=()=>{on[k]=!on[k];b.style.opacity=on[k]?1:0.4;draw();};b.style.opacity=on[k]?1:0.4;
        tg.appendChild(b);
      });
      const cv=root.querySelector('#bmc'),ctx=cv.getContext('2d');
      function draw(){
        clearCanvas(ctx,420,320);const cx=210,cy=160,R=120,n=axes.length;
        // grid
        for(let r=1;r<=4;r++){ctx.strokeStyle=CC.grid;ctx.beginPath();for(let i=0;i<=n;i++){const a=-Math.PI/2+i/n*2*Math.PI;const x=cx+Math.cos(a)*R*r/4,y=cy+Math.sin(a)*R*r/4;i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.stroke();}
        ctx.fillStyle=CC.labelDim;ctx.font='10px sans-serif';
        axes.forEach((ax,i)=>{const a=-Math.PI/2+i/n*2*Math.PI;const x=cx+Math.cos(a)*(R+22),y=cy+Math.sin(a)*(R+14);ctx.textAlign='center';ctx.fillText(ax,x,y);line(ctx,cx,cy,cx+Math.cos(a)*R,cy+Math.sin(a)*R,CC.grid,1);});
        Object.entries(models).forEach(([k,m])=>{
          if(!on[k])return;
          ctx.strokeStyle=m.c;ctx.fillStyle=m.c+'22';ctx.lineWidth=2;ctx.beginPath();
          m.v.forEach((v,i)=>{const a=-Math.PI/2+i/n*2*Math.PI;const x=cx+Math.cos(a)*R*v,y=cy+Math.sin(a)*R*v;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
          ctx.closePath();ctx.fill();ctx.stroke();
        });
        const sel=Object.keys(on).filter(k=>on[k]);
        root.querySelector('#bmnote').innerHTML=sel.length?`Comparing: ${sel.join(', ')}. Notice no model dominates every axis — <b>match the model to the task</b>. Open models (DeepSeek/Qwen) trade a little peak capability for huge cost-efficiency.`:'Toggle models above to compare.';
      }

    body:`
    <p>Across the industry, agents share a common skeleton \u2014 the <strong>Think\u2013Act\u2013Observe loop</strong> from Track 8, wrapped in production infrastructure. The working definition is blunt and useful: <em>"an agent is software that uses an LLM to decide its code path."</em> In normal code, if/else and loops are predefined; in an agent, the <strong>LLM chooses the next step</strong>.</p>
    <div class="callout key"><h5>The building blocks (common to LangGraph, AutoGen, CrewAI, OpenAI Agents SDK)</h5>
    <ul>
      <li><strong>Instructions</strong> \u2014 the system prompt defining the agent's role & policy.</li>
      <li><strong>Tools</strong> \u2014 typed functions the LLM can call; each has a schema (args, description) the model reads. Tools are the agent's hands.</li>
      <li><strong>Skills / toolsets</strong> \u2014 named, switchable groups of tools (swap the toolset at runtime per sub-task).</li>
      <li><strong>Hooks</strong> \u2014 lifecycle callbacks (on_turn_start, on_turn_end) for logging, guards, state setup.</li>
      <li><strong>Memory</strong> \u2014 long-term retrieval (vector store) for context across turns and sessions.</li>
      <li><strong>Hierarchical composition</strong> \u2014 an agent can call <em>specialized sub-agents as tools</em>. This is how complex agents decompose ("supervisor" / multi-agent patterns).</li>
      <li><strong>Reflection / self-improvement</strong> \u2014 the agent reviews its own execution traces to learn from past runs.</li>
    </ul></div>
    <h3>The patterns you'll see in the wild</h3>
    <table class="cmp">
      <tr><th>Pattern</th><th>Shape</th><th>Typical use</th></tr>

      <tr><td><b>Graph workflow</b></td><td>State graph: nodes=agents, a router picks the next, shared state bus</td><td>Branching pipelines (LangGraph)</td></tr>
