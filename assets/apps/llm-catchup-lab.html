\u2502  DATA   Spark/Ray (process) \u00b7 warehouse (store/query)       \u2502
\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518</code></pre>
    <div class="callout key"><h5>The layers, concretely</h5>
    <ul>
      <li><strong>LLM gateway</strong> \u2014 one API in front of many models (open + proprietary) and embeddings. Tools like <em>LiteLLM</em>, <em>OpenRouter</em>, or a self-hosted <em>vLLM</em>/<em>TGI</em> server give you a single <code>llm()</code> and <code>embed()</code> and let you swap models freely.</li>
      <li><strong>Vector DB / retrieval</strong> \u2014 <em>Qdrant</em>, <em>Weaviate</em>, <em>Milvus</em>, or <em>pgvector</em> for dense vectors; pair with a keyword index (<em>Elasticsearch</em>/<em>OpenSearch</em> BM25) for hybrid search. HNSW is the standard ANN index.</li>
      <li><strong>Frameworks</strong> \u2014 <em>LangGraph</em> (stateful graphs), <em>AutoGen</em> / <em>CrewAI</em> (multi-agent), <em>Haystack</em> / <em>LangChain</em> (RAG-first), or just the model provider's function-calling API directly.</li>
      <li><strong>Guardrails</strong> \u2014 input/output safety checks (e.g. <em>NeMo Guardrails</em>, <em>Guardrails AI</em>, or classifier shields) on every external interaction.</li>
      <li><strong>Code-as-action runtimes</strong> \u2014 some agents let the LLM write & run sandboxed Python instead of JSON tool calls ("code is more expressive than tool calls") \u2014 e.g. <em>smolagents</em>' CodeAgent, OpenAI's code interpreter.</li>
    </ul></div>
    <div class="callout intuition"><h5>How to choose a framework</h5><p>For <strong>fast prototyping</strong> \u2192 the provider's native function-calling or <em>smolagents</em>. For <strong>structured multi-step workflows</strong> with branching \u2192 <em>LangGraph</em>. For <strong>multi-agent collaboration</strong> \u2192 <em>AutoGen</em> / <em>CrewAI</em>. For <strong>RAG-heavy</strong> apps \u2192 <em>Haystack</em> / <em>LangChain</em>. They all sit on an LLM gateway underneath.</p></div>
    <h3>Try it: route a request through the stack</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Stack request tracer</h4></div>
      <p class="wdesc">Click a layer to see what it does for one Discovery Agent request. The point: each layer is a managed component you call, not code you own.</p>
      <div class="ctrls" id="st_layers"></div>
      <div class="readout" id="st_note">Click a layer above.</div>
    </div>`,
    init(root){
      const layers={
        'Agent logic':'Receives "find local content for a user interested in film photography." Plans: understand interests \u2192 retrieve \u2192 rank. Decides which tools to call.',
        'Tools':'Exposes hybrid_content_search(query, geo), quality_filter(docs), interest_expander(interests) as typed functions with JSON schemas the LLM reads.',
        'LLM gateway':'Serves the LLM calls (interest expansion, reranking rationale) and embeddings (encode query + content) behind one API. Open or proprietary model, your choice.',
        'Vector DB + keyword index':'Holds the local-content index: BM25 keyword + dense vectors + metadata (geo, freshness, quality). Returns candidate documents for a query.',
        'Guardrails':'Runs content-safety / PII checks on inputs and outputs before anything is returned to the user-facing API.',
        'Training / serving':'GPU training produced any custom reranker/embedder; vLLM/TGI serves them at low latency for the live API.'
      };
      const wrap=root.querySelector('#st_layers');
      Object.keys(layers).forEach(k=>{
        const b=document.createElement('button');b.className='opt';b.style.cssText='width:auto;display:inline-flex;margin:3px';b.textContent=k;
        b.onclick=()=>{root.querySelector('#st_note').innerHTML=`<b>${k}</b> \u2014 ${layers[k]}`;};
        wrap.appendChild(b);
      });
    }
  },

  {
    id:'agent-retrieval', title:'Retrieval for Discovery', level:'Applied', time:'11 min',
    tags:['hybrid retrieval','embeddings','quality','reranking'],
    search:'discovery retrieval hybrid BM25 dense embeddings quality filter reranking local content niche interest vector knn metadata freshness recall precision reciprocal rank fusion',
    body:`
    <p>A discovery agent lives or dies by retrieval. The goal: from a huge pool of local content, surface the few items that match a user's <em>niche</em> interest <strong>and</strong> are high-quality and local. That's a multi-signal ranking problem.</p>
    <h3>The signals you blend</h3>
    <ul>
      <li><strong>Dense/semantic</strong> \u2014 embed query & content; cosine similarity captures meaning ("film photography" \u2248 "35mm analog shots") even without keyword overlap.</li>
      <li><strong>Sparse/keyword (BM25)</strong> \u2014 exact term matching; precise for named entities, places, specific gear. Robust where embeddings are fuzzy.</li>
      <li><strong>Quality prior</strong> \u2014 a learned classifier: is this content high-quality, well-formed, engaging vs spam/low-effort?</li>
      <li><strong>Locality / freshness</strong> \u2014 geo match to the user's area, recency. Critical for "local content."</li>
      <li><strong>Rerank</strong> \u2014 a cross-encoder (or an LLM) reorders the top-K candidates with full query+doc attention for final precision.</li>
    </ul>
    <div class="callout key"><h5>Hybrid > either alone</h5><p>Dense retrieval recalls semantically related content; BM25 nails exact/rare terms. Fusing them (e.g. <em>reciprocal-rank fusion</em>) beats both. Then a <strong>reranker</strong> on the top ~100 candidates gives the precision a one-shot retriever can't. A useful 2025 reminder: strong keyword + agentic tool-use can rival a vector DB \u2014 retrieval <em>quality</em> matters more than picking the trendiest index.</p></div>
    <div class="callout frontier"><h5>Agentic retrieval for niche interests</h5><p>Niche interests are often multi-hop ("someone into Lisbon's analog film scene" \u2192 labs, photowalks, specific neighborhoods, local creators). An <strong>agentic RAG</strong> step lets the agent <em>expand the interest</em>, retrieve per facet, then merge \u2014 far better recall on the long tail than a single query embedding.</p></div>
    <h3>Try it: the discovery ranking stack</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Multi-signal discovery ranker</h4></div>
      <p class="wdesc">Query: <em>"vintage film photography, Lisbon."</em> Tune signal weights; watch candidate local content reorder. Goal: the great local items on top, spam & off-topic down.</p>
      <div class="ctrls">
        <div class="ctrl"><label>semantic <b id="dr_sev">40</b>%</label><input type="range" id="dr_se" min="0" max="100" value="40"></div>
        <div class="ctrl"><label>keyword <b id="dr_kv">20</b>%</label><input type="range" id="dr_k" min="0" max="100" value="20"></div>
        <div class="ctrl"><label>quality <b id="dr_qv">20</b>%</label><input type="range" id="dr_q" min="0" max="100" value="20"></div>
        <div class="ctrl"><label>locality <b id="dr_lv">20</b>%</label><input type="range" id="dr_l" min="0" max="100" value="20"></div>
      </div>
      <div class="bars" id="drbars"></div>
      <div class="readout" id="drnote"></div>
    </div>`,
    init(root){
      const docs=[
        ['Lisbon analog photowalk this Saturday',0.95,0.80,0.88,0.98,true],
        ['Best film labs in Lisbon (local guide)',0.90,0.85,0.90,0.95,true],
        ['My 35mm shots around Alfama',0.88,0.55,0.82,0.92,true],
        ['Generic camera gear review (US)',0.72,0.60,0.78,0.10,false],
        ['Stock photo site \u2014 vintage filters',0.65,0.70,0.40,0.20,false],
        ['CLICK: cheap cameras!!! buy now',0.35,0.92,0.05,0.15,false],
        ['Porto street photography meetup',0.80,0.45,0.85,0.55,false]
      ];
      const se=root.querySelector('#dr_se'),k=root.querySelector('#dr_k'),q=root.querySelector('#dr_q'),l=root.querySelector('#dr_l');
      function draw(){
        let a=+se.value,b=+k.value,c=+q.value,d=+l.value;const t=(a+b+c+d)||1;
        root.querySelector('#dr_sev').textContent=a;root.querySelector('#dr_kv').textContent=b;root.querySelector('#dr_qv').textContent=c;root.querySelector('#dr_lv').textContent=d;
        a/=t;b/=t;c/=t;d/=t;
        const scored=docs.map(x=>[x[0],a*x[1]+b*x[2]+c*x[3]+d*x[4],x[5]]).sort((p,q2)=>q2[1]-p[1]);
        const bars=root.querySelector('#drbars');bars.innerHTML='';
        scored.forEach(([title,sc,good],i)=>{
          const b2=document.createElement('div');b2.className='bar';
          const spam=title.includes('CLICK');
          const col=i<3&&good?'#21d4a8':spam?'#ff6b81':good?'#8da2c4':'#ffb454';
          b2.innerHTML=`<div class="lbl" style="width:250px;text-align:left;color:${col}">${i+1}. ${title}</div><div class="track"><div class="fill" style="width:${sc*100}%"></div></div><div class="pct">${(sc*100).toFixed(0)}</div>`;
          bars.appendChild(b2);
        });
        const top3good=scored.slice(0,3).filter(x=>x[2]).length;
        root.querySelector('#drnote').innerHTML=`<b>${top3good}/3</b> top results are genuinely good local content. `+
          (top3good===3?'\u2705 Well-tuned \u2014 local, on-topic, high-quality items on top.':'Adjust weights: low <b>locality</b> lets the US/Porto items rank; low <b>quality</b> lets spam through; low <b>semantic</b> misses on-topic items phrased differently.');
      }
      [se,k,q,l].forEach(s=>s.oninput=draw);draw();
    }
  },

  {
    id:'agent-discovery', title:'Building the Discovery Agent (end-to-end)', level:'Capstone', time:'15 min',
    tags:['discovery agent','API','architecture','replication'],
    search:'discovery agent content feed API local content niche interest end to end architecture query understanding retrieval rerank serving replication recipe',
    body:`
    <p>Let's assemble everything into the worked example: a <strong>Discovery Agent for a content feed</strong> \u2014 an API that takes a user's niche interests + locale and returns ranked, high-quality local content.</p>
    <div class="callout key"><h5>The contract</h5><pre style="margin:6px 0"><code>discover(user_interests: [str], geo: Location, k: int)
   \u2192 [ { content_id, title, score, rationale, source } ]   # ranked</code></pre></div>
    <h3>The pipeline (each stage maps to a stack layer)</h3>
    <pre class="diagram"><code>\u2460 QUERY UNDERSTANDING   normalize interests, detect niche, resolve geo
        \u2502  LLM (interest_expander) + geo resolve
        \u25bc
\u2461 INTEREST EXPANSION    "film photography" \u2192 {analog, 35mm, labs,
        \u2502                photowalks, local creators, neighborhoods}
        \u25bc  (agentic: retrieve per facet)
\u2462 HYBRID RETRIEVAL      BM25 + dense over local-content index
        \u2502  vector DB + keyword index  \u2192  ~hundreds of candidates
        \u25bc
\u2463 FILTER                quality classifier + locality + freshness
        \u2502  (your quality model) + safety guardrails
        \u25bc
\u2464 RERANK + RATIONALE    cross-encoder / LLM scores top-K,
        \u2502  LLM \u2014 picks best, writes why-relevant note
        \u25bc
\u2465 API RESPONSE          ranked list w/ scores + rationale + citations
           served via REST/gRPC, vLLM-served models, logged</code></pre>
    <h3>Pseudocode (framework-agnostic)</h3>
    <pre><code><span class="kw">def</span> <span class="fn">discover</span>(interests, geo, k=10):
    facets = llm.expand(interests)                <span class="cm"># \u2461 niche expansion</span>
    cands = []
    <span class="kw">for</span> f <span class="kw">in</span> facets:                              <span class="cm"># \u2462 agentic per-facet retrieval</span>
        q = embed(f)
        cands += index.search(q, geo=geo, mode="hybrid", n=100)
    cands = dedup(cands)
    cands = [c <span class="kw">for</span> c <span class="kw">in</span> cands <span class="kw">if</span> quality_clf(c) > 0.7      <span class="cm"># \u2463 filter</span>
                          <span class="kw">and</span> is_local(c, geo) <span class="kw">and</span> guardrails.ok(c)]
    ranked = reranker.score(interests, cands)[:k] <span class="cm"># \u2464 rerank</span>
    <span class="kw">return</span> [{**c, "rationale": llm.explain(interests, c)}
            <span class="kw">for</span> c <span class="kw">in</span> ranked]                       <span class="cm"># \u2465 response</span></code></pre>
    <h3>Try it: build & run the pipeline</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Discovery Agent simulator</h4></div>
      <p class="wdesc">Pick a niche + city, toggle which stages are enabled, and run a mock request. See how skipping a stage (e.g. no quality filter) degrades the result \u2014 the case for the full pipeline.</p>
      <div class="ctrls">
        <div class="ctrl" style="min-width:230px"><label>niche interest</label>
          <div class="seg"><button data-q="film" class="on">film photography</button><button data-q="ferment">fermentation</button><button data-q="climb">bouldering</button></div></div>
        <div class="ctrl"><label>city</label><div class="seg"><button data-city="Lisbon" class="on">Lisbon</button><button data-city="Austin">Austin</button></div></div>
      </div>
      <div class="ctrls" id="dg_stages"></div>
      <button class="btn" id="dg_run">\u25b6 run discover()</button>
      <div id="dg_out" style="margin-top:12px"></div>
      <div class="readout" id="dg_note"></div>
    </div>
    <div class="kp"><div class="kph">\ud83d\udd01 How to replicate this for YOUR domain</div>
      <ol>
        <li><b>Define the contract</b> \u2014 inputs (user signal), output (ranked items + rationale).</li>
        <li><b>Index your corpus</b> in a vector DB + keyword index (dense + BM25 + metadata). Pick the metadata you'll filter on.</li>
        <li><b>Wrap retrieval + filters as tools</b> (typed schemas) so the agent can orchestrate them.</li>
        <li><b>Use an LLM gateway</b> for expansion, reranking rationale, and embeddings \u2014 one API, swap models freely.</li>
        <li><b>Add guardrails</b> (content-safety/PII) on every external boundary.</li>
        <li><b>Build an eval set first</b> (next lesson) \u2014 you can't tune what you can't measure.</li>
        <li><b>Serve</b> behind REST/gRPC; train any custom rerankers on your GPU stack, serve on vLLM/TGI.</li>
      </ol>
    </div>`,
    init(root){
      let niche='film',city='Lisbon';
      root.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{niche=b.dataset.q;root.querySelectorAll('[data-q]').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
      root.querySelectorAll('[data-city]').forEach(b=>b.onclick=()=>{city=b.dataset.city;root.querySelectorAll('[data-city]').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
      const stages={'\u2461 interest expansion':true,'\u2463 quality filter':true,'\u2463 locality filter':true,'\u2464 rerank':true};
      const sw=root.querySelector('#dg_stages');
      Object.keys(stages).forEach(k=>{const b=document.createElement('button');b.className='opt';b.style.cssText='width:auto;display:inline-flex;margin:3px';b.textContent='\u2611 '+k;
        b.onclick=()=>{stages[k]=!stages[k];b.textContent=(stages[k]?'\u2611 ':'\u2610 ')+k;};sw.appendChild(b);});
      const pools={
        film:{Lisbon:[['Alfama analog photowalk Sat',0.97,true,true],['Lisbon film lab guide',0.95,true,true],['35mm shots of Tram 28',0.9,true,true],['Porto street photo meetup',0.8,true,false],['US camera gear review',0.7,false,false],['CLICK cheap cameras!!!',0.3,false,false]],
                Austin:[['Austin darkroom co-op night',0.96,true,true],['East Austin film photo crawl',0.94,true,true],['Where to develop film in ATX',0.92,true,true],['Dallas camera swap',0.78,true,false],['Generic lens listicle',0.68,false,false],['BUY film cheap link',0.28,false,false]]},
        ferment:{Lisbon:[['Lisbon wild fermentation workshop',0.96,true,true],['Local kombucha SCOBY swap',0.93,true,true],['Sourdough club Pr\u00edncipe Real',0.9,true,true],['Madrid pickling class',0.79,true,false],['Generic kimchi recipe blog',0.66,false,false],['SALE fermentation crocks!!',0.3,false,false]],
                 Austin:[['Austin ferment fest tickets',0.95,true,true],['ATX kombucha brewers meetup',0.92,true,true],['Hot sauce makers South Austin',0.89,true,true],['Houston pickle workshop',0.77,true,false],['Listicle: 10 ferments',0.64,false,false],['CHEAP crocks click',0.29,false,false]]},
        climb:{Lisbon:[['Sintra bouldering day trip',0.95,true,true],['Lisbon climbing gym social',0.92,true,true],['Outdoor crag cleanup Arr\u00e1bida',0.9,true,true],['Madrid climbing comp',0.78,true,false],['Generic chalk review',0.65,false,false],['BUY holds now!!!',0.3,false,false]],
               Austin:[['Reimers Ranch boulder meetup',0.96,true,true],['Austin gym climb night',0.93,true,true],['Greenbelt highball session',0.9,true,true],['San Antonio comp',0.76,true,false],['Shoe review listicle',0.66,false,false],['CHEAP gear link',0.28,false,false]]}
      };
      root.querySelector('#dg_run').onclick=()=>{
        let items=pools[niche][city].map(x=>({t:x[0],s:x[1],good:x[2],local:x[3]}));
        if(!stages['\u2461 interest expansion']) items=items.filter((_,i)=>i!==2&&i!==1);
        if(stages['\u2463 quality filter']) items=items.filter(x=>x.good||x.s>0.5);
        if(stages['\u2463 quality filter']) items=items.filter(x=>!x.t.toLowerCase().includes('click')&&!x.t.toLowerCase().includes('buy')&&!x.t.toLowerCase().includes('sale')&&!x.t.toLowerCase().includes('cheap'));
        if(stages['\u2463 locality filter']) items=items.filter(x=>x.local);
        if(stages['\u2464 rerank']) items.sort((a,b)=>b.s-a.s);
        const out=root.querySelector('#dg_out');out.innerHTML='';
        items.slice(0,5).forEach((x,i)=>{
          const div=document.createElement('div');div.style.cssText='margin:5px 0;padding:9px 12px;border-radius:9px;background:var(--inset);border-left:3px solid '+(x.good&&x.local?'#21d4a8':'#ffb454')+';font-size:13px';
          div.innerHTML=`<b>${i+1}. ${x.t}</b> <span style="color:#637fa3">\u00b7 score ${(x.s).toFixed(2)} \u00b7 ${x.local?'local':'non-local'}</span>`;
          out.appendChild(div);
        });
        const bad=items.slice(0,5).filter(x=>!x.good||!x.local).length;
        const off=Object.entries(stages).filter(([k,v])=>!v).map(([k])=>k);
        root.querySelector('#dg_note').innerHTML = off.length===0 ?
          `\u2705 Full pipeline: clean, local, on-topic results \u2014 exactly what the API should return.` :
          `\u26a0\ufe0f With ${off.join(', ')} disabled, <b>${bad}</b> of the top 5 are off-target (non-local/low-quality/spam). This is why each stage earns its place.`;
      };
      root.querySelector('#dg_run').click();
    }
  },

  {
    id:'agent-eval', title:'Evals, Guardrails & Productionization', level:'Applied', time:'11 min',
    tags:['evals','guardrails','observability','cost'],
    search:'agent evaluation benchmark LLM as judge guardrails safety PII observability logging cost caching productionization online offline metrics regression suite',
    body:`
    <p>An agent demo is easy; a <em>production</em> agent is an evaluation, safety, and cost problem. The mantra worth tattooing: <strong>"evaluation is almost all you need \u2014 your agent is only as good as your benchmark."</strong></p>
    <h3>Evaluation (build this FIRST)</h3>
    <ul>
      <li><strong>Offline benchmark set</strong> \u2014 curated (query \u2192 ideal results) pairs. For discovery: judged relevance + locality + quality labels. Measure <strong>recall@k, nDCG, precision@k</strong>.</li>
      <li><strong>LLM-as-judge</strong> \u2014 score rationale quality & relevance at scale (with the bias caveats from Track 8).</li>
      <li><strong>Online metrics</strong> \u2014 engagement/click-through, dwell, save-rate as the ultimate ground truth; A/B behind a feature flag.</li>
      <li><strong>Regression suite</strong> \u2014 every prompt/model change re-runs the benchmark before ship.</li>
    </ul>
    <div class="callout warn"><h5>Guardrails</h5><p>Run <strong>guardrails</strong> (PII, content-safety classifiers) on every external interaction \u2014 inputs and outputs. A useful principle is <strong>capability gating</strong>: limit dangerous combinations of untrusted input + sensitive capability + external action. For a user-facing discovery API, integrity filtering of returned content is non-negotiable. Open tools: <em>NeMo Guardrails</em>, <em>Guardrails AI</em>, and dedicated safety-classifier models.</p></div>
    <div class="callout key"><h5>Cost & observability</h5><p>Agents make <em>many</em> LLM calls \u2014 cost compounds. Levers: <strong>caching</strong> (skip re-calling when inputs are unchanged), smaller/cheaper models per step (cheap model for expansion, strong model only for final rerank), and routing between open & proprietary models. Log every step (thought/action/observation) for debugging and the <strong>reflection</strong> loop. Tools like <em>LangSmith</em>, <em>Langfuse</em>, <em>Phoenix</em>, or OpenTelemetry handle agent tracing/observability.</p></div>
    <h3>Try it: the eval-driven iteration loop</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Ship-decision dashboard</h4></div>
      <p class="wdesc">You changed a prompt. Should you ship? Tune the change's effect and your eval rigor; see whether the decision is trustworthy \u2014 the discipline that separates real agents from demos.</p>
      <div class="ctrls">
        <div class="ctrl"><label>true quality \u0394 <b id="mv_dv">+3</b>%</label><input type="range" id="mv_d" min="-5" max="10" value="3"></div>
        <div class="ctrl"><label>eval set size <b id="mv_nv">300</b></label><input type="range" id="mv_n" min="20" max="2000" step="20" value="300"></div>
        <div class="ctrl"><label>guardrail pass-rate <b id="mv_sv">99.5</b>%</label><input type="range" id="mv_s" min="90" max="100" step="0.1" value="99.5"></div>
      </div>
      <div class="readout" id="mvnote"></div>
    </div>
    <div class="callout frontier"><h5>\ud83d\udcda Resources to go deeper</h5>
    <ul>
      <li><b>LangGraph docs</b> \u2014 stateful agent graphs, the "build your first agent" path.</li>
      <li><b>Haystack / LangChain</b> \u2014 RAG and retrieval pipelines.</li>
      <li><b>Qdrant / Weaviate / pgvector</b> \u2014 vector search; pair with OpenSearch BM25 for hybrid.</li>
      <li><b>LiteLLM / vLLM</b> \u2014 LLM gateway & high-throughput serving.</li>
      <li><b>NeMo Guardrails / Guardrails AI</b> \u2014 safety & structured-output guards.</li>
      <li><b>LangSmith / Langfuse / Phoenix</b> \u2014 agent tracing, evals, observability.</li>
      <li><b>Anthropic's "Building effective agents"</b> \u2014 a clear, vendor-neutral patterns guide.</li>
    </ul></div>`,
    init(root){
      const d=root.querySelector('#mv_d'),n=root.querySelector('#mv_n'),s=root.querySelector('#mv_s');
      function draw(){
        const dq=+d.value/100,N=+n.value,sh=+s.value;
        root.querySelector('#mv_dv').textContent=(dq*100>=0?'+':'')+(dq*100).toFixed(0);root.querySelector('#mv_nv').textContent=N;root.querySelector('#mv_sv').textContent=sh.toFixed(1);
        const se=Math.sqrt(0.25/N);const ci=1.96*se;
        const detectable=Math.abs(dq)>ci;
        const safe=sh>=99;
        let msg='';
        if(dq<0){msg='\u274c <b>Do not ship</b> \u2014 the change hurts quality.';}
        else if(!detectable){msg=`\u26a0\ufe0f <b>Inconclusive</b> \u2014 a ${(dq*100).toFixed(0)}% change is within noise at N=${N} (\u00b1${(ci*100).toFixed(1)}%). Grow the eval set or the change is too small to trust.`;}
        else if(!safe){msg=`\ud83d\udea8 <b>Blocked on safety</b> \u2014 quality improved & is significant, but guardrail pass-rate ${sh.toFixed(1)}% is below the 99% bar. Fix integrity before shipping.`;}
        else {msg=`\u2705 <b>Ship it</b> \u2014 +${(dq*100).toFixed(0)}% is significant at N=${N} (\u00b1${(ci*100).toFixed(1)}%) and guardrails are green. Add to regression suite.`;}
        root.querySelector('#mvnote').innerHTML=msg;
      }
      [d,n,s].forEach(x=>x.oninput=draw);draw();
    }
  }

  ]
});

function renderGlossary(){
  const terms=[
    ['Attention','Content-based soft lookup: each token retrieves a weighted blend of others\' values via query·key similarity.'],
    ['RoPE','Rotary Position Embedding — encodes position by rotating Q/K; gives relative-position behavior, enables context extension.'],
    ['MoE','Mixture-of-Experts — many expert MLPs, a router activates top-k per token. Huge capacity, sparse compute.'],
    ['MLA','Multi-head Latent Attention — compresses KV-cache into a latent vector (DeepSeek). Tiny cache, strong quality.'],
    ['GQA','Grouped-Query Attention — query heads share K/V in groups; shrinks KV-cache with minimal quality loss.'],
    ['SFT','Supervised Fine-Tuning — train on (prompt, ideal response) demos to make a base model an assistant.'],
    ['RLHF','RL from Human Feedback — reward model + PPO optimize a policy toward human preferences, with a KL leash.'],
    ['DPO','Direct Preference Optimization — closed-form preference learning; no reward model or RL loop needed.'],
    ['GRPO','Group Relative Policy Optimization — critic-free RL using group-mean baselines; powers reasoning models.'],
    ['RLVR','RL with Verifiable Rewards — use an automatic verifier (tests/exact-match) as an unhackable reward.'],
    ['CoT','Chain-of-Thought — generating intermediate reasoning tokens; gives the model more serial compute.'],
    ['Test-time compute','Spending more inference compute (longer CoT, best-of-N, search) to improve answers.'],
    ['LoRA','Low-Rank Adaptation — freeze base weights, train small low-rank adapters; <1% params.'],
    ['QLoRA','LoRA on a 4-bit quantized base — fine-tune huge models on one GPU.'],
    ['Quantization','Storing weights in fewer bits (INT4/FP8) — shrinks memory, speeds memory-bound inference.'],
    ['KV-cache','Cached keys/values of past tokens during generation; grows with length — the long-context bottleneck.'],
    ['FlashAttention','IO-aware attention kernel; tiles in SRAM, avoids materializing the n×n matrix. Same math, faster.'],
    ['Speculative decoding','Small draft model proposes tokens, big model verifies in parallel. Lossless latency win.'],
    ['Mamba / SSM','State-space model — recurrent, O(n) time, constant memory. Sub-quadratic alternative to attention.'],
    ['Diffusion','Generate by iteratively denoising from noise. Backbone of image/video; emerging for text (dLLM).'],
    ['DiT','Diffusion Transformer — Transformer backbone for diffusion; scales better than U-Net.'],
    ['CLIP','Contrastively-trained image+text encoders sharing an embedding space; powers VLMs & retrieval.'],
    ['VLM','Vision-Language Model — vision encoder + projector + LLM; sees images, outputs text.'],
    ['Distillation','Transfer capability from a big teacher to a small student (logits, traces, or generated data).'],
    ['RAG','Retrieval-Augmented Generation — retrieve relevant docs, ground the answer in them.'],
    ['Agentic RAG','Retrieval as a tool in a loop — rewrite, retrieve, judge, repeat. Multi-hop capable.'],
    ['ReAct','Reason+Act loop — interleave thinking and tool calls, feeding observations back.'],
    ['LLM-as-judge','Using a strong model to score/compare outputs at scale; watch for position/length bias.'],
    ['LLM gateway','One API in front of many models + embeddings (e.g. LiteLLM, vLLM, OpenRouter); swap models freely.'],
    ['Scaling laws','Loss falls predictably with params, data, compute. Chinchilla: ~20 tokens/param compute-optimal.'],
    ['Perplexity','exp(cross-entropy loss) — a language model\'s "effective branching factor." Lower is better.'],
    ['Classifier-free guidance','Diffusion trick: extrapolate between conditional & unconditional predictions to boost prompt adherence.']
  ].sort((a,b)=>a[0].localeCompare(b[0]));
  document.getElementById('view').innerHTML=`<div class="fadein">
    <div class="crumbs"><span>📖 Reference</span> › Glossary</div>
    <div class="lesson-h"><h2>Glossary — the Acronym Soup, Decoded</h2></div>
    <p class="mut" style="margin-bottom:20px">${terms.length} terms every modern LLM conversation assumes you know.</p>
    <div class="gloss">${terms.map(([t,d])=>`<div class="gterm"><b>${t}</b><span>${d}</span></div>`).join('')}</div>
    <div class="lnav"><a onclick="go('timeline')"><div class="dir">‹ Prev</div><div class="ttl">Timeline</div></a><a class="nx" onclick="go('cheatsheet')"><div class="dir">Next ›</div><div class="ttl">Cheat Sheet</div></a></div>
  </div>`;
  window.scrollTo(0,0);
}

function renderCheatsheet(){
  document.getElementById('view').innerHTML=`<div class="fadein">
    <div class="crumbs"><span>🃏 Reference</span> › Cheat Sheet</div>
    <div class="lesson-h"><h2>One-Page Cheat Sheet</h2></div>
    <p class="mut" style="margin-bottom:16px">The formulas & recipes worth memorizing. Print-friendly.</p>
    <div class="content">
    <h3>Core formulas</h3>
    <pre><code><span class="cm"># Self-attention</span>
Attn(Q,K,V) = softmax(QKᵀ / √d_k) · V

<span class="cm"># Next-token loss & perplexity</span>
loss = −Σ log p(token_t | token_&lt;t);   PPL = exp(loss)

<span class="cm"># Scaling (Chinchilla): compute-optimal</span>
C ≈ 6·N·D;   D ≈ 20·N   (tokens ≈ 20 × params)

<span class="cm"># RLHF objective</span>
max E[R(x,y)] − β·KL(π_θ ‖ π_ref)

<span class="cm"># DPO loss (no reward model)</span>
−log σ( β·[ (logπ_θ(y_w)−logπ_ref(y_w)) − (logπ_θ(y_l)−logπ_ref(y_l)) ] )

<span class="cm"># GRPO advantage (critic-free)</span>
A_i = (r_i − mean(r_group)) / std(r_group)

<span class="cm"># LoRA</span>
W' = W + (α/r)·B·A     (W frozen; A,B tiny, rank r)</code></pre>

    <h3>Decision recipes</h3>
    <table class="cmp">
      <tr><th>If you want to…</th><th>Reach for</th></tr>
      <tr><td>Make a base model follow instructions</td><td><b>SFT</b> (completion-only loss, chat template)</td></tr>
      <tr><td>Align to preferences, lean infra</td><td><b>DPO</b> (or SimPO/ORPO if reference-free)</td></tr>
      <tr><td>Learn from thumbs up/down (unpaired)</td><td><b>KTO</b></td></tr>
      <tr><td>Improve reasoning with a verifier</td><td><b>GRPO / RLVR</b> (TRL GRPOTrainer, verl)</td></tr>
      <tr><td>Fine-tune cheaply on 1 GPU</td><td><b>QLoRA</b> (4-bit base + LoRA r=16–32)</td></tr>
      <tr><td>Serve a big model cheaply</td><td><b>INT4/FP8 quant</b> + GQA/MLA + paged KV-cache</td></tr>
      <tr><td>Cut inference latency (lossless)</td><td><b>Speculative decoding</b> (EAGLE) + FlashAttention</td></tr>
      <tr><td>Make a small model reason</td><td><b>Trace distillation</b> from a reasoning teacher</td></tr>
      <tr><td>Ground a model in your data</td><td><b>RAG</b> → <b>Agentic RAG</b> for multi-hop</td></tr>
      <tr><td>Build a task agent</td><td><b>ReAct</b> loop + typed tools + evals first</td></tr>
      <tr><td>Squeeze more accuracy at inference</td><td><b>Best-of-N + verifier</b> or longer CoT</td></tr>
    </table>

    <h3>Mental models to keep</h3>
    <div class="kp"><ul>
      <li><b>Inference is memory-bound</b> → quantization & KV-cache tricks give the biggest serving wins.</li>
      <li><b>Compute-optimal ≠ deployment-optimal</b> → overtrain small models for cheap serving.</li>
      <li><b>Verifiable reward &gt; learned reward</b> → if you can check it, GRPO it. No reward hacking.</li>
      <li><b>Reasoning = serial compute</b> → CoT and test-time scaling buy depth a single pass can't.</li>
      <li><b>Hybrids win</b> → MoE+attention, Mamba+attention, AR+diffusion, dense+sparse retrieval.</li>
      <li><b>Evaluation is almost all you need</b> → build the benchmark before the model.</li>
      <li><b>Data &gt; architecture</b> → quality, dedup, mixture, and synthetic data decide outcomes.</li>
    </ul></div>
    <div class="callout frontier"><h5>Your "try this month" shortlist</h5><p>1) QLoRA-tune a small open model on your task. 2) If you have any verifier, GRPO it with TRL. 3) Distill reasoning traces from a frontier teacher into a 7–8B student. 4) Wrap your APIs as tools and build a ReAct agent. 5) Build a 200-example eval set before any of the above.</p></div>
    </div>
    <div class="lnav"><a onclick="go('glossary')"><div class="dir">‹ Prev</div><div class="ttl">Glossary</div></a><a class="nx" onclick="go('home')"><div class="dir">Done ›</div><div class="ttl">Back to Home</div></a></div>
  </div>`;
  window.scrollTo(0,0);
}
