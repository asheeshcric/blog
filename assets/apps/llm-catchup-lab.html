<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Catch-Up Lab — Interactive Field Guide to Modern LLM Research</title>
<style>
:root{
  --bg:#0a0e17; --bg2:#0e1320; --panel:#121a2b; --panel2:#172238;
  --line:#22304d; --line2:#2e3f63;
  --txt:#dfe8f7; --mut:#8da2c4; --mut2:#6b7fa3;
  --acc:#5b8cff; --acc2:#8a5bff; --acc3:#21d4a8; --warn:#ffb454; --bad:#ff6b81; --good:#3fd07f;
  --inset:#0c1322;        /* recessed elements: range tracks, chips, readouts */
  --canvas-bg:#070b13;    /* canvas-wrap background */
  --strong:#ffffff;       /* bold text on dark */
  --onacc:#ffffff;        /* text on accent/gradient fills */
  --grad:linear-gradient(120deg,#5b8cff,#8a5bff 55%,#21d4a8);
  --shadow:0 8px 30px rgba(0,0,0,.45);
  --bgrad1:rgba(138,91,255,.10); --bgrad2:rgba(91,140,255,.10);
  --r:14px;
}
/* ---------- LIGHT THEME ---------- */
:root[data-theme="light"]{
  --bg:#f4f6fb; --bg2:#eef1f8; --panel:#ffffff; --panel2:#eef2fb;
  --line:#d9e0ee; --line2:#c2cce0;
  --txt:#1a2236; --mut:#5a6b8c; --mut2:#8493b0;
  --acc:#3b6fe0; --acc2:#7b46e6; --acc3:#0bae87; --warn:#d98a17; --bad:#e0455c; --good:#1ba85f;
  --inset:#f1f4fb; --canvas-bg:#f7f9fd; --strong:#0c1322; --onacc:#ffffff;
  --grad:linear-gradient(120deg,#3b6fe0,#7b46e6 55%,#0bae87);
  --shadow:0 8px 28px rgba(40,60,110,.14);
  --bgrad1:rgba(123,70,230,.10); --bgrad2:rgba(59,111,224,.12);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(1200px 700px at 80% -10%,var(--bgrad1),transparent 60%),
             radial-gradient(900px 600px at -10% 10%,var(--bgrad2),transparent 55%),
             var(--bg);
  color:var(--txt);
  font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--acc);text-decoration:none}
a:hover{text-decoration:underline}
code,kbd{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace}
::selection{background:rgba(91,140,255,.35)}

/* ---------- Layout ---------- */
#app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
#side{
  position:sticky;top:0;height:100vh;overflow-y:auto;
  background:linear-gradient(180deg,var(--bg2),var(--bg));
  border-right:1px solid var(--line);padding:18px 14px 40px;
}
#main{min-width:0;padding:0 0 80px}
.wrap{max-width:980px;margin:0 auto;padding:0 32px}

/* ---------- Sidebar ---------- */
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 14px}
.brand .logo{
  width:38px;height:38px;border-radius:11px;background:var(--grad);
  display:grid;place-items:center;font-size:20px;box-shadow:0 6px 18px rgba(91,140,255,.35);flex:none
}
.brand h1{font-size:15px;margin:0;letter-spacing:.2px;font-weight:700}
.brand p{margin:1px 0 0;font-size:11px;color:var(--mut)}

.progwrap{padding:6px 8px 14px}
.progbar{height:7px;border-radius:6px;background:var(--inset);overflow:hidden;border:1px solid var(--line)}
.progfill{height:100%;width:0;background:var(--grad);transition:width .5s cubic-bezier(.4,0,.2,1)}
.progtxt{font-size:11px;color:var(--mut);margin-top:6px;display:flex;justify-content:space-between}

.search{position:relative;margin:4px 8px 14px}
.search input{
  width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px;
  color:var(--txt);padding:9px 11px 9px 32px;font-size:13px;outline:none
}
.search input:focus{border-color:var(--acc)}
.search svg{position:absolute;left:10px;top:9px;opacity:.5}

.navsec{margin:2px 0}
.navsec>.sech{
  display:flex;align-items:center;gap:9px;width:100%;text-align:left;cursor:pointer;
  background:none;border:none;color:var(--txt);padding:8px 8px;border-radius:9px;font-size:13px;font-weight:600
}
.navsec>.sech:hover{background:var(--panel)}
.navsec .ic{font-size:15px;width:20px;text-align:center;flex:none}
.navsec .cnt{margin-left:auto;font-size:10px;color:var(--mut);background:var(--inset);border:1px solid var(--line);border-radius:20px;padding:1px 7px}
.lessons{overflow:hidden;max-height:0;transition:max-height .3s ease}
.navsec.open .lessons{max-height:800px}
.lessonlink{
  display:flex;align-items:center;gap:8px;padding:6px 8px 6px 37px;font-size:12.5px;color:var(--mut);
  cursor:pointer;border-radius:8px;position:relative
}
.lessonlink:hover{background:var(--panel);color:var(--txt)}
.lessonlink.active{background:var(--panel2);color:var(--strong);font-weight:600}
.lessonlink.active::before{content:"";position:absolute;left:24px;top:50%;transform:translateY(-50%);width:3px;height:16px;border-radius:3px;background:var(--grad)}
.dot{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--line2);flex:none}
.lessonlink.done .dot{background:var(--good);border-color:var(--good)}
.chev{margin-left:auto;transition:transform .25s;opacity:.5}
.navsec.open .chev{transform:rotate(90deg)}

.sidefoot{padding:14px 10px 0;margin-top:12px;border-top:1px solid var(--line);font-size:11px;color:var(--mut2)}
.sidefoot button{background:none;border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:5px 9px;font-size:11px;cursor:pointer;margin-top:8px}
.sidefoot button:hover{border-color:var(--bad);color:var(--bad)}

/* ---------- Hero / Home ---------- */
.hero{padding:42px 0 14px}
.hero .eyebrow{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--acc3);font-weight:700}
.hero h2{font-size:40px;line-height:1.1;margin:10px 0 8px;font-weight:800;letter-spacing:-.5px}
.hero h2 .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero p.lead{font-size:17px;color:var(--mut);max-width:680px;margin:0 0 22px}
.stat-row{display:flex;gap:14px;flex-wrap:wrap;margin:6px 0 26px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 16px;min-width:120px}
.stat b{font-size:22px;display:block;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat span{font-size:11.5px;color:var(--mut)}

.tracks{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin:8px 0 36px}
.trackcard{
  background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--r);
  padding:18px;cursor:pointer;transition:.2s;position:relative;overflow:hidden
}
.trackcard:hover{border-color:var(--line2);transform:translateY(-3px);box-shadow:var(--shadow)}
.trackcard .ti{font-size:26px;margin-bottom:8px}
.trackcard h3{margin:0 0 5px;font-size:16px}
.trackcard p{margin:0;font-size:12.5px;color:var(--mut);line-height:1.5}
.trackcard .meta{margin-top:12px;font-size:11px;color:var(--mut2);display:flex;align-items:center;gap:8px}
.trackcard .tprog{height:4px;background:var(--inset);border-radius:4px;flex:1;overflow:hidden}
.trackcard .tprog i{display:block;height:100%;background:var(--grad)}

/* ---------- Lesson content ---------- */
.crumbs{font-size:12px;color:var(--mut);padding:26px 0 4px}
.crumbs span{color:var(--acc3)}
.lesson-h{display:flex;align-items:flex-start;gap:14px;margin:6px 0 6px}
.lesson-h h2{font-size:30px;margin:0;font-weight:800;letter-spacing:-.4px;line-height:1.15}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 22px}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--line);color:var(--mut);background:var(--panel)}
.badge.lv{color:var(--acc3);border-color:rgba(33,212,168,.4)}
.badge.tm{color:var(--warn);border-color:rgba(255,180,84,.35)}

.content{font-size:15.5px}
.content h3{font-size:19px;margin:30px 0 10px;font-weight:700;display:flex;align-items:center;gap:8px}
.content h3::before{content:"";width:4px;height:18px;border-radius:3px;background:var(--grad)}
.content h4{font-size:15px;margin:20px 0 8px;color:var(--txt)}
.content p{margin:11px 0;color:var(--txt)}
.content ul,.content ol{margin:11px 0;padding-left:22px;color:var(--txt)}
.content li{margin:6px 0}
.content strong{color:var(--strong)}
.content em{color:var(--acc3);font-style:normal;font-weight:600}
.content .mut{color:var(--mut)}

.callout{border-radius:12px;padding:14px 16px;margin:18px 0;border:1px solid var(--line);background:var(--panel);position:relative;padding-left:46px}
.callout::before{position:absolute;left:15px;top:13px;font-size:17px}
.callout.key{border-color:rgba(91,140,255,.35);background:rgba(91,140,255,.07)}
.callout.key::before{content:"🔑"}
.callout.intuition{border-color:rgba(33,212,168,.35);background:rgba(33,212,168,.07)}
.callout.intuition::before{content:"💡"}
.callout.warn{border-color:rgba(255,180,84,.35);background:rgba(255,180,84,.07)}
.callout.warn::before{content:"⚠️"}
.callout.frontier{border-color:rgba(138,91,255,.4);background:rgba(138,91,255,.08)}
.callout.frontier::before{content:"🚀"}
.callout h5{margin:0 0 4px;font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--mut)}
.callout p{margin:4px 0;font-size:14px}

pre{background:#0d1322;border:1px solid var(--line);border-radius:12px;padding:15px 16px;overflow-x:auto;margin:16px 0;position:relative}
pre code{font-size:13px;line-height:1.65;color:#cfe0ff}
pre .cm{color:#5e7299}pre .kw{color:#c792ea}pre .st{color:#a5e8a0}pre .fn{color:#82aaff}pre .nm{color:#f78c6c}
.copy{position:absolute;top:8px;right:8px;background:var(--panel);border:1px solid var(--line);color:var(--mut);border-radius:7px;font-size:11px;padding:3px 9px;cursor:pointer}
.copy:hover{color:var(--txt);border-color:var(--line2)}
.codecap{font-size:11px;color:var(--mut2);margin:-10px 0 16px;padding-left:4px}

table.cmp{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
table.cmp th,table.cmp td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top}
table.cmp th{background:var(--panel2);color:var(--strong);font-weight:600}
table.cmp tr:nth-child(even) td{background:rgba(255,255,255,.015)}
table.cmp td b{color:var(--acc3)}

.kp{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px 18px;margin:18px 0}
.kp .kph{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--acc);font-weight:700;padding:10px 0 2px}
.kp ul{margin:6px 0 12px}

/* ---------- Widgets ---------- */
.widget{background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--line2);border-radius:16px;padding:18px;margin:22px 0;box-shadow:var(--shadow)}
.widget .wh{display:flex;align-items:center;gap:9px;margin-bottom:4px}
.widget .wh .tag{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--onacc);background:var(--grad);padding:3px 9px;border-radius:20px;font-weight:700}
.widget .wh h4{margin:0;font-size:15px}
.widget .wdesc{font-size:12.5px;color:var(--mut);margin:0 0 14px}
.ctrls{display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin:6px 0 14px}
.ctrl{display:flex;flex-direction:column;gap:4px;min-width:130px}
.ctrl label{font-size:11px;color:var(--mut);display:flex;justify-content:space-between}
.ctrl label b{color:var(--acc3)}
input[type=range]{-webkit-appearance:none;appearance:none;height:5px;border-radius:5px;background:var(--inset);border:1px solid var(--line);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 0 0 3px rgba(91,140,255,.2)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border:none;border-radius:50%;background:var(--acc);cursor:pointer}
.seg{display:inline-flex;background:var(--inset);border:1px solid var(--line);border-radius:9px;padding:2px}
.seg button{background:none;border:none;color:var(--mut);font-size:12px;padding:5px 11px;border-radius:7px;cursor:pointer}
.seg button.on{background:var(--panel2);color:var(--strong)}
.btn{background:var(--grad);border:none;color:var(--onacc);font-weight:600;font-size:13px;padding:8px 15px;border-radius:9px;cursor:pointer}
.btn:hover{filter:brightness(1.1)}
.btn.ghost{background:none;border:1px solid var(--line2);color:var(--txt)}
.canvas-wrap{background:var(--canvas-bg);border:1px solid var(--line);border-radius:12px;padding:12px;overflow-x:auto}
canvas{display:block;max-width:100%}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--mut);margin-top:10px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.readout{font-size:12.5px;color:var(--mut);margin-top:12px;background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:10px 13px}
.readout b{color:var(--acc3)}

/* token + bars widgets */
.tokrow{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.tok{padding:6px 10px;border-radius:8px;background:var(--inset);border:1px solid var(--line);font-size:13px;cursor:pointer;font-family:"SF Mono",monospace;transition:.15s}
.tok:hover{border-color:var(--acc)}
.tok.sel{background:var(--acc);color:var(--onacc);border-color:var(--acc)}
.bars{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.bar{display:flex;align-items:center;gap:9px;font-size:12px}
.bar .lbl{width:90px;text-align:right;color:var(--mut);font-family:"SF Mono",monospace;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .track{flex:1;background:var(--inset);border-radius:6px;height:16px;overflow:hidden;border:1px solid var(--line)}
.bar .fill{height:100%;background:var(--grad);transition:width .35s}
.bar .pct{width:52px;color:var(--mut);font-family:"SF Mono",monospace;flex:none}
.bar.dim{opacity:.32}

/* ---------- Quiz ---------- */
.quiz{background:var(--panel);border:1px solid var(--line2);border-radius:16px;padding:20px;margin:26px 0}
.quiz .qh{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--acc2);font-weight:700;margin-bottom:14px}
.qitem{margin-bottom:18px}
.qitem .q{font-weight:600;margin-bottom:9px}
.opt{display:block;width:100%;text-align:left;background:var(--inset);border:1px solid var(--line);color:var(--txt);padding:10px 13px;border-radius:9px;margin:6px 0;cursor:pointer;font-size:13.5px;transition:.15s}
.opt:hover{border-color:var(--line2)}
.opt.correct{border-color:var(--good);background:rgba(63,208,127,.12)}
.opt.wrong{border-color:var(--bad);background:rgba(255,107,129,.12)}
.opt.dis{cursor:default;opacity:.7}
.explain{font-size:12.5px;color:var(--mut);margin-top:8px;padding:9px 12px;border-left:3px solid var(--acc3);background:rgba(33,212,168,.05);border-radius:0 8px 8px 0;display:none}
.explain.show{display:block}

/* ---------- Footer nav ---------- */
.lnav{display:flex;justify-content:space-between;gap:14px;margin:42px 0 0;border-top:1px solid var(--line);padding-top:22px}
.lnav a{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 16px;cursor:pointer;transition:.2s}
.lnav a:hover{border-color:var(--line2);text-decoration:none;background:var(--panel2)}
.lnav .dir{font-size:11px;color:var(--mut)}
.lnav .ttl{font-size:14px;font-weight:600;color:var(--txt);margin-top:2px}
.lnav a.nx{text-align:right}
.markdone{display:flex;align-items:center;gap:10px;margin:30px 0 0;padding:14px 16px;background:var(--panel);border:1px solid var(--line);border-radius:12px}
.markdone label{font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px}
.markdone input{width:18px;height:18px;accent-color:var(--good)}

/* timeline / glossary / cheatsheet */
.tl{position:relative;margin:20px 0;padding-left:26px}
.tl::before{content:"";position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:var(--line2)}
.tlitem{position:relative;margin-bottom:20px}
.tlitem::before{content:"";position:absolute;left:-23px;top:5px;width:12px;height:12px;border-radius:50%;background:var(--grad);box-shadow:0 0 0 3px var(--bg)}
.tlitem .yr{font-size:12px;color:var(--acc3);font-weight:700}
.tlitem h4{margin:2px 0 4px;font-size:15px}
.tlitem p{margin:0;font-size:13px;color:var(--mut)}
.gloss{columns:2;column-gap:24px}
@media(max-width:780px){.gloss{columns:1}}
.gterm{break-inside:avoid;margin-bottom:14px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 14px}
.gterm b{color:var(--acc);display:block;font-size:13.5px;margin-bottom:3px}
.gterm span{font-size:12.5px;color:var(--mut)}

.pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);color:var(--mut);margin:0 4px 4px 0}

/* mobile */
#menubtn{display:none}
@media(max-width:880px){
  #app{grid-template-columns:1fr}
  #side{position:fixed;z-index:50;width:300px;transform:translateX(-105%);transition:transform .25s;box-shadow:var(--shadow)}
  #side.show{transform:none}
  #menubtn{display:grid;position:fixed;top:14px;left:14px;z-index:60;width:42px;height:42px;place-items:center;background:var(--panel);border:1px solid var(--line2);border-radius:11px;color:var(--txt);font-size:18px;cursor:pointer}
  .wrap{padding:0 18px}
  .hero h2{font-size:32px}
  #backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;display:none}
  #backdrop.show{display:block}
}
.fadein{animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hidden{display:none!important}

/* code blocks stay dark in both themes (syntax palette is tuned for dark) */
:root[data-theme="light"] pre{background:#0e1626;border-color:#1f2c44;box-shadow:0 4px 14px rgba(40,60,110,.12)}
:root[data-theme="light"] pre code{color:#cfe0ff}
:root[data-theme="light"] pre.diagram code,:root[data-theme="light"] pre code .cm{}
:root[data-theme="light"] .copy{background:#172238;border-color:#2e3f63;color:#8da2c4}
/* callout tints a touch stronger in light for contrast */
:root[data-theme="light"] .callout.key{background:rgba(59,111,224,.08)}
:root[data-theme="light"] .callout.intuition{background:rgba(11,174,135,.10)}
:root[data-theme="light"] .callout.warn{background:rgba(217,138,23,.12)}
:root[data-theme="light"] .callout.frontier{background:rgba(123,70,230,.10)}
:root[data-theme="light"] .hero h2 .g,:root[data-theme="light"] .stat b{filter:saturate(1.1)}
:root[data-theme="light"] input[type=range]{background:#e3e9f5}
:root[data-theme="light"] ::selection{background:rgba(59,111,224,.22)}

/* ---------- theme toggle ---------- */
.themebtn{display:flex;align-items:center;gap:8px;width:100%;justify-content:center;
  background:var(--panel);border:1px solid var(--line);color:var(--mut);border-radius:10px;
  padding:8px 10px;font-size:12px;cursor:pointer;margin:2px 8px 12px;width:calc(100% - 16px);transition:.15s}
.themebtn:hover{border-color:var(--line2);color:var(--txt)}
.themebtn .tic{font-size:14px}

</style>
</head>

<body>
<button id="menubtn" onclick="toggleSide()">☰</button>
<div id="backdrop" onclick="toggleSide()"></div>
<div id="app">
  <aside id="side">
    <div class="brand" onclick="go('home')" style="cursor:pointer">
      <div class="logo">🧠</div>
      <div><h1>LLM Catch-Up Lab</h1><p>Transformers → Frontier, interactively</p></div>
    </div>
    <div class="progwrap">
      <div class="progbar"><div class="progfill" id="progfill"></div></div>
      <div class="progtxt"><span id="progtxt">0 / 0 lessons</span><span id="progpct">0%</span></div>
    </div>
    <button class="themebtn" id="themebtn" onclick="toggleTheme()"><span class="tic">☀️</span> Switch to Light</button>
    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" placeholder="Search lessons & concepts…" oninput="doSearch(this.value)" autocomplete="off">
    </div>
    <nav id="nav"></nav>
    <div class="sidefoot">
      Progress is saved in your browser (localStorage). No data leaves this machine.
      <br><button onclick="resetProgress()">Reset progress</button>
    </div>
  </aside>
  <main id="main"><div class="wrap" id="view"></div></main>
</div>
<script>

/* ============================================================
   THEME (light / dark) — palette + toggle
   ============================================================ */
const THEME_KEY='llmlab.theme.v1';
// canvas color palette, recomputed per theme
let CC = {};
function computeCanvasColors(){
  const light = document.documentElement.getAttribute('data-theme')==='light';
  CC = light ? {
    grid:'#d2dbec', grid2:'#e4eaf6', axis:'#c2cce0',
    label:'#5a6b8c', labelDim:'#8493b0',
    inset:'#eef2fb', dim:'#c2cce0', marker:'#1a2236',
    track:'#e6ebf6'
  } : {
    grid:'#22304d', grid2:'#16223a', axis:'#22304d',
    label:'#637fa3', labelDim:'#8da2c4',
    inset:'#0c1322', dim:'#33425e', marker:'#ffffff',
    track:'#0c1322'
  };
}
function getTheme(){ try{return localStorage.getItem(THEME_KEY)||'dark'}catch(e){return 'dark'} }
function applyTheme(t,rerender){
  document.documentElement.setAttribute('data-theme', t);
  try{localStorage.setItem(THEME_KEY,t)}catch(e){}
  computeCanvasColors();
  updateThemeBtn();
  if(rerender && current) go(current);   // re-render so canvases redraw with new palette
}
function toggleTheme(){ applyTheme(getTheme()==='light'?'dark':'light', true); }
function updateThemeBtn(){
  const b=document.getElementById('themebtn'); if(!b)return;
  const light=getTheme()==='light';
  b.innerHTML = light
    ? '<span class="tic">🌙</span> Switch to Dark'
    : '<span class="tic">☀️</span> Switch to Light';
}

/* ============================================================
   LLM Catch-Up Lab — engine
   ============================================================ */
const CURRICULUM = [];   // filled by track files below
const LESSON_INDEX = {}; // id -> {lesson, track, ti, li}
const ORDER = [];        // flat lesson ids in order

function registerTrack(t){ CURRICULUM.push(t); }
function buildIndex(){
  ORDER.length=0;
  CURRICULUM.forEach((t,ti)=>{
    t.lessons.forEach((l,li)=>{
      LESSON_INDEX[l.id]={lesson:l,track:t,ti,li};
      ORDER.push(l.id);
    });
  });
}

/* ---------- progress (localStorage) ---------- */
const PKEY='llmlab.progress.v1';
let DONE = load();
function load(){ try{return JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){return {}} }
function save(){ try{localStorage.setItem(PKEY,JSON.stringify(DONE))}catch(e){} }
function isDone(id){ return !!DONE[id] }
function setDone(id,v){ if(v)DONE[id]=1; else delete DONE[id]; save(); renderSidebar(); updateProg(); }
function resetProgress(){ if(confirm('Reset all lesson progress?')){DONE={};save();renderSidebar();updateProg();go(current||'home');} }

function totalLessons(){ return ORDER.length }
function doneCount(){ return ORDER.filter(isDone).length }
function updateProg(){
  const d=doneCount(),t=totalLessons(),p=t?Math.round(d/t*100):0;
  document.getElementById('progfill').style.width=p+'%';
  document.getElementById('progtxt').textContent=d+' / '+t+' lessons';
  document.getElementById('progpct').textContent=p+'%';
}

/* ---------- sidebar ---------- */
let openTracks={};
function renderSidebar(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  CURRICULUM.forEach((t,ti)=>{
    const sec=document.createElement('div'); sec.className='navsec'+(openTracks[ti]?' open':'');
    const done=t.lessons.filter(l=>isDone(l.id)).length;
    const h=document.createElement('button'); h.className='sech';
    h.innerHTML=`<span class="ic">${t.icon}</span><span>${t.title}</span><span class="cnt">${done}/${t.lessons.length}</span><span class="chev">›</span>`;
    h.onclick=()=>{openTracks[ti]=!openTracks[ti];renderSidebar();};
    sec.appendChild(h);
    const ll=document.createElement('div'); ll.className='lessons';
    t.lessons.forEach(l=>{
      const a=document.createElement('div');
      a.className='lessonlink'+(l.id===current?' active':'')+(isDone(l.id)?' done':'');
      a.innerHTML=`<span class="dot"></span><span>${l.title}</span>`;
      a.onclick=()=>{go(l.id); if(window.innerWidth<=880)toggleSide(true);};
      ll.appendChild(a);
    });
    sec.appendChild(ll); nav.appendChild(sec);
  });
}

/* ---------- router ---------- */
let current=null;
function go(id){
  current=id;
  if(id==='home'){ renderHome(); }
  else if(id==='timeline'){ renderTimeline(); }
  else if(id==='glossary'){ renderGlossary(); }
  else if(id==='cheatsheet'){ renderCheatsheet(); }
  else { renderLesson(id); }
  // open the containing track
  const idx=LESSON_INDEX[id];
  if(idx){ openTracks[idx.ti]=true; }
  renderSidebar(); updateProg();
  document.getElementById('main').scrollTop=0; window.scrollTo(0,0);
  if(history.replaceState) history.replaceState(null,'','#'+id);
}

      <div class="stat"><b>${CURRICULUM.length}</b><span>learning tracks</span></div>
      <div class="stat"><b>${done}</b><span>completed by you</span></div>
      <div class="stat"><b>100%</b><span>offline · local</span></div>
    </div>
  </div>
  <h3 style="font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin:10px 0 14px">Pick a track — or just start at the top</h3>

  const v=document.getElementById('view');
  const prevId=ORDER[ORDER.indexOf(id)-1], nextId=ORDER[ORDER.indexOf(id)+1];
  const lv=lesson.level||'Core', tm=lesson.time||'8 min';
  v.innerHTML=`<div class="fadein">
    <div class="crumbs"><span>${track.icon} ${track.title}</span> &nbsp;›&nbsp; Lesson ${li+1} of ${track.lessons.length}</div>
    <div class="lesson-h"><h2>${lesson.title}</h2></div>
    <div class="badges">
      <span class="badge lv">${lv}</span>
      <span class="badge tm">⏱ ${tm}</span>
      ${(lesson.tags||[]).map(t=>`<span class="badge">${t}</span>`).join('')}
    </div>
    <div class="content">${lesson.body}</div>
    <div class="markdone"><label><input type="checkbox" id="donechk" ${isDone(id)?'checked':''} onchange="setDone('${id}',this.checked)"> Mark this lesson complete</label></div>
    <div class="lnav">
      ${prevId?`<a onclick="go('${prevId}')"><div class="dir">‹ Previous</div><div class="ttl">${LESSON_INDEX[prevId].lesson.title}</div></a>`:`<a onclick="go('home')"><div class="dir">‹ Back</div><div class="ttl">Home</div></a>`}
      ${nextId?`<a class="nx" onclick="go('${nextId}')"><div class="dir">Next ›</div><div class="ttl">${LESSON_INDEX[nextId].lesson.title}</div></a>`:`<a class="nx" onclick="go('cheatsheet')"><div class="dir">Finish ›</div><div class="ttl">Cheat Sheet</div></a>`}
    </div>
  </div>`;
  // wire generic widgets + lesson-specific init
  wireQuizzes(v); wireCopy(v);

/* ---------- generic interactions ---------- */
function wireCopy(root){
  root.querySelectorAll('pre').forEach(pre=>{
    if(pre.querySelector('.copy'))return;
    const b=document.createElement('button'); b.className='copy'; b.textContent='copy';
    b.onclick=()=>{const t=pre.querySelector('code').innerText;navigator.clipboard&&navigator.clipboard.writeText(t);b.textContent='copied';setTimeout(()=>b.textContent='copy',1200);};
    pre.appendChild(b);
  });
}
function wireQuizzes(root){
  root.querySelectorAll('.qitem').forEach(item=>{
    const correct=+item.dataset.correct;
    const opts=[...item.querySelectorAll('.opt')];
    opts.forEach((o,i)=>{
      o.onclick=()=>{
        if(item.dataset.answered)return; item.dataset.answered=1;
        opts.forEach(x=>x.classList.add('dis'));
        if(i===correct){o.classList.add('correct');}
        else{o.classList.add('wrong');opts[correct].classList.add('correct');}
        const ex=item.querySelector('.explain'); if(ex)ex.classList.add('show');
      };
    });
  });
}

/* ---------- search ---------- */
function doSearch(q){
  q=q.trim().toLowerCase();
  const nav=document.getElementById('nav');
  if(!q){renderSidebar();return;}
  let html='';
  CURRICULUM.forEach(t=>{
    t.lessons.forEach(l=>{
      const hay=(l.title+' '+(l.tags||[]).join(' ')+' '+(l.search||'')).toLowerCase();
      if(hay.includes(q)){
        html+=`<div class="lessonlink ${isDone(l.id)?'done':''}" onclick="go('${l.id}')"><span class="dot"></span><span>${l.title}</span></div>`;
      }
    });
  });
  nav.innerHTML=html||'<p style="color:var(--mut);font-size:12px;padding:10px">No matches.</p>';
}

/* ---------- mobile ---------- */
function toggleSide(force){
  const s=document.getElementById('side'),b=document.getElementById('backdrop');

  s.classList.toggle('show');b.classList.toggle('show');

/* ---------- small canvas helpers ---------- */
function clearCanvas(ctx,w,h){ctx.clearRect(0,0,w,h);}
function line(ctx,x1,y1,x2,y2,c,w){ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
function softmax(arr){const m=Math.max(...arr);const e=arr.map(x=>Math.exp(x-m));const s=e.reduce((a,b)=>a+b,0);return e.map(x=>x/s);}

/* ============================================================
   TRACK 1 — Foundations: the Transformer
   ============================================================ */
registerTrack({
  icon:'🧱', title:'Foundations: the Transformer',
  blurb:'Rebuild the core: tokenization, self-attention, multi-head, positions, and the encoder/decoder split.',
  lessons:[

  /* ---- 1.1 tokenization ---- */
  {
    id:'tok', title:'Tokens & Embeddings', level:'Warm-up', time:'6 min',
    tags:['BPE','vocab','embeddings'],
    search:'tokenizer byte pair encoding subword embedding vector vocabulary',
    body:`
    <p>Before any attention happens, text becomes <strong>tokens</strong> — sub-word units from a learned vocabulary (typically <em>byte-pair encoding</em> or its byte-level variant). Each token maps to a row of an embedding matrix <code>E ∈ R^(V×d)</code>, turning a string into a sequence of <code>d</code>-dimensional vectors.</p>
    <div class="callout key"><h5>Why subwords</h5><p>Word-level vocabularies explode and can't handle novel words; character-level sequences are too long. BPE merges frequent byte pairs into a vocabulary of ~32k–256k tokens — a sweet spot between sequence length and vocabulary size. Modern models trend toward <strong>larger vocabularies</strong> (e.g. 128k–256k) to shorten sequences and improve multilingual coverage.</p></div>
    <h3>Try it: see how text fragments into tokens</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Toy tokenizer</h4></div>
      <p class="wdesc">A crude byte-pair-style splitter (illustrative, not a real BPE). Notice how spaces attach to words, and rare strings shatter into many tokens — exactly why token <em>count</em> ≠ word count.</p>
      <div class="ctrls"><input id="tokin" style="flex:1;min-width:260px;background:var(--inset);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:9px 11px" value="Reasoning models scale test-time compute."></div>
      <div class="tokrow" id="tokout"></div>
      <div class="readout">Tokens: <b id="tokcount">0</b> · A rough rule of thumb in English: <b>~0.75 words/token</b>, or ~4 characters/token.</div>
    </div>
    <h4>The embedding is where meaning starts</h4>
    <p>Embeddings are learned so that tokens used in similar contexts land near each other. Everything downstream — attention, the MLP, the final unembedding back to logits — operates in this continuous space. Many models <strong>tie</strong> the input embedding and output projection weights to save parameters.</p>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="1">
        <div class="q">Why have modern LLMs trended toward larger token vocabularies (128k+)?</div>
        <button class="opt">It reduces the embedding dimension d</button>
        <button class="opt">Shorter token sequences (less compute/longer effective context) and better multilingual coverage</button>
        <button class="opt">It removes the need for positional encodings</button>
        <div class="explain">Bigger vocab → fewer tokens per sentence → cheaper attention (quadratic in length) and more text fits in a fixed context. It also represents non-English scripts more efficiently. The cost is a larger embedding/unembedding matrix.</div>
      </div>
    </div>`,
    init(root){
      const inp=root.querySelector('#tokin'), out=root.querySelector('#tokout'), cnt=root.querySelector('#tokcount');
      const common=['ing','tion','ed','ly','re','com','pute','test','time','model','s','.','Reason','able'];
      function tokenize(t){
        // illustrative: split on spaces, then peel common suffixes/prefixes
        let toks=[]; const words=t.match(/\s*\S+|\s+/g)||[];
        words.forEach(w=>{
          let s=w;
          // try to split long words into 2-3 chunks
          if(s.trim().length>6){
            let core=s.trimStart(), lead=s.slice(0,s.length-core.length);
            let parts=[]; let rem=core;
            for(const c of common){ if(rem.toLowerCase().endsWith(c)&&rem.length>c.length){parts.unshift(rem.slice(-c.length));rem=rem.slice(0,-c.length);} }
            parts.unshift(rem); if(lead)parts[0]=lead+parts[0];
            toks.push(...parts);
          } else toks.push(s);
        });
        return toks.filter(x=>x.length);
      }
      function render(){
        const t=tokenize(inp.value); out.innerHTML='';
        t.forEach(tk=>{const s=document.createElement('span');s.className='tok';s.textContent=tk.replace(/ /g,'·');out.appendChild(s);});
        cnt.textContent=t.length;
      }
      inp.oninput=render; render();
    }
  },

  /* ---- 1.2 self attention ---- */
  {
    id:'attn', title:'Self-Attention, Visualized', level:'Core', time:'12 min',
    tags:['QKV','softmax','dot-product'],
    search:'self attention query key value softmax scaled dot product attention weights',
    body:`
    <p>Self-attention is the engine of the transformer. Each token produces three vectors via learned projections: a <strong>query</strong> (what am I looking for?), a <strong>key</strong> (what do I offer?), and a <strong>value</strong> (what do I pass on?). A token attends to others by comparing its query to every key.</p>
    <pre><code><span class="cm"># scaled dot-product attention (the whole idea in 3 lines)</span>
scores = Q @ K.T / sqrt(d_k)        <span class="cm"># (n, n) compatibility</span>
weights = softmax(scores, axis=-1)  <span class="cm"># rows sum to 1</span>
out = weights @ V                   <span class="cm"># weighted blend of values</span></code></pre>
    <div class="callout intuition"><h5>The one-sentence intuition</h5><p>Attention is a <strong>soft, content-based lookup</strong>: every token retrieves a weighted average of all tokens' values, where the weights come from how well its query matches each key. No fixed wiring — the routing is computed from the data itself.</p></div>
    <h3>Try it: move a query, watch attention flow</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Attention heat-flow</h4></div>
      <p class="wdesc">Pick a query token (it "looks back" at the sentence). The bars show its attention distribution; raise the temperature to sharpen or flatten it. Toggle a causal mask to see how decoders can't peek at the future.</p>
      <div class="ctrls">
        <div class="ctrl" style="min-width:200px"><label>Query token</label>
          <div class="tokrow" id="attok"></div>
        </div>
        <div class="ctrl"><label>Sharpness (1/temp) <b id="atsv">1.4</b></label><input type="range" id="atsharp" min="0.2" max="4" step="0.1" value="1.4"></div>
        <div class="ctrl"><label>Causal mask</label><div class="seg"><button id="atmask0" class="on">off</button><button id="atmask1">on</button></div></div>
      </div>
      <div class="bars" id="atbars"></div>
      <div class="readout">Attention weights are a probability distribution over tokens (they sum to 1). The query <b id="atq">—</b> attends most to <b id="atmax">—</b>. With a causal mask, positions to the <b>right</b> of the query get zero weight — that's how autoregressive decoders preserve "predict the next token from the past only."</div>
    </div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="2">
        <div class="q">Why divide the QK scores by √d_k before the softmax?</div>
        <button class="opt">To make the matrix multiply cheaper</button>
        <button class="opt">To enforce that attention weights are non-negative</button>
        <button class="opt">To keep dot-product variance ~1 so softmax gradients don't vanish/saturate</button>
        <div class="explain">For large d_k, dot products grow with √d_k, pushing softmax into saturated regions with tiny gradients. Scaling by 1/√d_k normalizes the variance and keeps training stable.</div>
      </div>
    </div>`,
    init(root){
      const tokens=['The','cat','that','chased','the','mouse','was','fast'];
      // affinity matrix: hand-tuned so attention is interpretable
      const aff={ 'was':{'cat':3.0,'fast':2.2,'The':0.4}, 'chased':{'cat':2.6,'mouse':2.4}, 'fast':{'was':2.4,'cat':1.6},
                  'mouse':{'chased':2.2,'the':1.0}, 'cat':{'The':1.8,'chased':1.2} };
      let qi=6, sharp=1.4, mask=false;
      const tr=root.querySelector('#attok'), bars=root.querySelector('#atbars');
      tokens.forEach((t,i)=>{const s=document.createElement('span');s.className='tok'+(i===qi?' sel':'');s.textContent=t;s.onclick=()=>{qi=i;draw();};tr.appendChild(s);});
      const sl=root.querySelector('#atsharp'), sv=root.querySelector('#atsv');
      sl.oninput=()=>{sharp=+sl.value;sv.textContent=sharp.toFixed(1);draw();};
      const m0=root.querySelector('#atmask0'),m1=root.querySelector('#atmask1');
      m0.onclick=()=>{mask=false;m0.classList.add('on');m1.classList.remove('on');draw();};
      m1.onclick=()=>{mask=true;m1.classList.add('on');m0.classList.remove('on');draw();};
      function scores(){
        const q=tokens[qi]; const row=aff[q]||{};
        return tokens.map((t,j)=>{
          let base=(row[t]!=null?row[t]:0.2)+ (j===qi?0.6:0);  // mild self-attention
          return base*sharp;
        });
      }
      function draw(){
        tr.querySelectorAll('.tok').forEach((s,i)=>s.classList.toggle('sel',i===qi));
        let s=scores();
        if(mask) s=s.map((v,j)=>j>qi?-1e9:v);
        const w=softmax(s);
        bars.innerHTML='';
        let maxj=0; w.forEach((v,j)=>{if(v>w[maxj])maxj=j;});
        tokens.forEach((t,j)=>{
          const masked=mask&&j>qi;
          const b=document.createElement('div'); b.className='bar'+(masked?' dim':'');
          b.innerHTML=`<div class="lbl">${t}</div><div class="track"><div class="fill" style="width:${(w[j]*100).toFixed(1)}%"></div></div><div class="pct">${(w[j]*100).toFixed(1)}%</div>`;
          bars.appendChild(b);
        });
        root.querySelector('#atq').textContent='"'+tokens[qi]+'"';
        root.querySelector('#atmax').textContent='"'+tokens[maxj]+'"';
      }
      qi=6; draw();
    }
  },

  /* ---- 1.3 multi-head ---- */
  {
    id:'mha', title:'Multi-Head Attention & the Block', level:'Core', time:'9 min',
    tags:['heads','residual','LayerNorm','FFN'],
    search:'multi head attention residual layernorm rmsnorm feedforward MLP pre-norm transformer block GELU SwiGLU',
    body:`
    <p>One attention pattern is limiting. <strong>Multi-head attention</strong> runs <code>h</code> attention operations in parallel on lower-dimensional slices, then concatenates. Different heads specialize — one tracks syntax, another coreference, another position. It's cheap: total compute is the same, but the model gets multiple "relationship channels."</p>
    <h3>The transformer block (decoder-style, what LLMs use)</h3>
    <pre><code><span class="cm"># pre-norm block — the modern default</span>
x = x + MHA(RMSNorm(x))          <span class="cm"># attention sublayer + residual</span>
x = x + MLP(RMSNorm(x))          <span class="cm"># feed-forward sublayer + residual</span>

<span class="cm"># MLP is usually a gated unit now (SwiGLU), not plain GELU:</span>
<span class="kw">def</span> <span class="fn">mlp</span>(x): <span class="kw">return</span> W_down @ (silu(W_gate @ x) * (W_up @ x))</code></pre>
    <div class="callout key"><h5>What quietly became standard (post-GPT-2)</h5>
    <ul>
      <li><strong>Pre-norm</strong> (normalize <em>before</em> each sublayer) instead of post-norm — far more stable at depth.</li>
      <li><strong>RMSNorm</strong> instead of LayerNorm — drops the mean-centering, cheaper, works as well.</li>
      <li><strong>SwiGLU</strong> gated MLPs instead of GELU — a consistent quality win, used in PaLM, Qwen, Mistral, and most modern models.</li>
      <li><strong>No bias terms</strong> in most linear layers — marginal quality, simpler.</li>
    </ul></div>
    <h3>Try it: how heads split the model dimension</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Head budget calculator</h4></div>
      <p class="wdesc">Each head works in a subspace of size <code>d_model / h</code>. See how parameter & compute budgets shift. (Total attention params stay constant in d_model — heads just reshape it.)</p>
      <div class="ctrls">
        <div class="ctrl"><label>d_model <b id="dmv">4096</b></label><input type="range" id="dm" min="512" max="8192" step="256" value="4096"></div>
        <div class="ctrl"><label>num heads <b id="hv">32</b></label><input type="range" id="hh" min="4" max="64" step="2" value="32"></div>
        <div class="ctrl"><label>seq length <b id="nv">8192</b></label><input type="range" id="nn" min="512" max="131072" step="512" value="8192"></div>
      </div>
      <div class="readout">
        head dimension d_k = <b id="dk">128</b> · &nbsp; QKV projection params ≈ <b id="qkv">50.3M</b> per layer<br>
        Attention score matrix size = <b id="scoresz">—</b> floats per head — this is the <b>quadratic-in-sequence</b> cost that long-context tricks attack.
      </div>
    </div>`,
    init(root){

      function fmt(x){if(x>=1e9)return (x/1e9).toFixed(1)+'B';if(x>=1e6)return (x/1e6).toFixed(1)+'M';if(x>=1e3)return (x/1e3).toFixed(1)+'K';return x.toFixed(0);}
      function upd(){

        root.querySelector('#dmv').textContent=d;

        root.querySelector('#nv').textContent=n.toLocaleString();
        root.querySelector('#dk').textContent=Math.round(d/h);
        root.querySelector('#qkv').textContent=fmt(4*d*d); // Q,K,V,O each d*d
        root.querySelector('#scoresz').textContent=fmt(n*n)+' ('+fmt(n*n*h)+' across heads)';

  /* ---- 1.4 positions / RoPE ---- */
  {
    id:'rope', title:'Positional Information & RoPE', level:'Core', time:'9 min',
    tags:['RoPE','positions','long-context','YaRN'],
    search:'positional encoding sinusoidal rotary position embedding RoPE ALiBi context length extension YaRN NTK',
    body:`
    <p>Attention is <strong>permutation-invariant</strong> — it has no built-in sense of order. Position must be injected. The field has moved from absolute sinusoidal encodings (original transformer) and learned position embeddings (GPT-2/BERT) to <strong>rotary position embeddings (RoPE)</strong>, now the de-facto standard.</p>
    <h3>Why RoPE won</h3>
    <p>RoPE rotates the query and key vectors by an angle proportional to their position. The dot product <code>q·k</code> then depends only on the <em>relative</em> offset between positions — you get relative-position behavior with zero extra parameters, applied directly inside attention.</p>
    <pre><code><span class="cm"># RoPE: rotate each 2-dim slice of q,k by angle (pos * theta_i)</span>
<span class="kw">for</span> i <span class="kw">in</span> pairs(d):
    theta_i = base ** (-2*i / d)        <span class="cm"># base ~ 10000 (or larger)</span>
    q[i:i+2] = rotate(q[i:i+2], pos * theta_i)
    k[i:i+2] = rotate(k[i:i+2], pos * theta_i)</code></pre>
    <div class="callout frontier"><h5>Context-length extension is a RoPE game</h5><p>Want a model trained at 8k tokens to work at 128k? You rescale RoPE frequencies. <strong>Position Interpolation</strong>, <strong>NTK-aware scaling</strong>, and <strong>YaRN</strong> all stretch or reweight the rotation base so the model generalizes to far longer contexts with little or no retraining. This is why "we extended the context window" is often a cheap post-hoc step, not a full retrain.</p></div>
    <h3>Try it: relative position from rotation</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>RoPE rotation dial</h4></div>
      <p class="wdesc">A query at position <em>i</em> and key at position <em>j</em> are each rotated. What attention "sees" is the <b>angle between them</b>, which depends only on (i − j). Drag both positions — note the relative angle (and thus similarity) is what matters.</p>
      <div class="ctrls">
        <div class="ctrl"><label>query pos i <b id="rqi">3</b></label><input type="range" id="ri" min="0" max="20" value="3"></div>
        <div class="ctrl"><label>key pos j <b id="rkj">7</b></label><input type="range" id="rj" min="0" max="20" value="7"></div>
        <div class="ctrl"><label>frequency θ <b id="rth">0.5</b></label><input type="range" id="rt" min="0.1" max="1.2" step="0.05" value="0.5"></div>
      </div>
      <div class="canvas-wrap"><canvas id="ropec" width="640" height="220"></canvas></div>
      <div class="readout">Relative offset (i − j) = <b id="rrel">-4</b> · &nbsp; angle between rotated q,k = <b id="rang">—</b>° · &nbsp; alignment (cos) = <b id="rcos">—</b>. Shift both positions by the same amount — the relative angle, and the score, stay constant.</div>
    </div>`,
    init(root){
      const ri=root.querySelector('#ri'),rj=root.querySelector('#rj'),rt=root.querySelector('#rt');
      const c=root.querySelector('#ropec'),ctx=c.getContext('2d');
      function draw(){
        const i=+ri.value,j=+rj.value,th=+rt.value;
        root.querySelector('#rqi').textContent=i;root.querySelector('#rkj').textContent=j;root.querySelector('#rth').textContent=th.toFixed(2);
        const ai=i*th, aj=j*th;
        clearCanvas(ctx,640,220);
        // two dials
        function dial(cx,label,ang,col){
          ctx.strokeStyle=CC.grid;ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,110,70,0,Math.PI*2);ctx.stroke();
          line(ctx,cx-80,110,cx+80,110,CC.grid,1);line(ctx,cx,30,cx,190,CC.grid,1);
          ctx.strokeStyle=col;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,110);
          ctx.lineTo(cx+70*Math.cos(-ang),110+70*Math.sin(-ang));ctx.stroke();
          ctx.fillStyle=col;ctx.beginPath();ctx.arc(cx+70*Math.cos(-ang),110+70*Math.sin(-ang),5,0,7);ctx.fill();
          ctx.fillStyle=CC.labelDim;ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText(label,cx,205);
        }
        dial(150,'query  rotated by i·θ',ai,'#5b8cff');
        dial(490,'key  rotated by j·θ',aj,'#21d4a8');
        // relative
        const rel=i-j, dang=(ai-aj);
        root.querySelector('#rrel').textContent=rel;
        let deg=((dang*180/Math.PI)%360); if(deg>180)deg-=360; if(deg<-180)deg+=360;
        root.querySelector('#rang').textContent=Math.abs(deg).toFixed(1);
        root.querySelector('#rcos').textContent=Math.cos(dang).toFixed(3);
        ctx.fillStyle=CC.label;ctx.font='13px sans-serif';ctx.textAlign='center';
        ctx.fillText('angle gap depends only on (i − j)  →  relative position', 320, 18);
      }
      [ri,rj,rt].forEach(s=>s.oninput=draw); draw();
    }
  },

  /* ---- 1.5 enc/dec ---- */
  {
    id:'encdec', title:'Encoder · Decoder · Why LLMs Are Decoder-Only', level:'Core', time:'8 min',
    tags:['BERT','T5','GPT','causal'],
    search:'encoder decoder bidirectional BERT T5 GPT decoder only causal masked language modeling seq2seq',
    body:`
    <p>The original transformer was <strong>encoder–decoder</strong> (for translation). Three families emerged, and it's worth being crisp about why today's generative LLMs are nearly all <strong>decoder-only</strong>.</p>
    <table class="cmp">
      <tr><th>Family</th><th>Attention</th><th>Trained on</th><th>Examples</th><th>Best at</th></tr>
      <tr><td><b>Encoder-only</b></td><td>Bidirectional</td><td>Masked LM (fill blanks)</td><td>BERT, RoBERTa, modern embedding models</td><td>Understanding, embeddings, classification</td></tr>
      <tr><td><b>Decoder-only</b></td><td>Causal (look back only)</td><td>Next-token prediction</td><td>GPT, Qwen, Mistral, DeepSeek, Gemini</td><td>Generation, in-context learning, everything chat</td></tr>
      <tr><td><b>Encoder–decoder</b></td><td>Bi- + cross-attn</td><td>Span corruption / seq2seq</td><td>T5, BART, many translation/ASR models</td><td>Transduction (input→output) tasks</td></tr>
    </table>
    <div class="callout key"><h5>Why decoder-only ate the world</h5>
    <p>A single next-token objective is <strong>self-supervised on raw text at massive scale</strong>, unifies every task as "continue the sequence," and gives <strong>in-context learning</strong> for free. One model, one objective, trivially scalable — no task-specific heads. Encoders still dominate <em>embeddings/retrieval</em>; encoder–decoders persist in translation and speech, and diffusion-LM research is reviving bidirectional ideas (later track).</p></div>
    <h3>Try it: causal vs bidirectional attention masks</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Attention mask explorer</h4></div>
      <p class="wdesc">The mask is just which (query, key) pairs are allowed. Toggle the regime and watch the allowed-attention grid. The causal triangle is the entire reason a decoder can be trained on all positions at once yet never "cheat."</p>
      <div class="ctrls"><div class="seg"><button id="mkc" class="on">Causal (decoder)</button><button id="mkb">Bidirectional (encoder)</button><button id="mkp">Prefix-LM</button></div></div>
      <div class="canvas-wrap"><canvas id="maskc" width="420" height="420"></canvas></div>
      <div class="readout"><b id="maskdesc"></b></div>
    </div>`,
    init(root){
      const c=root.querySelector('#maskc'),ctx=c.getContext('2d');
      const toks=['The','model','reads','this','text','then','writes'];
      let mode='causal'; const prefix=4;
      const desc={causal:'Each query (row) attends only to keys (cols) at its position or earlier — the lower triangle. This is what makes next-token training valid: position t never sees t+1.',
        bi:'Every position attends to every other — full bidirectional context. Great for understanding/embeddings, but you can\'t train it to generate left-to-right with one pass.',
        prefix:'A hybrid: a "prompt" prefix is fully bidirectional, while the generated suffix is causal. Used by some instruction models and UL2-style training.'};
      function draw(){
        clearCanvas(ctx,420,420); const n=toks.length, cell=48, ox=58, oy=58;
        ctx.font='11px sans-serif';
        for(let i=0;i<n;i++){
          ctx.fillStyle=CC.labelDim;ctx.textAlign='right';ctx.fillText(toks[i],ox-6,oy+i*cell+cell/2+4);
          ctx.save();ctx.translate(ox+i*cell+cell/2,oy-8);ctx.rotate(-0.6);ctx.textAlign='left';ctx.fillText(toks[i],0,0);ctx.restore();
        }
        for(let q=0;q<n;q++)for(let k=0;k<n;k++){
          let allow=false;
          if(mode==='causal')allow=k<=q;
          else if(mode==='bi')allow=true;
          else allow=(k<prefix)|| (k<=q); // prefix bidirectional + causal suffix
          ctx.fillStyle=allow?'rgba(91,140,255,.75)':CC.inset;
          ctx.strokeStyle=CC.grid;
          ctx.fillRect(ox+k*cell,oy+q*cell,cell-3,cell-3);
          ctx.strokeRect(ox+k*cell,oy+q*cell,cell-3,cell-3);
        }
        ctx.fillStyle=CC.label;ctx.textAlign='center';ctx.fillText('key (attended-to) →',ox+n*cell/2,oy+n*cell+26);
        ctx.save();ctx.translate(14,oy+n*cell/2);ctx.rotate(-Math.PI/2);ctx.fillText('query (attending) →',0,0);ctx.restore();
        root.querySelector('#maskdesc').textContent=desc[mode==='causal'?'causal':mode==='bi'?'bi':'prefix'];
      }
      const b={causal:root.querySelector('#mkc'),bi:root.querySelector('#mkb'),prefix:root.querySelector('#mkp')};
      function set(m){mode=m;Object.values(b).forEach(x=>x.classList.remove('on'));b[m].classList.add('on');draw();}
      b.causal.onclick=()=>set('causal');b.bi.onclick=()=>set('bi');b.prefix.onclick=()=>set('prefix');
      draw();
    }
  }

  ]
});

registerTrack({
  icon:'⚙️', title:'Pre-training at Scale',
  blurb:'The next-token objective, scaling laws (Chinchilla → today), data curation, and what "training a base model" really means.',
  lessons:[

  {
    id:'pretrain-obj', title:'The Next-Token Objective', level:'Core', time:'7 min',
    tags:['cross-entropy','self-supervised','perplexity'],
    search:'next token prediction cross entropy loss autoregressive language modeling perplexity teacher forcing',
    body:`
    <p>Pre-training is deceptively simple: predict the next token, everywhere, over trillions of tokens. The loss is plain <strong>cross-entropy</strong> between the model's predicted distribution and the actual next token. No labels needed — the text <em>is</em> the supervision. This is why it scales: the entire internet is training data.</p>
    <pre><code><span class="cm"># the whole pre-training objective</span>
logits = model(tokens[:-1])                 <span class="cm"># predict each position's next token</span>
loss = cross_entropy(logits, tokens[1:])    <span class="cm"># shifted-by-one targets</span>
<span class="cm"># perplexity = exp(loss): "effective branching factor"</span></code></pre>
    <div class="callout intuition"><h5>Why this one trick produces such general models</h5><p>To predict the next token well across all of human text, a model is implicitly forced to learn grammar, facts, arithmetic, code structure, reasoning patterns, translation, and style. Compression of text <em>is</em> understanding. Everything else (chat, reasoning, tools) is later refinement on top of this base.</p></div>
    <h3>Try it: watch the model pick the next token</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Next-token sampler</h4></div>
      <p class="wdesc">The model outputs logits → softmax → a probability over the vocabulary. Sampling strategy decides what actually comes out. Tune temperature and top-p and watch the candidate distribution reshape.</p>
      <div class="ctrls">
        <div class="ctrl" style="min-width:220px"><label>Context</label><div class="tok sel" style="cursor:default">"The capital of France is ___"</div></div>
        <div class="ctrl"><label>temperature <b id="ntt">0.8</b></label><input type="range" id="nttemp" min="0.1" max="2" step="0.05" value="0.8"></div>
        <div class="ctrl"><label>top-p (nucleus) <b id="ntp">1.0</b></label><input type="range" id="nttop" min="0.1" max="1" step="0.05" value="1.0"></div>
      </div>
      <div class="bars" id="ntbars"></div>
      <div class="readout">Low temp → confident & repetitive (greedy in the limit). High temp → creative & risky. <b>top-p</b> truncates the long tail: only the smallest set of tokens whose probability sums to p stays eligible. Greyed bars are cut by top-p.</div>
    </div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="0">
        <div class="q">A model has cross-entropy loss of ln(4) ≈ 1.386 nats on a held-out set. Its perplexity is…</div>
        <button class="opt">4 — as if choosing uniformly among 4 options each step</button>
        <button class="opt">1.386</button>
        <button class="opt">≈ 0.25</button>
        <div class="explain">Perplexity = exp(loss) = exp(ln 4) = 4. Lower perplexity = the model is less "surprised" = better language model.</div>
      </div>
    </div>`,
    init(root){
      const base={'Paris':4.2,'a':1.4,'the':1.6,'located':2.0,'home':1.9,'one':1.2,'now':0.9,'Lyon':1.1,'beautiful':1.0};
      const keys=Object.keys(base);
      const tt=root.querySelector('#nttemp'),tp=root.querySelector('#nttop');
      function draw(){
        const T=+tt.value,P=+tp.value;
        root.querySelector('#ntt').textContent=T.toFixed(2);root.querySelector('#ntp').textContent=P.toFixed(2);
        let logits=keys.map(k=>base[k]/T);
        let probs=softmax(logits);
        // top-p mask
        const idx=[...probs.keys()].sort((a,b)=>probs[b]-probs[a]);
        let cum=0; const keep=new Set();
        for(const i of idx){keep.add(i);cum+=probs[i];if(cum>=P)break;}
        const bars=root.querySelector('#ntbars');bars.innerHTML='';
        idx.forEach(i=>{
          const cut=!keep.has(i);
          const b=document.createElement('div');b.className='bar'+(cut?' dim':'');
          b.innerHTML=`<div class="lbl">${keys[i]}</div><div class="track"><div class="fill" style="width:${(probs[i]*100).toFixed(1)}%"></div></div><div class="pct">${(probs[i]*100).toFixed(1)}%</div>`;
          bars.appendChild(b);
        });
      }
      [tt,tp].forEach(s=>s.oninput=draw);draw();
    }
  },

  {
    id:'scaling', title:'Scaling Laws: Chinchilla & Beyond', level:'Core', time:'11 min',
    tags:['Chinchilla','compute-optimal','FLOPs'],
    search:'scaling laws chinchilla compute optimal parameters tokens kaplan FLOPs 20 tokens per parameter overtraining',
    body:`
    <p>Scaling laws describe how loss falls predictably as you grow <strong>parameters (N)</strong>, <strong>data (D)</strong>, and <strong>compute (C ≈ 6·N·D)</strong>. The landmark shift was the <strong>Chinchilla</strong> result (DeepMind, 2022): given a fixed compute budget, most large models were <em>undertrained</em> — you should scale parameters and tokens <strong>together</strong>, roughly <strong>~20 tokens per parameter</strong>.</p>
    <div class="callout key"><h5>The Chinchilla correction</h5><p>GPT-3 (175B params, ~300B tokens) was far off compute-optimal. Chinchilla (70B params, 1.4T tokens) used the <em>same</em> compute but trained a smaller model on much more data — and beat it. Rule of thumb: <strong>D ≈ 20·N</strong> for compute-optimal training.</p></div>
    <div class="callout frontier"><h5>But inference changes the math (2023→now)</h5><p>Chinchilla optimizes <em>training</em> loss per FLOP. If you'll serve a model to billions of requests, you want it <strong>small and cheap to run</strong>, so you deliberately <strong>"overtrain"</strong> a smaller model on far more than 20×N tokens (e.g. an 8B model on 15T+ tokens, as many modern open models do). The compute-optimal point ≠ the deployment-optimal point. This is why modern open models are small-but-massively-trained.</p></div>
    <h3>Try it: a compute-optimal allocator</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Scaling-law planner</h4></div>
      <p class="wdesc">Set a compute budget. The planner shows the Chinchilla compute-optimal split, then lets you trade toward an "overtrained for cheap inference" regime and see the cost. Uses C ≈ 6ND and a Chinchilla-style loss surrogate.</p>
      <div class="ctrls">
        <div class="ctrl"><label>Compute budget (log10 FLOPs) <b id="scv">23.0</b></label><input type="range" id="scc" min="19" max="26" step="0.1" value="23"></div>
        <div class="ctrl"><label>tokens-per-param ratio <b id="srv">20</b></label><input type="range" id="scr" min="5" max="200" step="1" value="20"></div>
      </div>
      <div class="readout">
        Total compute: <b id="scflops">1.0e23</b> FLOPs &nbsp;·&nbsp; <span id="scopt"></span><br>
        At ratio <b id="scr2">20×</b>: model size <b id="scN">—</b> params · trained on <b id="scD">—</b> tokens · relative loss <b id="scL">—</b><br>
        <span id="scnote" class="mut"></span>
      </div>
      <div class="canvas-wrap" style="margin-top:12px"><canvas id="scc2" width="640" height="200"></canvas></div>
      <div class="legend"><span><i style="background:#5b8cff"></i>loss vs tokens/param ratio</span><span><i style="background:#21d4a8"></i>Chinchilla optimum (~20×)</span><span><i style="background:#ffb454"></i>your choice</span></div>
    </div>`,
    init(root){
      const cc=root.querySelector('#scc'),cr=root.querySelector('#scr'),cv=root.querySelector('#scc2'),ctx=cv.getContext('2d');
      function fmt(x){if(x>=1e12)return (x/1e12).toFixed(1)+'T';if(x>=1e9)return (x/1e9).toFixed(1)+'B';if(x>=1e6)return (x/1e6).toFixed(1)+'M';return x.toFixed(0);}
      // surrogate Chinchilla loss: L(N,D)=E + A/N^a + B/D^b
      const A=406.4,B=410.7,a=0.34,b=0.28,E=1.69;
      function lossNR(C,r){ // r = D/N tokens per param; C=6ND ; D=rN -> C=6 r N^2 -> N=sqrt(C/(6r))
        const N=Math.sqrt(C/(6*r)); const D=r*N;
        return {N,D,L:E+A/Math.pow(N,a)+B/Math.pow(D,b)};
      }
      function draw(){
        const C=Math.pow(10,+cc.value), r=+cr.value;
        root.querySelector('#scv').textContent=(+cc.value).toFixed(1);
        root.querySelector('#srv').textContent=r;root.querySelector('#scr2').textContent=r+'×';
        root.querySelector('#scflops').textContent=C.toExponential(1);
        const cur=lossNR(C,r);
        // find optimum over r
        let best={L:1e9}; for(let rr=5;rr<=200;rr++){const o=lossNR(C,rr);if(o.L<best.L){best=o;best.r=rr;}}
        root.querySelector('#scN').textContent=fmt(cur.N);
        root.querySelector('#scD').textContent=fmt(cur.D);
        root.querySelector('#scL').textContent=cur.L.toFixed(3);
        root.querySelector('#scopt').innerHTML='Compute-optimal ratio here ≈ <b>'+best.r+'×</b> → '+fmt(best.N)+' params / '+fmt(best.D)+' tokens';
        const note=r<best.r*0.8?'You\'re undertrained (Kaplan/GPT-3 era mistake) — bigger model, too little data.':
                   r>best.r*1.6?'You\'re "overtraining" — a smaller model on extra data. Slightly worse training loss, but much cheaper inference (the modern open-model strategy).':
                   'Near the Chinchilla compute-optimal sweet spot.';
        root.querySelector('#scnote').textContent=note;
        // plot loss vs r
        clearCanvas(ctx,640,200);
        line(ctx,40,170,620,170,CC.grid,1);line(ctx,40,12,40,170,CC.grid,1);
        let pts=[];for(let rr=5;rr<=200;rr++){pts.push([rr,lossNR(C,rr).L]);}
        const ls=pts.map(p=>p[1]);const lo=Math.min(...ls),hi=Math.max(...ls);
        const X=rr=>40+(rr-5)/195*580, Y=l=>170-(l-lo)/(hi-lo+1e-9)*150;
        ctx.strokeStyle='#5b8cff';ctx.lineWidth=2;ctx.beginPath();pts.forEach((p,i)=>{i?ctx.lineTo(X(p[0]),Y(p[1])):ctx.moveTo(X(p[0]),Y(p[1]));});ctx.stroke();
        // optimum
        ctx.fillStyle='#21d4a8';ctx.beginPath();ctx.arc(X(best.r),Y(best.L),5,0,7);ctx.fill();
        // choice
        ctx.fillStyle='#ffb454';ctx.beginPath();ctx.arc(X(r),Y(cur.L),5,0,7);ctx.fill();
        ctx.fillStyle=CC.label;ctx.font='11px sans-serif';ctx.textAlign='center';
        ctx.fillText('tokens per parameter (D/N)  →',330,192);
        ctx.save();ctx.translate(14,90);ctx.rotate(-Math.PI/2);ctx.fillText('predicted loss',0,0);ctx.restore();
      }
      [cc,cr].forEach(s=>s.oninput=draw);draw();
    }
  },

  {
    id:'data', title:'Data: The Real Bottleneck', level:'Applied', time:'8 min',
    tags:['data curation','dedup','synthetic data'],
    search:'pretraining data curation deduplication quality filtering synthetic data data mixture FineWeb tokens quality',
    body:`
    <p>Architecture is largely commoditized. The thing that most separates a great base model from a mediocre one at the same scale is <strong>data</strong> — its quality, diversity, dedup, and mixture. "Garbage in, garbage out" is the literal frontier.</p>
    <h3>The modern data pipeline</h3>
    <ul>
      <li><strong>Filtering</strong> — language ID, quality classifiers (model-scored "is this educational/coherent?"), heuristic rules, toxicity/PII removal.</li>
      <li><strong>Deduplication</strong> — exact + fuzzy (MinHash). Dedup reliably improves quality and reduces memorization; duplicated data wastes compute and hurts generalization.</li>
      <li><strong>Mixture weighting</strong> — code, math, web, books, multilingual are upweighted/downweighted. Code & math improve <em>reasoning even on non-code tasks</em>.</li>
      <li><strong>Curriculum / annealing</strong> — many recipes end pre-training with a high-quality "cooldown" phase (textbooks, curated math/code) for an outsized quality bump per token.</li>
    </ul>
    <div class="callout frontier"><h5>The biggest recent shift: synthetic data</h5><p>We're approaching the limits of high-quality human text. The frontier now leans on <strong>synthetic data</strong>: stronger models generate and verify training data for the next generation (rephrasing web text into clean "textbook" form, generating reasoning traces, filtering by verifiers). "Phi"-style models showed small models can punch far above their weight on curated/synthetic data. Quality > raw quantity.</p></div>
    <h3>Try it: build a data mixture</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Data mixture mixer</h4></div>
      <p class="wdesc">Allocate your token budget across sources. The (illustrative) capability profile shifts — too little code/math and reasoning suffers; all code and general/chat quality drops. There's no free lunch.</p>
      <div class="ctrls">
        <div class="ctrl"><label>Web/CommonCrawl <b id="dw">50</b>%</label><input type="range" id="d_web" min="0" max="100" value="50"></div>
        <div class="ctrl"><label>Code <b id="dc">20</b>%</label><input type="range" id="d_code" min="0" max="100" value="20"></div>

    body:`
    <p>A base model completes text; it doesn't "answer." <strong>SFT</strong> (a.k.a. instruction tuning) trains it on curated <code>(prompt, ideal response)</code> pairs so it learns the <em>format</em> and <em>behavior</em> of an assistant. Same next-token loss as pre-training — but now on high-quality demonstrations, with a <strong>chat template</strong> wrapping roles.</p>
    <pre><code><span class="cm"># SFT example, formatted with a chat template</span>
&lt;|user|&gt; Explain backprop in one sentence. &lt;|end|&gt;
&lt;|assistant|&gt; Backprop applies the chain rule to compute
gradients of the loss w.r.t. every weight efficiently. &lt;|end|&gt;

<span class="cm"># key trick: mask the loss on the prompt — only train on the response</span>
loss = cross_entropy(logits[assistant_span], targets[assistant_span])</code></pre>
    <div class="callout key"><h5>What good SFT data looks like (2024→now)</h5><p>Quality and diversity beat volume. The influential "<em>LIMA</em>" finding — ~1k excellent examples can produce a strong assistant — reframed SFT as <strong>style/format alignment of latent abilities</strong> already learned in pre-training, not new knowledge injection. Today SFT sets blend human-written, model-distilled, and verified examples, heavy on reasoning traces and tool-use formats.</p></div>
    <div class="callout warn"><h5>The risk: superficial alignment & forgetting</h5><p>Over-fine-tuning on narrow data degrades general ability (catastrophic forgetting) and can teach the model to <em>imitate the form</em> of good answers without the substance. SFT also can't easily teach "don't do X" — that's where preference methods and RL come in.</p></div>

  {
    id:'rlhf', title:'RLHF: The Classic Pipeline', level:'Core', time:'12 min',
    tags:['reward model','PPO','KL penalty'],
    search:'RLHF reinforcement learning human feedback reward model PPO KL divergence policy reference model preference pairs InstructGPT',
    body:`
    <p><strong>RLHF</strong> aligns a model to human <em>preferences</em>, which are hard to write as demonstrations. The classic 3-stage recipe (InstructGPT) defined the chat era:</p>
    <div class="tl">
      <div class="tlitem"><div class="yr">Stage 1</div><h4>SFT</h4><p>Fine-tune the base model on demonstrations → a reasonable starting policy.</p></div>
      <div class="tlitem"><div class="yr">Stage 2</div><h4>Reward Model (RM)</h4><p>Humans rank pairs of responses. Train a model to score responses so preferred > dispreferred. The RM is a learned proxy for human judgment.</p></div>
      <div class="tlitem"><div class="yr">Stage 3</div><h4>RL (PPO)</h4><p>Optimize the policy to maximize RM reward — but with a <strong>KL penalty</strong> to a frozen reference so it doesn't drift into gibberish that games the RM.</p></div>
    </div>
    <pre><code><span class="cm"># the RLHF objective (stage 3)</span>
maximize  E[ R(x, y) ]  −  β · KL( π_θ(y|x) ‖ π_ref(y|x) )
<span class="cm">#          ↑ reward model           ↑ stay close to the SFT model</span></code></pre>
    <div class="callout key"><h5>The KL leash is the whole trick</h5><p>Without it, the policy finds adversarial nonsense that the reward model loves but humans hate (<strong>reward hacking</strong>). β controls the exploration/fidelity tradeoff. Too high → no learning; too low → the model "over-optimizes" and collapses.</p></div>
    <h3>Try it: reward vs KL tug-of-war</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Over-optimization simulator</h4></div>
      <p class="wdesc">Crank the optimization pressure (low β). The <em>proxy</em> reward (what the RM reports) keeps rising, but <em>true</em> quality peaks then crashes as the policy reward-hacks. This Goodhart curve is the central pain of RLHF.</p>
      <div class="ctrls"><div class="ctrl" style="min-width:300px"><label>optimization pressure (↓ KL coeff β) <b id="rhv">0.5</b></label><input type="range" id="rhp" min="0" max="1" step="0.02" value="0.5"></div></div>
      <div class="canvas-wrap"><canvas id="rhc" width="640" height="240"></canvas></div>
      <div class="legend"><span><i style="background:#21d4a8"></i>true quality (humans)</span><span><i style="background:#ffb454"></i>proxy reward (RM score)</span><span><i style="background:#5b8cff"></i>your operating point</span></div>
      <div class="readout" id="rhnote"></div>
    </div>`,
    init(root){
      const sl=root.querySelector('#rhp'),c=root.querySelector('#rhc'),ctx=c.getContext('2d');
      function draw(){
        const press=+sl.value; root.querySelector('#rhv').textContent=(1.05-press).toFixed(2);
        clearCanvas(ctx,640,240);
        line(ctx,46,200,624,200,CC.grid,1);line(ctx,46,14,46,200,CC.grid,1);
        const X=t=>46+t*578, Yp=v=>200-v*180, Yt=v=>200-v*180;
        // proxy reward: monotonically increasing with pressure
        ctx.strokeStyle='#ffb454';ctx.lineWidth=2;ctx.beginPath();
        for(let i=0;i<=100;i++){const t=i/100;const proxy=1-Math.exp(-3*t);i?ctx.lineTo(X(t),Yp(proxy)):ctx.moveTo(X(t),Yp(proxy));}ctx.stroke();
        // true quality: inverted-U, peak shifts; collapses with overopt
        ctx.strokeStyle='#21d4a8';ctx.lineWidth=2;ctx.beginPath();
        for(let i=0;i<=100;i++){const t=i/100;const tru=Math.max(0,(1-Math.exp(-4*t)) - 1.4*Math.pow(Math.max(0,t-0.45),2)*3);i?ctx.lineTo(X(t),Yt(tru)):ctx.moveTo(X(t),Yt(tru));}ctx.stroke();
        // operating point
        const tru=Math.max(0,(1-Math.exp(-4*press)) - 1.4*Math.pow(Math.max(0,press-0.45),2)*3);
        ctx.fillStyle='#5b8cff';ctx.beginPath();ctx.arc(X(press),Yt(tru),6,0,7);ctx.fill();
        ctx.fillStyle=CC.label;ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText('optimization pressure (more RL, lower β)  →',335,228);
        root.querySelector('#rhnote').textContent = press<0.35?'Under-optimized: safe but barely improved over SFT.':
          press<0.55?'Sweet spot: proxy and true quality both high. This is what you ship.':
          press<0.78?'Over-optimization beginning: RM score still climbing but real quality is dropping. The model is learning to please the RM, not humans.':
          '🚨 Reward hacking / collapse: high RM score, low true quality. Classic Goodhart — "when a measure becomes a target, it ceases to be a good measure."';
      }
      sl.oninput=draw;draw();
    }
  },

  {
    id:'dpo', title:'DPO & the Preference-Optimization Zoo', level:'Core', time:'13 min',
    tags:['DPO','RLHF-free','ORPO','KTO','SimPO'],
    search:'direct preference optimization DPO vs PPO RLHF reward model free ORPO KTO SimPO IPO preference pairs Bradley-Terry',
    body:`
    <p>PPO-based RLHF is powerful but operationally painful: a separate reward model, an active sampling loop, four models in memory, instability. <strong>Direct Preference Optimization (DPO)</strong> (2023) was the big simplification — it skips the explicit reward model and RL loop entirely.</p>
    <div class="callout key"><h5>The DPO insight</h5><p>The RLHF objective has a <strong>closed-form optimal policy</strong>. DPO algebraically substitutes that solution back in, turning preference learning into a <strong>simple classification loss</strong> directly on (chosen, rejected) pairs. The model's own log-probabilities <em>implicitly become</em> the reward. No reward model, no sampling, no RL — just a stable supervised-style loss.</p></div>
    <pre><code><span class="cm"># DPO loss — increase margin between chosen & rejected, anchored to a frozen ref</span>
margin = β·( logπ(y_chosen|x) − logπ_ref(y_chosen|x) )
       − β·( logπ(y_reject|x) − logπ_ref(y_reject|x) )
loss   = −log_sigmoid(margin)</code></pre>
    <h3>The zoo (and when to reach for each)</h3>
    <div class="widget">
      <div class="wh"><span class="tag">Interactive</span><h4>Preference-method selector</h4></div>

        <div class="ctrl"><label>Compute / infra</label><div class="seg"><button data-g="comp" data-v="lean" class="on">lean</button><button data-g="comp" data-v="heavy">full RL stack</button></div></div>
        <div class="ctrl"><label>Reference model</label><div class="seg"><button data-g="ref" data-v="yes" class="on">keep ref</button><button data-g="ref" data-v="no">ref-free</button></div></div>
      </div>
      <div class="readout" id="prefrec" style="font-size:14px"></div>
      <table class="cmp" style="margin-top:14px">
        <tr><th>Method</th><th>Needs reward model?</th><th>Needs RL loop?</th><th>One-liner</th></tr>
        <tr><td><b>PPO (RLHF)</b></td><td>Yes</td><td>Yes</td><td>Online RL; most powerful, most painful; best for verifiable/online rewards</td></tr>
        <tr><td><b>DPO</b></td><td>No</td><td>No</td><td>Closed-form preference classification; stable, the popular default</td></tr>
        <tr><td><b>IPO</b></td><td>No</td><td>No</td><td>DPO variant that fixes overfitting to deterministic preferences</td></tr>
        <tr><td><b>KTO</b></td><td>No</td><td>No</td><td>Learns from <em>unpaired</em> good/bad labels (thumbs up/down) — no pairs needed</td></tr>
        <tr><td><b>ORPO</b></td><td>No</td><td>No</td><td>Merges SFT + preference into <em>one</em> stage, <em>no reference model</em></td></tr>
        <tr><td><b>SimPO</b></td><td>No</td><td>No</td><td>Reference-free, length-normalized reward; simpler & often stronger than DPO</td></tr>
        <tr><td><b>GRPO</b></td><td>No (rule/verifier)</td><td>Yes (lightweight)</td><td>Group-relative RL; powers reasoning models — next track</td></tr>
      </table>
    </div>
    <div class="quiz"><div class="qh">Self-check</div>
      <div class="qitem" data-correct="1">
        <div class="q">What does DPO eliminate compared to PPO-based RLHF?</div>
        <button class="opt">The need for any preference data</button>
        <button class="opt">The explicit reward model and the online RL sampling loop</button>
        <button class="opt">The reference model and the KL constraint entirely</button>
        <div class="explain">DPO still uses preference data and an (implicit) KL-to-reference via β. What it removes is training a separate reward model and running PPO's online generation loop — folding it all into one supervised-style loss.</div>
      </div>
    </div>`,
    init(root){
      const state={rew:'pref',comp:'lean',ref:'yes'};
      root.querySelectorAll('[data-g]').forEach(b=>{
        b.onclick=()=>{const g=b.dataset.g;state[g]=b.dataset.v;root.querySelectorAll(`[data-g="${g}"]`).forEach(x=>x.classList.remove('on'));b.classList.add('on');rec();};
      });
      function rec(){
        let r;
        if(state.rew==='verif'){r='<b>→ GRPO / RLVR.</b> If you can <em>verify</em> correctness (math, code, format), skip preference modeling and reward correctness directly. This is the reasoning-model recipe (next track).';}
        else if(state.rew==='binary'){r='<b>→ KTO.</b> You have unpaired thumbs up/down, not ranked pairs. KTO learns directly from binary signal — no need to construct (chosen, rejected) pairs.';}
        else if(state.comp==='heavy' && state.rew==='pref'){r='<b>→ PPO (classic RLHF).</b> With full infra and pairwise prefs, online PPO can still extract the most from a strong reward model — at the cost of complexity and instability.';}
        else if(state.ref==='no'){r='<b>→ ORPO or SimPO.</b> Reference-free methods drop the frozen model from memory. ORPO even fuses SFT + alignment into one stage; SimPO adds length-normalized implicit rewards.';}
        else {r='<b>→ DPO.</b> Lean infra, pairwise preferences, keep a reference model: the stable, widely-used default. Consider IPO if preferences are near-deterministic (overfitting risk).';}
        root.querySelector('#prefrec').innerHTML=r;
      }
      rec();
    }
  }

  ]
});
